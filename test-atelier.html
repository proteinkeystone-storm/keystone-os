<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harnais Key Brand (KB-0) — API mockée</title>
<!-- Harnais isolé (pattern _design-lab) : prouve que le module key-brand.js
     fonctionne sans prod — l'API worker est mockée en mémoire ci-dessous. -->
<link rel="stylesheet" href="./app/style.css">
<link rel="stylesheet" href="./app/workspace.css">
<link rel="stylesheet" href="./app/key-brand.css">
<style>body{margin:0;background:#0d1017;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>
<base href="../">
</head>
<body>
<script>
  // Mock de l'API /api/keybrand/* en mémoire (fetch monkey-patché).
  window.__KS_API_BASE__ = 'https://mock.local';
  localStorage.setItem('ks_jwt', 'mock-jwt');
  const _db = { charts: [], seq: 0 };
  const _slug = () => Math.random().toString(36).slice(2, 16);
  const _now = () => new Date().toISOString();
  const _realFetch = window.fetch.bind(window);
  window.fetch = async (url, opts = {}) => {
    const u = String(url);
    if (!u.startsWith('https://mock.local/api/keybrand')) return _realFetch(url, opts);
    const path = u.replace('https://mock.local/api/keybrand', '');
    const method = (opts.method || 'GET').toUpperCase();
    const body = (typeof opts.body === 'string') ? JSON.parse(opts.body) : {};
    const R = (data, status = 200) => new Response(JSON.stringify(data), { status, headers: { 'Content-Type': 'application/json' } });
    const primaryHex = c => { const p = c.draft?.colors?.palette || []; const pr = p.find(x => x.role === 'primary') || p[0]; return pr?.hex || null; };

    if (path === '/charts' && method === 'GET')
      return R({ items: _db.charts.map(c => ({ id: c.id, slug: c.slug, name: c.name, status: c.status, version: c.version, updated_at: c.updated_at, primary_hex: primaryHex(c) })), max: 30 });
    if (path === '/charts' && method === 'POST') {
      if (_db.charts.length >= 30) return R({ error: 'Limite atteinte : 30 chartes par compte' }, 409);
      const c = { id: 'c' + (++_db.seq), slug: _slug(), name: body.name || 'Nouvelle marque', status: 'draft', access: 'unlisted', version: 0, created_at: _now(), updated_at: _now(), draft: { meta: { name: body.name || 'Nouvelle marque', baseline: '' }, colors: { palette: [] } } };
      _db.charts.unshift(c); return R({ chart: c }, 201);
    }
    // ── KB-1 : fichiers (upload / service / suppression) ──
    const mUp = path.match(/^\/charts\/([\w-]+)\/assets\?/);
    if (mUp && method === 'POST') {
      const id = 'a' + (++_db.seq);
      const q = new URLSearchParams(path.split('?')[1]);
      const mime = (opts.headers || {})['Content-Type'] || 'application/octet-stream';
      const ext = { 'image/svg+xml': 'svg', 'image/png': 'png', 'image/jpeg': 'jpg', 'image/webp': 'webp', 'application/pdf': 'pdf', 'video/mp4': 'mp4', 'video/webm': 'webm' }[mime];
      const blob = opts.body instanceof Blob ? opts.body : new Blob([opts.body], { type: mime });
      _db.assets = _db.assets || {};
      _db.assets[id] = { blob, mime, name: q.get('name') || 'fichier.' + ext };
      return R({ ok: true, asset: { id, kind: q.get('kind') || 'logo', mime, ext, size: blob.size, name: _db.assets[id].name } }, 201);
    }
    const mFile = path.match(/^\/file\/([\w-]+)$/);
    if (mFile && method === 'GET') {
      const a = (_db.assets || {})[mFile[1]];
      if (!a) return R({ error: 'Fichier introuvable' }, 404);
      return new Response(a.blob, { status: 200, headers: { 'Content-Type': a.mime } });
    }
    const mDelA = path.match(/^\/assets\/([\w-]+)$/);
    if (mDelA && method === 'DELETE') { delete (_db.assets || {})[mDelA[1]]; return R({ ok: true }); }

    // ── KB-6 : publication & accès ──
    const mPub = path.match(/^\/charts\/([\w-]+)\/publish$/);
    if (mPub && method === 'POST') {
      const c = _db.charts.find(x => x.id === mPub[1]); if (!c) return R({ error: 'Charte introuvable' }, 404);
      c.status = 'published'; c.version = (c.version || 0) + 1; c.published_json = JSON.stringify(c.draft || {}); c.updated_at = _now();
      return R({ ok: true, version: c.version, slug: c.slug });
    }
    const mAcc = path.match(/^\/charts\/([\w-]+)\/access$/);
    if (mAcc && method === 'PUT') {
      const c = _db.charts.find(x => x.id === mAcc[1]); if (!c) return R({ error: 'Charte introuvable' }, 404);
      if (body.access === 'code' && (!body.code || body.code.length < 4) && c.access !== 'code') return R({ error: 'Code trop court' }, 400);
      c.access = body.access; return R({ ok: true, access: body.access });
    }

    const mDup = path.match(/^\/charts\/([\w-]+)\/duplicate$/);
    if (mDup && method === 'POST') {
      const src = _db.charts.find(c => c.id === mDup[1]); if (!src) return R({ error: 'Charte introuvable' }, 404);
      if (_db.charts.length >= 30) return R({ error: 'Limite atteinte : 30 chartes par compte' }, 409);
      const c = { ...structuredClone(src), id: 'c' + (++_db.seq), slug: _slug(), name: src.name + ' (copie)', status: 'draft', version: 0, updated_at: _now() };
      _db.charts.unshift(c); return R({ chart: c }, 201);
    }
    const m = path.match(/^\/charts\/([\w-]+)$/);
    if (m) {
      const c = _db.charts.find(x => x.id === m[1]);
      if (!c) return R({ error: 'Charte introuvable' }, 404);
      if (method === 'GET') return R({ chart: c });
      if (method === 'PUT') { if (body.name !== undefined) c.name = body.name; if (body.draft !== undefined) c.draft = body.draft; c.updated_at = _now(); return R({ ok: true }); }
      if (method === 'DELETE') { _db.charts = _db.charts.filter(x => x.id !== m[1]); return R({ ok: true }); }
    }
    return R({ error: 'Route inconnue: ' + method + ' ' + path }, 404);
  };
</script>
<script type="module">
  import { openKeyBrand } from './app/key-brand.js';
  openKeyBrand();
</script>
<div id='kbdiag' style='position:fixed;left:10px;right:10px;bottom:10px;z-index:99999;background:#0e2a1c;border:1px solid #1c5c3c;color:#d9f7e8;font:12px/1.6 ui-monospace,Menlo,monospace;border-radius:10px;padding:10px 14px;white-space:pre-wrap;pointer-events:none'>diagnostic…</div>
<script>
setInterval(function(){
  var d=document.getElementById('kbdiag');
  var i=document.querySelector('[data-slot=stage-inner]');
  if(!i){d.textContent='DIAG — scène absente (créez une charte, onglet Branding)';return}
  var cs=getComputedStyle(i);
  var ls=[].slice.call(document.querySelectorAll('.kb-stage-name .kb-l'));
  var vis=ls.filter(function(l){return parseFloat(getComputedStyle(l).opacity)>0.5}).length;
  d.textContent='DIAG — classes: '+i.className+'\n'
    +'animation: '+cs.animationName+' | duree: '+cs.animationDuration+' | etat: '+cs.animationPlayState+'\n'
    +'lettres: '+(ls.length?vis+'/'+ls.length+' visibles':'(motion non-lettres)')+'\n'
    +'reduire-anim systeme: '+(matchMedia('(prefers-reduced-motion: reduce)').matches?'ACTIVE':'non');
},500);
</script>
</body>
</html>
