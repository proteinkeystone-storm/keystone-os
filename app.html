  <!-- ── KILL SWITCH PRIORITAIRE — exécuté avant tout fetch ────────
       URL spéciales qui forcent un reset complet :
       · ?ks_reset=1 → vide tout (SW, caches, localStorage ks_*) puis recharge
       · ?demo=1     → mode démo pur (vide ks_owned_assets/ks_user_selection)
  ─────────────────────────────────────────────────────────────── -->
  <script>
  (function(){
    var p = new URLSearchParams(location.search);

    // Kill complet — efface TOUT
    if (p.get('ks_reset') === '1') {
      try {
        Object.keys(localStorage).filter(k => k.startsWith('ks_')).forEach(k => localStorage.removeItem(k));
      } catch(e){}
      var done = function(){ location.replace(location.pathname); };
      var p1 = ('serviceWorker' in navigator)
        ? navigator.serviceWorker.getRegistrations().then(rs => Promise.all(rs.map(r => r.unregister()))).catch(() => {})
        : Promise.resolve();
      var p2 = ('caches' in window)
        ? caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k)))).catch(() => {})
        : Promise.resolve();
      Promise.all([p1, p2]).then(done, done);
      document.documentElement.innerHTML = '<body style="background:#07102a;color:#d4af37;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">Reset en cours…</body>';
      return;
    }

    // Mode démo pur — efface uniquement la licence/sélection
    if (p.get('demo') === '1') {
      try {
        ['ks_owned_assets','ks_lifetime_purchases','ks_user_selection','ks_licence_key','ks_onboarded']
          .forEach(k => localStorage.removeItem(k));
        localStorage.setItem('ks_onboarded','1');
      } catch(e){}
      // Continue le chargement normal — la page suivante sera en mode démo
    }
  })();
  </script>

  <!-- ── AUTH GUARD — protection /app sans licence valide ──────────
       Bloque l'acces direct au dashboard pour les visiteurs non-actives.
       Verifie la presence d'un JWT non expire en localStorage.
       Sans JWT → redirection vers la landing pour activer une licence.
  ─────────────────────────────────────────────────────────────── -->
  <script>
  (function(){
    var p   = new URLSearchParams(location.search);
    // Bypass autorise pour le flux d'activation post-paiement
    if (p.get('ks_key')) return;
    // Bypass kill-switch (deja gere plus haut, mais double secu)
    if (p.get('ks_reset') === '1') return;

    var jwt = localStorage.getItem('ks_jwt');
    if (!jwt) {
      location.replace('/?logout=1');
      return;
    }
    // Verif expiration cote client (UX). La validation reelle est cote
    // Worker sur chaque appel API — un JWT bidouille ne donne aucun acces.
    try {
      var payload = JSON.parse(atob(jwt.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      if (payload.exp && payload.exp * 1000 < Date.now()) {
        localStorage.removeItem('ks_jwt');
        localStorage.removeItem('ks_onboarded');
        location.replace('/?logout=1');
        return;
      }
    } catch(_) {
      localStorage.removeItem('ks_jwt');
      location.replace('/?logout=1');
      return;
    }
  })();
  </script>

  <!-- ── SECURITY GATE — détection lancement non officiel ─────── -->
  <script>
  (function(){
    // Actif uniquement en protocole file://
    // Le lanceur officiel ajoute ?ks_launch=1 — sans ce paramètre, on bloque.
    if (location.protocol !== 'file:') return; // serveur local = OK
    var params = new URLSearchParams(location.search);
    if (params.get('ks_launch') === '1') return; // lancé via Lancer_KEYSTONE

    // ── Construction de l'écran de blocage ───────────────────────
    var style = document.createElement('style');
    style.textContent = [
      '#ks-security-gate{',
        'position:fixed;inset:0;z-index:99999;',
        'background:#07102a;',
        'display:flex;flex-direction:column;',

        'position:absolute;inset:0;',
        'background:radial-gradient(ellipse 60% 45% at 50% 40%,rgba(180,148,70,.13) 0%,transparent 70%);',
        'pointer-events:none;',
      '}',
      '#ks-security-gate .sg-logo{',
        'width:72px;height:72px;',
        'background:rgba(180,148,70,.12);',
        'border:1.5px solid rgba(180,148,70,.35);',
        'border-radius:18px;',
        'display:flex;align-items:center;justify-content:center;',
        'margin-bottom:28px;',
        'box-shadow:0 0 40px rgba(180,148,70,.15);',
      '}',
      '#ks-security-gate .sg-logo svg{opacity:.85}',
      '#ks-security-gate .sg-lock{',
        'width:48px;height:48px;',
        'display:flex;align-items:center;justify-content:center;',
        'background:rgba(180,148,70,.1);',
        'border-radius:50%;',
        'margin-bottom:24px;',
        'border:1.5px solid rgba(180,148,70,.3);',
      '}',
      '#ks-security-gate h1{',
        'color:#6366f1;',
        'font-size:13px;font-weight:700;',
        'letter-spacing:.18em;text-transform:uppercase;',
        'margin:0 0 10px;opacity:.9;',
      '}',
      '#ks-security-gate .sg-title{',
        'color:#f0f0f0;',
        'font-size:22px;font-weight:800;',
        'letter-spacing:-.03em;',
        'margin:0 0 16px;',
        'text-align:center;',
      '}',
      '#ks-security-gate .sg-msg{',
        'color:rgba(255,255,255,.45);',
        'font-size:14px;font-weight:400;',
        'line-height:1.6;',
        'text-align:center;',
        'max-width:380px;',
        'margin:0 0 32px;',
      '}',
      '#ks-security-gate .sg-msg strong{color:rgba(255,255,255,.7);font-weight:600;}',
      '#ks-security-gate .sg-badge{',
        'display:flex;align-items:center;gap:8px;',
        'padding:10px 18px;',
        'background:rgba(180,148,70,.1);',
        'border:1px solid rgba(180,148,70,.25);',
        'border-radius:100px;',
        'color:rgba(180,148,70,.8);',
        'font-size:12px;font-weight:600;',
        'letter-spacing:.06em;',
      '}',
      '#ks-security-gate .sg-sep{',
        'width:40px;height:1px;',
        'background:rgba(255,255,255,.08);',
        'margin:28px 0;',
      '}',
      '#ks-security-gate .sg-footer{',
        'position:absolute;bottom:28px;',
        'color:rgba(255,255,255,.18);',
        'font-size:11px;letter-spacing:.04em;',
      '}',
    ].join('');
    document.head.appendChild(style);

    var gate = document.createElement('div');
    gate.id = 'ks-security-gate';
    gate.innerHTML = [
      '<div class="sg-glow"></div>',

      // Icône cadenas
      '<div class="sg-lock">',
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">',
          '<rect x="3" y="11" width="18" height="11" rx="2"/>',
          '<path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
        '</svg>',
      '</div>',

      '<h1>Keystone OS</h1>',
      '<div class="sg-title">Système verrouillé</div>',

      '<div class="sg-msg">',
        'Cette page ne peut pas être ouverte directement.<br>',
        'Veuillez accéder à Keystone OS via la <strong>page d\'accueil officielle</strong>.<br><br>',
        '<a href="https://protein-keystone.com" style="color:#6366f1;text-decoration:none;font-weight:600">→ Retour à protein-keystone.com</a>',
      '</div>',

      '<div class="sg-badge">',
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
        'Sécurité Keystone active',
      '</div>',

      '<div class="sg-sep"></div>',
      '<div class="sg-footer">© Keystone OS — Protein Studio</div>',
    ].join('');

    // Bloquer quand le DOM est prêt
    if (document.body) {
      document.body.appendChild(gate);
    } else {
      document.addEventListener('DOMContentLoaded', function() {
        document.body.appendChild(gate);
      });
    }
  })();
  </script>

<!-- ── Service Worker (Sprint 1.1 — offline-graceful) ─────────────
     Cache des assets + fallback offline pour les requêtes API.
     Les mutations offline sont gérées par dataFabric (IndexedDB),
     pas par le SW. Versionné via VERSION dans sw.js — bump pour
     forcer la purge des anciens caches.
───────────────────────────────────────────────────────────────── -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .catch(err => console.warn('[sw] registration failed', err));
    });
  }
</script>
