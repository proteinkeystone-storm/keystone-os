<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keystone OS — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #07102a;
      --navy-2:     #0d1b3e;
      --navy-3:     #1a2850;
      --gold:       #c9a84c;
      --gold-dim:   rgba(201,168,76,0.12);
      --text:       #e8eaf0;
      --text-muted: rgba(232,234,240,0.45);
      --danger:     #e05c5c;
      --success:    #4caf80;
      --border:     rgba(201,168,76,0.18);
      --radius:     12px;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      font-size: 14px;
      letter-spacing: -0.01em;
      line-height: 1.5;
    }

    /* ── LOGIN ─────────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-card {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .login-eyebrow {
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
    }

    .login-title {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-align: center;
    }

    .login-error {
      color: var(--danger);
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }

    /* ── ADMIN LAYOUT ──────────────────────────────────────────── */
    #admin-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: var(--navy-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-badge {
      color: var(--gold);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: var(--gold-dim);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    /* ── TABS ──────────────────────────────────────────────────── */
    .admin-tabs {
      display: flex;
      padding: 0 28px;
      background: var(--navy-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      padding: 13px 18px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── CONTENT ───────────────────────────────────────────────── */
    .admin-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── SECTION HEADER ────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .section-title span {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
      margin-left: 6px;
    }

    /* ── BUTTONS ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      font-family: inherit;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: var(--gold); color: var(--navy); }
    .btn-primary:hover:not(:disabled) { background: #d4b567; }

    .btn-secondary {
      background: var(--navy-3);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }

    .btn-danger {
      background: none;
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    .btn-danger:hover:not(:disabled) { background: rgba(224,92,92,0.1); }

    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 7px; }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 13px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── TABLE ─────────────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--navy-2);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .data-table th {
      padding: 11px 16px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(201,168,76,0.07);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── BADGES ────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .badge-active  { background: rgba(76,175,128,0.12); color: #4caf80; border: 1px solid rgba(76,175,128,0.28); }
    .badge-revoked { background: rgba(224,92,92,0.12);  color: #e05c5c; border: 1px solid rgba(224,92,92,0.28); }
    .badge-plan-starter { background: rgba(100,150,255,0.1); color: #6496ff; border: 1px solid rgba(100,150,255,0.2); }
    .badge-plan-pro     { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--border); }
    .badge-plan-max     { background: rgba(180,100,255,0.1); color: #b464ff; border: 1px solid rgba(180,100,255,0.2); }

    /* ── FORMS ─────────────────────────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .form-input, .form-select, .form-textarea {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--gold);
    }
    .form-input:disabled { opacity: 0.45; }

    .form-select option { background: var(--navy-2); }

    .form-textarea {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      resize: vertical;
      min-height: 280px;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-full  { grid-column: 1 / -1; }

    /* ── MODAL ─────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7,16,42,0.82);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 5vh;
      z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 580px;
      max-width: calc(100vw - 32px);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── STATS CARDS ───────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 26px;
    }

    .stat-card {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: var(--gold);
      line-height: 1;
    }

    /* ── SPLIT LAYOUT (PAD editor) ─────────────────────────────── */
    .split-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 20px;
      height: calc(100vh - 220px);
    }

    .split-left {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pad-item {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .pad-item.active,
    .pad-item:hover { border-color: var(--gold); background: var(--gold-dim); }

    .pad-item-id    { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 3px; }
    .pad-item-title { font-size: 13px; font-weight: 600; }

    .split-right {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── CATALOG TOGGLE ────────────────────────────────────────── */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .toggle-switch input { display: none; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: var(--text-muted);
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--gold-dim); border-color: var(--gold); }
    .toggle-switch input:checked + .toggle-slider::after { background: var(--gold); transform: translateX(16px); }

    /* ── FEEDBACK STATES ───────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      padding: 64px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .form-error {
      color: var(--danger);
      font-size: 12px;
      min-height: 16px;
    }

    /* ── TOAST ─────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 20px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 9999;
      max-width: 320px;
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--danger);  color: var(--danger); }

    /* ── TYPE BADGES ───────────────────────────────────────────── */
    .type-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 6px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.12em;
      border: 1px solid;
      white-space: nowrap;
    }
    .type-badge-tool     { color: var(--gold); background: var(--gold-dim); border-color: var(--border); }
    .type-badge-artifact { color: #6496ff; background: rgba(100,150,255,0.1); border-color: rgba(100,150,255,0.25); }

    /* ── EDITOR TABS ───────────────────────────────────────────── */
    .editor-tabs-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 18px;
    }
    .editor-tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .editor-tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .editor-tab-btn:hover:not(.active) { color: var(--text); }
    .editor-tab-content { display: none; }
    .editor-tab-content.active { display: block; }

    /* ── ENGINE TABS ───────────────────────────────────────────── */
    .engine-tabs-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .engine-tab-btn {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .engine-tab-btn.active {
      background: color-mix(in srgb, var(--eng-color, var(--gold)) 15%, transparent);
      border-color: color-mix(in srgb, var(--eng-color, var(--gold)) 40%, transparent);
      color: var(--eng-color, var(--gold));
    }
    .engine-tab-btn:hover:not(.active) { border-color: var(--gold); color: var(--text); }

    .engine-panel { display: none; }
    .engine-panel.active { display: block; }

    .engine-hint {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .engine-tokens {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .engine-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid;
    }

    /* ── CARD PREVIEW ──────────────────────────────────────────── */
    .pad-card-preview {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 18px;
    }
    .preview-icon { font-size: 22px; display: block; margin-bottom: 10px; }
    .preview-title {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 10px 0 4px;
    }
    .preview-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── FIELD BUILDER ─────────────────────────────────────────── */
    .field-row {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .field-row:hover { border-color: rgba(201,168,76,0.35); }
    .field-row-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 120px 1fr;
      gap: 12px;
    }

    /* ── TYPE SELECTOR ─────────────────────────────────────────── */
    .type-radio {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px;
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
      flex: 1;
    }
    .type-radio.active { border-color: var(--gold); }
    .type-radio small { font-size: 11px; color: var(--text-muted); text-align: center; }

    /* ── NEW PAD TYPE CHOICE ────────────────────────────────────── */
    .type-choice-btn {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text);
      font-family: inherit;
      text-align: center;
      width: 100%;
    }
    .type-choice-btn:hover { border-color: var(--gold); background: var(--gold-dim); }

    /* ── ARTIFACT COMPONENT SELECTOR ───────────────────────────── */
    .component-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .comp-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      min-width: 68px;
    }
    .comp-btn .comp-icon { font-size: 18px; line-height: 1; }
    .comp-btn:hover { border-color: var(--gold); color: var(--text); }
    .comp-btn.active {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── COMPONENT CONFIG PANEL ────────────────────────────────── */
    .comp-config-panel {
      display: none;
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .comp-config-panel.active { display: block; }
    .comp-config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
    }

    /* ── ARTIFACT FIELD ROW ─────────────────────────────────────── */
    .artifact-field-row {
      background: var(--navy-2);
      border: 1px solid rgba(100,150,255,0.2);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .artifact-field-row:hover { border-color: rgba(100,150,255,0.4); }
    .artifact-field-base {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* ── SCHEMA PANEL (Moteurs / Artefact) ──────────────────────── */
    .schema-panel {
      background: var(--navy);
      border: 1px solid rgba(100,150,255,0.25);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .schema-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .schema-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6496ff;
    }
    .schema-code {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      color: #a8c4ff;
      line-height: 1.7;
      white-space: pre;
      overflow-x: auto;
    }
    .preamble-badge {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(100,150,255,0.1);
      border: 1px solid rgba(100,150,255,0.25);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      color: #6496ff;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════ LOGIN ═══════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <p class="login-eyebrow">⌘ Keystone OS</p>
    <h1 class="login-title">Admin Panel</h1>
    <div class="form-group">
