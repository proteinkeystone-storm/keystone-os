# ═══════════════════════════════════════════════════════════════
# KEYSTONE OS — Cloudflare Worker · wrangler.toml
# ═══════════════════════════════════════════════════════════════
# Déploiement :
#   1. npm install
#   2. wrangler login
#   3. wrangler d1 create keystone-os --location weur
#      → copiez le database_id généré dans [[d1_databases]] ci-dessous
#   4. wrangler d1 execute keystone-os --file=./src/db/schema.sql
#   5. wrangler secret put KS_ADMIN_SECRET
#   6. wrangler secret put KS_ENCRYPTION_KEY    (min 32 chars aléatoires)
#   7. wrangler deploy
# ═══════════════════════════════════════════════════════════════

name            = "keystone-os-api"
main            = "src/index.js"
compatibility_date = "2025-04-01"
# nodejs_compat : requis par @cloudflare/puppeteer (node:buffer) pour la mesure
# perf Sentinel S3 (Browser Rendering). Additif — ajoute les modules/globaux
# Node, n'altère pas les Web APIs déjà utilisées par les autres pads.
compatibility_flags = ["nodejs_compat"]

# Placement "smart" : Cloudflare choisit la région la plus proche des données D1
[placement]
mode = "smart"

# ── Base de données D1 (EU — Western Europe) ──────────────────
# Après `wrangler d1 create keystone-os --location weur`
# remplacez REPLACE_WITH_YOUR_D1_ID par l'ID retourné
[[d1_databases]]
binding      = "DB"
database_name = "keystone-os"
database_id  = "f5d21b1a-74a5-436f-849a-e971ab9d44ac"

# ── Workers AI (Ghost Writer — Gemma 4) ───────────────────────
# Active env.AI.run() pour le modèle @cf/google/gemma-4-26b-a4b-it.
# Free tier : 10 000 neurones/jour. Au-delà : 0,011 $/1000 neurones.
[ai]
binding = "AI"

# ── R2 — Médias des notices d'aide (Help-Overlay v2, Phase 2) ──
# Stockage des vidéos de démo + posters uploadés depuis l'admin.
# Egress gratuit, palier gratuit 10 Go (usage réel : ~quelques Mo).
# Mapping app_id → clé R2 conservé en D1 (table help_videos).
[[r2_buckets]]
binding     = "HELP_MEDIA"
bucket_name = "keystone-help-media"

# ── R2 — Casier desK (Pad O-DSK-001 · DK-3, DESK_BRIEF §6) ────
# Pièces ÉPHÉMÈRES des cartes-pages (PDF, photos HD, textes) — purge
# auto 30 j après « imprimé » (cron 3h), quota doux 2 Go/numéro.
# ⚠ CRÉER LE BUCKET AVANT LE PREMIER DEPLOY (sinon wrangler deploy échoue) :
#   npx wrangler r2 bucket create keystone-desk-casier
# Upload par défaut = mode DIRECT (streamé via le Worker, zéro setup).
# Pour passer en PRÉSIGNÉ (navigateur → R2 sans transiter par le Worker) :
#   1. dashboard R2 → API token « Object Read & Write » limité à ce bucket
#   2. wrangler secret put DK_R2_ACCOUNT_ID / DK_R2_ACCESS_KEY_ID / DK_R2_SECRET_ACCESS_KEY
#   3. CORS du bucket : AllowedOrigins = origines Keystone,
#      AllowedMethods = GET, PUT · AllowedHeaders = content-type
# Bascule sans redeploy — le Worker détecte les secrets à chaque requête.
[[r2_buckets]]
binding     = "DK_CASIER"
bucket_name = "keystone-desk-casier"

# ── Vectorize — index sémantique du coffre Kortex (Smart Agent, SA-2) ──
# Embeddings @cf/baai/bge-m3 (multilingue/français, 1024 dims, cosine).
# Isolation multi-tenant par NAMESPACE (= tenant_id) à l'insert ET au query.
# ⚠ CRÉER L'INDEX AVANT LE PREMIER DEPLOY (sinon wrangler deploy échoue) :
#   npx wrangler vectorize create keystone-kortex --dimensions=1024 --metric=cosine
# Puis réindexer les fiches validées préexistantes :
#   POST /api/smart-agent/kortex/reindex (JWT MAX/admin)
# Le code dégrade proprement en recherche lexicale seule si le binding
# est absent (dev local / index pas encore créé).
[[vectorize]]
binding    = "KORTEX_INDEX"
index_name = "keystone-kortex"

# ── Browser Rendering — mesure perf réelle (Sentinel S3 · Core Web Vitals) ──
# Lance un navigateur headless pour mesurer LCP/CLS/poids/requêtes. 10 h/mois
# incluses sur Workers Paid puis 0,09 $/h. Utilisé UNIQUEMENT par l'audit
# on-demand de Sentinel (jamais le cron) → coût borné. Dégrade proprement si
# absent (perf = n/a, le reste de l'audit fonctionne).
[browser]
binding = "BROWSER"

# ── Variables publiques (non-secrètes) ─────────────────────────
# CSV multi-origin : production Vercel + previews + dev local.
# Le Worker renvoie l'origin qui correspond à celle de la requête
# (fallback sur le 1er sinon).
# NB : keystone-os.vercel.app a été squatté — l'URL réelle est -inky.
# protein-keystone.com = domaine officiel (depuis mai 2025)
[vars]
# Sprint Sécu-3 / M3 — localhost retiré de la liste prod.
# Pour le dev local, override via `wrangler dev --var KS_ALLOWED_ORIGIN:"*"`
# ou créer un wrangler.dev.toml dédié avec localhost autorisé.
KS_ALLOWED_ORIGIN = "https://protein-keystone.com,https://www.protein-keystone.com,https://keystone-os-inky.vercel.app,https://keystone-8qzoeqa34-storms-projects-01b49fbc.vercel.app"
# Pour les preview deployments Vercel (URL avec -git-XXX-storms-projects),
# utilisez plutôt un domaine custom ou ajoutez explicitement chaque URL.

# ── BYOK — Moteur IA universel (chantier « ma clé pilote tout ») ──
# Drapeau de rollback du routage vendor des surfaces BYOK *nouvelles*
# (Phase 2/3). OFF par défaut : on l'allume progressivement par phase.
# Éteindre = retour Mistral instantané sur ces surfaces. N'affecte PAS
# /api/proxy/llm (BYOK explicite déjà en prod : Brief, Annonces, pads).
# Lu par lib/llm-router.js → byokRoutingEnabled(env).
BYOK_ROUTING = "off"

# ── SDQR — RGPD (Sprint SDQR-5) ─────────────────────────────
# Rétention des logs de scan en jours (purge auto via Cron, voir [triggers])
SDQR_SCAN_RETENTION_DAYS = "90"
# Email du DPO affiché sur la page /sdqr-privacy
SDQR_DPO_EMAIL = "protein.keystone@gmail.com"

# ── Web Push (Keynapse Sprint 9) — clé PUBLIQUE VAPID (publique par nature :
# elle est aussi côté navigateur). La clé PRIVÉE est un SECRET :
#   echo '<jwk>' | npx wrangler secret put VAPID_PRIVATE_JWK
VAPID_PUBLIC = "BB0ytfuRYEoK1K6Y4SGGFbXhj6MbSTqsGnLG_gMypV_IVkGyWFiengfTRVyNJFUqmP8Vvg30v-9067t9X5HTlEc"

# ── Triggers — Cron Workers (Sprint SDQR-5) ──────────────────
# "0 3 * * *"   (quotidien 3h UTC) — purges & maintenance (SDQR qr_scans, Pulsa,
#               rappels d'expiration licence, auto-downgrade concierge).
# "*/5 * * * *" (toutes les 5 min) — Sprint Social-4.1 : balayage des posts
#               programmés arrivés à échéance (sweepDuePosts).
# ⚠ scheduled() (src/index.js) DISPATCHE selon event.cron : chaque expression
#   déclenche son SEUL traitement. Cloudflare gère le retry si le run rate.
[triggers]
# "0 3 * * *"   = maintenance quotidienne (purges, refresh tokens…)
# "* * * * *"   = publication sociale réactive (posts programmés / réessais / vidéo IG·Threads « en traitement » → publiée en <1 min)
# "*/5 * * * *" = rappels web-push Keynapse échus
crons = ["0 3 * * *", "* * * * *", "*/5 * * * *"]

# ── Secrets à définir via `wrangler secret put` ───────────────
# KS_ADMIN_SECRET   — même valeur que dans Vercel
# KS_ENCRYPTION_KEY — clé 32+ chars pour chiffrer les clés API
# KS_GSC_CLIENT_ID      — Client ID OAuth Google (Sentinel V2 · Search Console)
# KS_GSC_CLIENT_SECRET  — Client Secret OAuth Google ; redirect URI à enregistrer
#                         côté Google = <origine worker>/api/sentinel/gsc/callback
#                         (scope demandé : webmasters.readonly, lecture seule)

# ── Environnement de développement local ─────────────────────
[dev]
port = 8787
local_protocol = "http"
