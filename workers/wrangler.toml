# ═══════════════════════════════════════════════════════════════
# KEYSTONE OS — Cloudflare Worker · wrangler.toml
# ═══════════════════════════════════════════════════════════════
# Déploiement :
#   1. npm install
#   2. wrangler login
#   3. wrangler d1 create keystone-os --location weur
#      → copiez le database_id généré dans [[d1_databases]] ci-dessous
#   4. wrangler d1 execute keystone-os --file=./src/db/schema.sql
#   5. wrangler secret put KS_ADMIN_SECRET
#   6. wrangler secret put KS_ENCRYPTION_KEY    (min 32 chars aléatoires)
#   7. wrangler deploy
# ═══════════════════════════════════════════════════════════════

name            = "keystone-os-api"
main            = "src/index.js"
compatibility_date = "2025-04-01"

# Placement "smart" : Cloudflare choisit la région la plus proche des données D1
[placement]
mode = "smart"

# ── Base de données D1 (EU — Western Europe) ──────────────────
# Après `wrangler d1 create keystone-os --location weur`
# remplacez REPLACE_WITH_YOUR_D1_ID par l'ID retourné
[[d1_databases]]
binding      = "DB"
database_name = "keystone-os"
database_id  = "f5d21b1a-74a5-436f-849a-e971ab9d44ac"

# ── Variables publiques (non-secrètes) ─────────────────────────
# CSV multi-origin : production Vercel + previews + dev local.
# Le Worker renvoie l'origin qui correspond à celle de la requête
# (fallback sur le 1er sinon).
# NB : keystone-os.vercel.app a été squatté — l'URL réelle est -inky.
# protein-keystone.com = domaine officiel (depuis mai 2025)
[vars]
KS_ALLOWED_ORIGIN = "https://protein-keystone.com,https://www.protein-keystone.com,https://keystone-os-inky.vercel.app,https://keystone-8qzoeqa34-storms-projects-01b49fbc.vercel.app,http://localhost:3000,http://localhost:5173,http://localhost:8787"
# Pour les preview deployments Vercel (URL avec -git-XXX-storms-projects),
# utilisez plutôt un domaine custom ou ajoutez explicitement chaque URL.

# ── SDQR — RGPD (Sprint SDQR-5) ─────────────────────────────
# Rétention des logs de scan en jours (purge auto via Cron, voir [triggers])
SDQR_SCAN_RETENTION_DAYS = "90"
# Email du DPO affiché sur la page /sdqr-privacy
SDQR_DPO_EMAIL = "protein.keystone@gmail.com"

# ── Triggers — Cron Workers (Sprint SDQR-5) ──────────────────
# Auto-purge des logs qr_scans > SDQR_SCAN_RETENTION_DAYS chaque jour
# à 3h UTC (heure creuse). Cloudflare gère le retry si le run rate.
[triggers]
crons = ["0 3 * * *"]

# ── Secrets à définir via `wrangler secret put` ───────────────
# KS_ADMIN_SECRET   — même valeur que dans Vercel
# KS_ENCRYPTION_KEY — clé 32+ chars pour chiffrer les clés API

# ── Environnement de développement local ─────────────────────
[dev]
port = 8787
local_protocol = "http"
