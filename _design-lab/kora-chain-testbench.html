<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>KORA — Banc d'essai du pilote de chaîne</title>
<!-- ═══════════════════════════════════════════════════════════════
     BANC D'ESSAI — app/kora-chain.js (pilote de chaîne V1.3)
     Chaque scénario est ISOLÉ (reset → DOM → pilote démarré à la phase
     visée → attente-sur-condition → stop) : une machine à états pilotée
     par intervalles ne se teste pas à la milliseconde, et un run
     séquentiel unique accumule état/timers → faux échecs. Tout est
     factice (aucun pad, aucun réseau). Ouvrir via le serveur statique
     (import ES module même origine).
     ═══════════════════════════════════════════════════════════════ -->
<style>
  body{font-family:-apple-system,sans-serif;background:#0a0c1c;color:#e8e9f5;padding:30px;letter-spacing:-.02em}
  h1{font-weight:900;font-size:18px;letter-spacing:.25em}
  #out{margin-top:18px;font-family:ui-monospace,Menlo,monospace;font-size:13px;line-height:1.8;white-space:pre-wrap}
  .ok{color:#7df0bb}.ko{color:#ff9d8a}
</style>
</head>
<body>
<h1>KORA — PILOTE DE CHAÎNE · BANC D'ESSAI</h1>
<div id="out">…</div>

<script type="module">
/* ⚠ LIRE AVANT DE CONCLURE À UN BUG (vérifié le 20/07/2026)
   Ce banc enchaîne ses scénarios avec de VRAIS timers, dans un navigateur
   qui peut être chargé : une assertion peut échouer ici alors que le code
   est CORRECT. Discipline obligatoire — reproduire le scénario SEUL avant
   d'accuser le produit. Historique : S3/S4/S6 puis S9 ont échoué en
   séquence et sont TOUS passés en isolement ; la seule vraie cause trouvée
   était une fuite du banc (kora_chain_kill non nettoyé entre scénarios,
   corrigée dans reset() — 17 OK/4 ÉCHECS → 20 OK/1 ÉCHEC).
   Ce banc simule les pads par des fixtures : il prouve la LOGIQUE du
   pilote et les sélecteurs attendus, pas le DOM réel des vrais pads. */

import { koraChainPilot, koraChainPhase, koraChainStop } from '/app/kora-chain.js';
import { koraClearRings } from '/app/kora.js';

const out = document.getElementById('out');
let ok = 0, ko = 0;
const T = (label, cond) => {
  out.innerHTML += `<span class="${cond ? 'ok' : 'ko'}">${cond ? 'OK ' : 'ÉCHEC '} — ${label}</span>\n`;
  cond ? ok++ : ko++;
};
const sleep = ms => new Promise(r => setTimeout(r, ms));
/* attend une CONDITION (jusqu'à timeout) plutôt qu'un délai fixe. Timeout
   large (6 s) : le navigateur intégré jitter sous charge, et une machine
   à états multi-ticks + mutations DOM peut avoir besoin de marge. */
const waitFor = async (fn, timeout = 6000, step = 50) => {
  const t0 = Date.now();
  while (Date.now() - t0 < timeout) { if (fn()) return true; await sleep(step); }
  return fn();
};
const ring = () => !!document.querySelector('.kora-ringbox');
const POLL = 100;   // poll pilote des scénarios

/* remet TOUT à zéro entre deux scénarios : pilote stoppé, DOM factice
   effacé, storages vidés. La clé de la fiabilité = isolement total. */
function reset() {
  koraChainStop();
  koraClearRings();
  document.querySelectorAll('#wr-fullscreen,#gw-overlay,#wr-synthesis-drawer,#sm-text,.sm-btn-primary,.kora-ringbox').forEach(e => e.remove());
  localStorage.removeItem('ks_brainstorming_sessions');
  sessionStorage.removeItem('ks_content_chain');
  /* koraChainStop() (appelé juste au-dessus) DIFFUSE un kill horodaté dans
     localStorage : sans ce nettoyage il survit d'un scénario à l'autre et
     peut retirer le pilote du scénario suivant. Fuite trouvée le 20/07 en
     cherchant pourquoi S4 échouait en séquence alors qu'il passe isolé. */
  localStorage.removeItem('kora_chain_kill');
}
const BRIEF = 'brief du banc d’essai';
const setSessions = s => localStorage.setItem('ks_brainstorming_sessions', JSON.stringify(s));
const openWr = extra => document.body.insertAdjacentHTML('beforeend',
  `<div id="wr-fullscreen" class="open" style="display:none">${extra || ''}</div>`);
const gwChainedHtml = `<div id="gw-overlay" style="display:none"><div class="gw-modal" data-chain="1">
  <textarea id="gw-source">A — H</textarea><button id="gw-go"></button>
  <span id="gw-status"></span><div id="gw-variants"></div></div></div>`;

/* ─────────── S1 — DÉBAT : la séance tourne, on attend les idées ─────────── */
reset();
openWr();
setSessions([{ brief: BRIEF, history: [1, 2], synthesis: null }]);
await koraChainPilot({ brief: BRIEF, pollMs: POLL });
await sleep(350);
T('S1 débat en cours → phase reste « debat »', koraChainPhase() === 'debat');

/* ─────────── S2 — SYNTHÈSE prête → arrêt rouge « idée » + anneau ─────────── */
reset();
openWr('<div id="wr-synthesis-drawer" style="width:60px;height:60px"></div>');
setSessions([{ brief: BRIEF, history: [1, 2, 3, 4], synthesis: { ideas: [{ angle: 'A', hook: 'H' }] } }]);
await koraChainPilot({ brief: BRIEF, pollMs: POLL });
await waitFor(() => koraChainPhase() === 'idee' && ring());
T('S2 synthèse détectée → phase « idee »', koraChainPhase() === 'idee');
T('S2 anneau posé sur le tiroir d’idées', ring());
/* la boucle de conversation nettoie les anneaux → le pilote les re-pose */
koraClearRings();
await waitFor(() => ring());
T('S2 anneau re-posé après nettoyage (boucle)', ring());

/* ─────────── S3 — COMPOSE : GW chaîné ouvert → clic auto sur #gw-go ─────────── */
reset();
let goClicks = 0;
document.body.insertAdjacentHTML('beforeend', gwChainedHtml);
document.getElementById('gw-go').addEventListener('click', () => { goClicks++; });
await koraChainPilot({ brief: BRIEF, phase: 'compose', pollMs: POLL });
await waitFor(() => goClicks === 1);
T('S3 composition lancée par le pilote (#gw-go cliqué)', goClicks === 1);
await sleep(300);
T('S3 pas de double clic sur #gw-go', goClicks === 1);

/* ─────────── S4 — FORWARD : post composé → envoi auto au composer ─────────── */
reset();
let sendClicks = 0;
document.body.insertAdjacentHTML('beforeend', gwChainedHtml);
document.getElementById('gw-variants').innerHTML =
  '<article class="gw-compose-post">post</article><button class="gw-action-send"></button>';
document.getElementById('gw-status').textContent = '✓ Post composé (modèle : mistral)';
document.querySelector('.gw-action-send').addEventListener('click', () => {
  sendClicks++;                                  // le natif ferme GW, pose chain=publish, remplit le composer
  document.getElementById('gw-overlay').remove();
  sessionStorage.setItem('ks_content_chain', JSON.stringify({ step: 'publish', ts: Date.now() }));
  document.body.insertAdjacentHTML('beforeend',
    '<textarea id="sm-text">post</textarea><button class="sm-btn-primary" data-act="publish" style="width:40px;height:20px"></button>');
});
await koraChainPilot({ brief: BRIEF, phase: 'compose', pollMs: POLL });
await waitFor(() => sendClicks === 1 && koraChainPhase() === 'publish');
T('S4 post détecté → envoi auto (.gw-action-send cliqué)', sendClicks === 1);
T('S4 phase « publish » atteinte', koraChainPhase() === 'publish');
await waitFor(() => ring());
T('S4 anneau posé sur le bouton Publier (arrêt rouge)', ring());

/* ─────────── S5 — PUBLICATION (clearChain) → le pilote se retire ─────────── */
reset();
sessionStorage.setItem('ks_content_chain', JSON.stringify({ step: 'publish', ts: Date.now() }));
document.body.insertAdjacentHTML('beforeend',
  '<textarea id="sm-text">post</textarea><button class="sm-btn-primary" data-act="publish" style="width:40px;height:20px"></button>');
await koraChainPilot({ brief: BRIEF, phase: 'publish', pollMs: POLL });
await waitFor(() => ring());
sessionStorage.removeItem('ks_content_chain');         // = publication acceptée
await waitFor(() => koraChainPhase() === null);
T('S5 chaîne effacée (publication) → pilote arrêté', koraChainPhase() === null);

/* ─────────── S6 — ÉCHEC de composition (quota) → retrait propre ─────────── */
reset();
document.body.insertAdjacentHTML('beforeend', gwChainedHtml.replace('style="display:none"', ''));
await koraChainPilot({ brief: BRIEF, phase: 'compose', pollMs: POLL });
await sleep(250);
document.getElementById('gw-status').textContent = 'Quota atteint pour ce mois';
await waitFor(() => koraChainPhase() === null);
T('S6 échec de composition (statut sans ✓) → pilote arrêté', koraChainPhase() === null);

/* ─────────── S7 — SÉANCE FERMÉE pendant le débat → retrait ─────────── */
reset();
openWr();
setSessions([{ brief: BRIEF, history: [1, 2], synthesis: null }]);
await koraChainPilot({ brief: BRIEF, pollMs: POLL });
await sleep(250);
document.getElementById('wr-fullscreen').classList.remove('open');
await waitFor(() => koraChainPhase() === null);
T('S7 workspace fermé pendant le débat → pilote arrêté', koraChainPhase() === null);

/* ══════════════════════════════════════════════════════════════════
   S8 — LE BUG SIGNALÉ (19/07, captures Stéphane) : « une fois annulé,
   le trait rouge tourne toujours sur Publier ». On passe par le VRAI
   runKoraAction('chain.cancel') comme la boucle, on simule un timer
   « perdu » (double démarrage rapproché), et on attend PLUSIEURS ticks :
   si le pilote n'est pas vraiment mort, l'anneau REVIENT.
   ══════════════════════════════════════════════════════════════════ */
reset();
const { runKoraAction, koraAction } = await import('/app/kora-actions.js');   // paresseux : n'alourdit pas les scénarios légers
sessionStorage.setItem('ks_content_chain', JSON.stringify({ step: 'publish', ts: Date.now() }));
document.body.insertAdjacentHTML('beforeend',
  '<textarea id="sm-text">post</textarea><button class="sm-btn-primary" data-act="publish" style="width:40px;height:20px"></button>');
/* double démarrage rapproché = timer potentiellement orphelin */
koraChainPilot({ brief: BRIEF, phase: 'publish', pollMs: 120 });
koraChainPilot({ brief: BRIEF, phase: 'publish', pollMs: 120 });
await waitFor(() => ring());
T('S8 pilote actif (anneau sur Publier) après double démarrage', ring());

/* l'utilisateur dit « annule » → chain.cancel via la vraie boucle */
const res = await runKoraAction('chain.cancel');
T('S8 chain.cancel → fait:true & suivi:true', !!(res.ok && res.data.fait && res.data.suivi === true));
/* re-ring post-write de kora-loop (isWrite && result.ok && act.target) */
const target = koraAction('chain.cancel')?.target;
if (target) { await sleep(300); (await import('/app/kora.js')).koraRing(target); }
koraClearRings();   // finally de kora-loop
/* LE TEST : après plusieurs ticks, AUCUN anneau ne réapparaît, phase null.
   (avant le fix : un timer orphelin re-posait l'anneau rouge sur Publier.) */
await sleep(600);
T('S8 phase null après chain.cancel via la boucle', koraChainPhase() === null);
T('S8 AUCUN anneau ne réapparaît après plusieurs ticks (LE BUG)', !ring());

/* S8b — chain.cancel à vide (rien ne tourne) : honnête, pas de crash */
reset();
const res2 = await runKoraAction('chain.cancel');
T('S8b chain.cancel à vide → suivi:false, pas de crash', !!(res2.ok && res2.data.suivi === false));

/* ══════════════════════════════════════════════════════════════════
   S9 — COUPE-CIRCUIT INTER-ONGLETS (fix 19/07, 2e retour) : le jeton de
   génération est un état de CE module — un pilote armé dans un AUTRE
   onglet ne le voit pas. L'arrêt explicite écrit kora_chain_kill dans
   localStorage ; tout pilote démarré AVANT cet horodatage se retire à
   son prochain tick. On simule l'autre onglet en écrivant la clé à la
   main (sans passer par koraChainStop de CETTE instance).
   ══════════════════════════════════════════════════════════════════ */
reset();
sessionStorage.setItem('ks_content_chain', JSON.stringify({ step: 'publish', ts: Date.now() }));
document.body.insertAdjacentHTML('beforeend',
  '<textarea id="sm-text">post</textarea><button class="sm-btn-primary" data-act="publish" style="width:40px;height:20px"></button>');
await koraChainPilot({ brief: BRIEF, phase: 'publish', pollMs: POLL });
await waitFor(() => ring());
T('S9 pilote actif (anneau sur Publier)', ring());
await sleep(10);                                            // le kill doit être STRICTEMENT plus récent que le départ
localStorage.setItem('kora_chain_kill', String(Date.now())); // = « annule » dans un autre onglet
await waitFor(() => koraChainPhase() === null);
T('S9 kill diffusé par un autre onglet → pilote arrêté', koraChainPhase() === null);
koraClearRings();
await sleep(400);
T('S9 aucun anneau ne réapparaît après le kill', !ring());

/* S9b — un kill ANCIEN ne tue pas un pilote démarré APRÈS (sinon plus
   aucune chaîne ne pourrait jamais repartir après un premier « annule ») */
reset();
localStorage.setItem('kora_chain_kill', String(Date.now()));
await sleep(10);
sessionStorage.setItem('ks_content_chain', JSON.stringify({ step: 'publish', ts: Date.now() }));
document.body.insertAdjacentHTML('beforeend',
  '<textarea id="sm-text">post</textarea><button class="sm-btn-primary" data-act="publish" style="width:40px;height:20px"></button>');
await koraChainPilot({ brief: BRIEF, phase: 'publish', pollMs: POLL });
await sleep(500);
T('S9b kill antérieur au départ → le pilote neuf survit', koraChainPhase() === 'publish');

reset();
out.innerHTML += `\n<b>${ok} OK · ${ko} ÉCHEC(S)</b>`;
document.title = ko ? `ÉCHECS (${ko})` : 'TOUT VERT';
</script>
</body>
</html>
