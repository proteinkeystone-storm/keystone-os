<!DOCTYPE html>
<html lang="fr" class="light-mode"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>SDQR — refonte panneau Design</title>
<link rel="stylesheet" href="../../app/style.css">
<style>html,body{margin:0;background:#0f1d3a !important}.pad{max-width:460px;margin:0 auto;padding:20px;--gold:#6c6cf5}.tabwrap{background:#fff;border-radius:16px;padding:16px;margin-bottom:20px}.hd{color:#fff;font:800 13px -apple-system;margin:14px 0 8px}</style></head>
<body><div class="pad">

  <div class="hd">1 — Onglet MODULES (cartes-aperçu QR)</div>
  <div class="tabwrap"><div class="sdqr-design-body">
    <div class="sdqr-module-grid" id="modgrid"></div>
    <div class="sdqr-design-hint" style="margin-top:10px"><svg viewBox="0 0 24 24" style="width:13px;height:13px;vertical-align:-2px" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Un motif trop clairsemé fragilise le scan — le garde-fou prévient et corrige.</div>
  </div></div>

  <div class="hd">2 — Onglet LOGO (boutons visibles + réseaux sociaux)</div>
  <div class="tabwrap"><div class="sdqr-design-body">
    <div class="sdqr-design-section-title" style="font-weight:800;color:#1b2a4a;margin-bottom:10px">Logo central</div>
    <div class="sdqr-logo-zone has-logo" style="background:#f1f3f8;border-radius:14px;padding:14px;display:flex;align-items:center;gap:14px">
      <div class="sdqr-logo-zone-preview" style="width:56px;height:56px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center"><img id="lp" style="width:40px" alt=""></div>
      <div class="sdqr-logo-zone-actions">
        <label class="sdqr-logo-action sdqr-logo-action--primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Remplacer</label>
        <button class="sdqr-logo-action sdqr-logo-action--danger" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg> Retirer</button>
      </div>
    </div>
    <div class="sdqr-logo-lib-head">Réseaux sociaux</div>
    <div class="sdqr-logo-lib" id="brands"></div>
    <div class="sdqr-logo-lib-head">Icônes utiles</div>
    <div class="sdqr-logo-lib" id="icons"></div>
  </div></div>

  <div class="hd">3 — Onglet COULEURS (nuancier compact moderne)</div>
  <div class="tabwrap"><div class="sdqr-design-body">
    <div class="sdqr-swatch-grid" id="swatches"></div>
    <div class="sdqr-design-row"><span class="sdqr-design-lbl">Mode</span>
      <div class="sdqr-shape-pills"><button class="sdqr-shape-pill is-active">Unie</button><button class="sdqr-shape-pill">Dégradé</button></div></div>
    <div class="sdqr-color-grid">
      <label class="sdqr-color-field"><span class="sdqr-design-lbl-sm">Couleur</span><span class="sdqr-color-row"><input type="color" value="#4338ca"><input type="text" class="sdqr-hex" value="#4338ca"></span></label>
      <label class="sdqr-color-field"><span class="sdqr-design-lbl-sm">Fond</span><span class="sdqr-color-row"><input type="color" value="#ffffff"><input type="text" class="sdqr-hex" value="#ffffff"></span></label>
    </div>
    <div class="sdqr-design-row" style="margin-top:8px"><span class="sdqr-design-lbl">Yeux</span>
      <div class="sdqr-shape-pills"><button class="sdqr-shape-pill is-active">Comme modules</button><button class="sdqr-shape-pill">Couleur dédiée</button></div></div>
  </div></div>

</div>
<script type="module">
const { renderQrCustom } = await import('../../app/sdqr-render.js?cb=' + Date.now());
const SHAPES = [['square','Carré'],['dot','Point'],['rounded','Arrondi'],['circle','Plein'],['diamond','Losange'],['cross','Croix'],['classy','Feuille'],['fluid','Fluide'],['petal','Pétale']];
const mg = document.getElementById('modgrid');
for (const [shape,label] of SHAPES) {
  const svg = await renderQrCustom('https://protein-keystone.com', { module:{shape}, anchor:{outer:{shape:'rounded'},inner:{shape:'dot'}}, fg:'#1b2a4a' }, 88);
  const b = document.createElement('button'); b.className='sdqr-module-card'+(shape==='rounded'?' is-on':'');
  b.innerHTML = `<span class="sdqr-module-prev">${svg}</span><span class="sdqr-module-name">${label}</span>`;
  mg.appendChild(b);
}
// brands (copie de LOGO_BRANDS)
const BRANDS = [
  ['instagram','<rect x="3" y="3" width="18" height="18" rx="5.2" fill="none" stroke="#1b2a4a" stroke-width="2"/><circle cx="12" cy="12" r="4.1" fill="none" stroke="#1b2a4a" stroke-width="2"/><circle cx="17" cy="7" r="1.25" fill="#1b2a4a"/>'],
  ['facebook','<rect x="3" y="3" width="18" height="18" rx="5" fill="#1b2a4a"/><path d="M13.3 21v-6.6h2.2l.33-2.6h-2.53V10.1c0-.75.21-1.26 1.28-1.26h1.37V6.52a18 18 0 0 0-2-.1c-1.98 0-3.33 1.2-3.33 3.42v1.96H8.4v2.6h2.19V21z" fill="#fff"/>'],
  ['youtube','<rect x="2.3" y="6.2" width="19.4" height="11.6" rx="3.6" fill="#1b2a4a"/><path d="M10.2 9.3 15.2 12l-5 2.7z" fill="#fff"/>'],
  ['whatsapp','<path d="M12 3a9 9 0 0 0-7.74 13.6L3 21l4.5-1.18A9 9 0 1 0 12 3z" fill="#1b2a4a"/><path d="M9.32 8.1c-.17-.4-.31-.38-.5-.39l-.42-.01c-.15 0-.39.05-.59.28-.2.22-.77.75-.77 1.83s.79 2.12.9 2.27c.11.15 1.55 2.48 3.83 3.38 1.9.75 2.29.6 2.7.56.41-.04 1.32-.54 1.5-1.06.19-.52.19-.96.13-1.06-.06-.1-.21-.15-.44-.27-.23-.11-1.36-.67-1.57-.75-.21-.08-.36-.11-.52.11-.15.23-.59.75-.72.9-.13.15-.27.17-.5.06-.23-.12-.97-.36-1.85-1.14-.68-.61-1.14-1.36-1.28-1.59-.13-.23-.01-.35.1-.46.1-.1.23-.27.34-.4.11-.14.15-.23.23-.39.08-.15.04-.29-.02-.4-.06-.12-.5-1.27-.7-1.73z" fill="#fff"/>'],
  ['x','<path d="M4 4h3.6l4.2 5.7L16.4 4h3.1l-5.9 7.4L20 20h-3.6l-4.5-6.1L7 20H3.9l6.3-7.9z" fill="#1b2a4a"/>'],
  ['tiktok','<path d="M14 3c.3 1.9 1.55 3.4 3.45 3.78v2.5a6.2 6.2 0 0 1-3.45-1.06v5.55A4.9 4.9 0 1 1 9.1 8.9c.28 0 .55.03.82.08v2.62a2.32 2.32 0 1 0 1.63 2.22V3z" fill="#1b2a4a"/>'],
  ['linkedin','<rect x="3" y="3" width="18" height="18" rx="3.2" fill="#1b2a4a"/><circle cx="7.1" cy="7.3" r="1.5" fill="#fff"/><rect x="5.8" y="10" width="2.6" height="7.4" fill="#fff"/><path d="M10.6 10h2.5v1.05a2.8 2.8 0 0 1 2.45-1.25c1.85 0 2.65 1.15 2.65 3.25v4.35h-2.6v-3.85c0-1-.4-1.55-1.25-1.55s-1.45.6-1.45 1.6v3.8h-2.5z" fill="#fff"/>'],
  ['spotify','<circle cx="12" cy="12" r="9" fill="#1b2a4a"/><path d="M7.4 10.4c3.1-1 6.8-.7 9.3.85" stroke="#fff" stroke-width="1.7" fill="none" stroke-linecap="round"/><path d="M8 13.2c2.5-.8 5.3-.5 7.3.75" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M8.6 15.7c1.9-.55 3.9-.4 5.5.55" stroke="#fff" stroke-width="1.3" fill="none" stroke-linecap="round"/>'],
  ['snapchat','<path d="M12 3.4c2.35 0 3.78 1.7 3.85 4.05.03.9-.04 1.45.08 1.7.13.27.55.36.95.2.45-.18.92.04 1.02.36.1.34-.16.62-.74.86-.5.2-1.02.32-1.02.74 0 .5 1.05 1.3 2.06 1.7.4.16.3.66-.1.78-.5.15-1.02.05-1.2.5-.13.33.02.74-.46.86-.55.13-1.2-.4-2.07-.16-.78.22-1.32 1-2.83 1s-2.05-.78-2.83-1c-.87-.24-1.52.29-2.07.16-.48-.12-.33-.53-.46-.86-.18-.45-.7-.35-1.2-.5-.4-.12-.5-.62-.1-.78 1.01-.4 2.06-1.2 2.06-1.7 0-.42-.52-.54-1.02-.74-.58-.24-.84-.52-.74-.86.1-.32.57-.54 1.02-.36.4.16.82.07.95-.2.12-.25.05-.8.08-1.7C8.22 5.1 9.65 3.4 12 3.4z" fill="#1b2a4a"/>'],
  ['telegram','<circle cx="12" cy="12" r="9" fill="#1b2a4a"/><path d="M6.5 11.9 16 8.2c.5-.18.92.12.76.85l-1.62 7.62c-.12.55-.46.68-.93.42l-2.55-1.88-1.23 1.18c-.14.14-.25.25-.5.25l.18-2.56 4.65-4.2c.2-.18-.04-.28-.32-.1l-5.74 3.6-2.47-.77c-.54-.17-.55-.54.12-.8z" fill="#fff"/>'],
  ['pinterest','<circle cx="12" cy="12" r="9" fill="#1b2a4a"/><path d="M12.1 6.4c-3 0-4.6 2-4.6 3.95 0 .9.5 2.02 1.3 2.37.13.06.2.03.23-.1l.18-.73c.03-.1.01-.14-.06-.23-.36-.43-.5-1.18-.5-1.7 0-1.65 1.25-3.25 3.4-3.25 1.85 0 3.15 1.26 3.15 3.07 0 2.05-1.03 3.46-2.38 3.46-.74 0-1.3-.6-1.12-1.36.21-.9.62-1.86.62-2.51 0-.58-.31-1.06-.96-1.06-.76 0-1.37.78-1.37 1.83 0 .67.22 1.12.22 1.12l-.9 3.8c-.27 1.13-.04 2.5-.02 2.65 0 .08.11.1.16.04.07-.09.97-1.2 1.27-2.3l.49-1.9c.24.46.95.86 1.7.86 2.25 0 3.77-2.05 3.77-4.79 0-2.07-1.76-4-4.42-4z" fill="#fff"/>'],
];
document.getElementById('brands').innerHTML = BRANDS.map(([id,svg])=>`<button class="sdqr-logo-lib-btn sdqr-logo-lib-btn--brand" title="${id}"><svg viewBox="0 0 24 24">${svg}</svg></button>`).join('');
document.getElementById('lp').src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">'+BRANDS[0][1]+'</svg>');
const ICONS = ['<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>','<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/>','<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/>','<path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>'];
document.getElementById('icons').innerHTML = ICONS.map(svg=>`<button class="sdqr-logo-lib-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${svg}</svg></button>`).join('');
const SW = [['Noir','#111111'],['Navy','#0a2741'],['Indigo','#4338ca'],['Violet','#6d28d9'],['Océan','#0e7490'],['Émeraude','#047857'],['Framboise','#be123c'],['Ardoise','#334155']];
document.getElementById('swatches').innerHTML = SW.map(([l,c],i)=>`<button class="sdqr-swatch${i===2?' is-on':''}"><span class="sdqr-swatch-dot" style="background:${c}"></span><span class="sdqr-swatch-name">${l}</span></button>`).join('');
window.__GALLERY_DONE = true;
</script></body></html>
