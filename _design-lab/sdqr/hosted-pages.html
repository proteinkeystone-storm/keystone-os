<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>SDQR — pages hébergées (banc) : réseaux + carte de visite</title>
<style>
  :root { --bl:#4a90d9; --bld:#2f6cae; }
  * { box-sizing:border-box; }
  body { margin:0; padding:24px; background:#dfe5ec; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  h1 { font-size:15px; color:#1b2a4a; margin:0 0 16px; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:28px 26px; max-width:820px; }
  .cell { display:flex; flex-direction:column; align-items:center; }
  .lab { font-size:12px; font-weight:600; color:#3a4b6b; margin-bottom:9px; }
  .iph { width:378px; height:812px; background:#10182b; border-radius:56px; padding:12px; box-shadow:0 12px 30px rgba(8,15,35,.32); }
  .scr { width:100%; height:100%; border-radius:42px; overflow:hidden; position:relative; background:#fff; }
  .page { position:absolute; inset:0; overflow:hidden; }
  .safe { height:38px; }

  /* ===== Page RÉSEAUX (ref Photoshop) ===== */
  .soc { height:100%; background:linear-gradient(177deg,#0a0e20 0%,#141538 32%,#291b5c 64%,#4a2b8e 100%); padding:24px 30px 0; text-align:center; }
  .soc-photo { width:96px; height:96px; border-radius:50%; margin:14px auto 26px; background:linear-gradient(150deg,#c3d4e8,#9fb8d6); border:3px solid rgba(255,255,255,.28); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .soc-h { color:#fff; font-size:21px; font-weight:800; letter-spacing:-.02em; margin:0 0 30px; }
  .soc-btn { display:flex; align-items:center; height:56px; border-radius:15px; margin-bottom:15px; overflow:hidden; border:1px solid rgba(255,255,255,.16); }
  .soc-ico { width:50px; height:100%; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .soc-div { width:1px; height:28px; background:rgba(255,255,255,.30); flex:0 0 auto; }
  .soc-txt { color:#fff; font-size:12px; font-weight:600; padding-left:14px; text-align:left; white-space:nowrap; }
  .b-fb { background:rgba(66,103,178,.52); } .b-ig { background:rgba(214,52,100,.48); }
  .b-x  { background:rgba(20,20,22,.64); }   .b-li { background:rgba(36,121,190,.54); }

  /* ===== Cartes de visite ===== */
  .vc { height:100%; background:#eef2f7; }
  .vc-name { font-weight:800; letter-spacing:-.02em; }
  .vc-pos  { font-weight:500; }
  .vc-desc { color:#8a96a8; font-size:12px; text-align:center; }
  .actions3 { display:flex; gap:10px; }
  .act-sq { flex:1; background:var(--bl); color:#fff; border-radius:12px; padding:11px 0; text-align:center; }
  .act-sq .ai { display:block; margin:0 auto 5px; }
  .act-sq small { font-size:11px; font-weight:600; }
  .act-pill { display:flex; align-items:center; justify-content:center; gap:9px; background:var(--bl); color:#fff; border-radius:26px; padding:13px; font-size:14px; font-weight:600; }
  .tab { flex:1; display:flex; align-items:center; justify-content:center; gap:7px; color:var(--bl); font-size:12.5px; font-weight:600; padding:13px 0; }
  .tab + .tab { border-left:1px solid rgba(0,0,0,.07); }
  .row { display:flex; align-items:center; gap:13px; padding:12px 18px; background:#fff; border-bottom:1px solid #eef0f4; }
  .row .ric { width:28px; color:var(--bl); flex:0 0 auto; text-align:center; }
  .row .rlab { font-size:10px; color:#aab2c0; }
  .row .rval { font-size:13px; color:#2b3a55; font-weight:500; }
  .rowcard { margin:0 16px 10px; border-radius:13px; border:none; box-shadow:0 1px 5px rgba(20,40,80,.07); }
</style></head>
<body>
  <h1>Pages hébergées — banc largeur mobile réelle (réseaux Photoshop + 5 gabarits carte de visite). Données d'exemple.</h1>
  <div class="grid" id="grid"></div>

<script>
const ICON = {
  phone:'<svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .7-.2 1l-2.3 2.2z"/></svg>',
  mail:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>',
  web:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.6 2.6 2.6 15 0 18M12 3c-2.6 2.6-2.6 15 0 18"/></svg>',
  fax:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9V3h12v6"/><rect x="3" y="9" width="18" height="9" rx="2"/><path d="M7 18v3h10v-3"/></svg>',
};
const AV = (s)=>`<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="#fff"><circle cx="12" cy="9" r="4.4"/><path d="M3.5 21c0-4.2 3.8-7 8.5-7s8.5 2.8 8.5 7z"/></svg>`;
const SOC = {
  fb:'<svg viewBox="0 0 24 24" width="23" height="23" fill="#fff"><path d="M14 8.5V7c0-.7.3-1 1-1h1.6V3H14c-2 0-3.3 1.3-3.3 3.4V8.5H9v3h1.7V21H14v-9.5h2.2l.4-3z"/></svg>',
  ig:'<svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="#fff" stroke-width="1.9"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1.2" fill="#fff" stroke="none"/></svg>',
  x:'<svg viewBox="0 0 24 24" width="19" height="19" fill="#fff"><path d="M17.5 3h3l-7 8 8.2 10h-6.4l-5-6.1L8 21H5l7.4-8.5L4.5 3h6.6l4.4 5.6L17.5 3z"/></svg>',
  li:'<svg viewBox="0 0 24 24" width="21" height="21" fill="#fff"><path d="M6.5 8.5v10H3.5v-10zM5 3.5A1.8 1.8 0 1 1 5 7a1.8 1.8 0 0 1 0-3.5zM9 8.5h2.9v1.4c.5-.9 1.7-1.7 3.5-1.7 3 0 4.1 1.9 4.1 4.8v5.5h-3v-5c0-1.4-.5-2.3-1.8-2.3-1 0-1.6.7-1.9 1.4-.1.2-.1.5-.1.9v5H9z"/></svg>',
};
const RING = `<svg class="soc-logo" viewBox="0 0 100 100"><defs><linearGradient id="gld" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#dcc089"/><stop offset="1" stop-color="#a8843c"/></linearGradient></defs><path d="M35 26 A30 30 0 1 1 65 26" fill="none" stroke="url(#gld)" stroke-width="9" stroke-linecap="round"/><path d="M41 15 H59 L56 27 H44 Z" fill="url(#gld)"/><circle cx="50" cy="52" r="8" fill="#fff"/></svg>`;

function socialPage(){
  const b=(c,g,t)=>`<div class="soc-btn ${c}"><span class="soc-ico">${g}</span><span class="soc-div"></span><span class="soc-txt">${t}</span></div>`;
  return `<div class="soc"><div class="safe"></div><div class="soc-photo">${AV(66)}</div><h2 class="soc-h">Suivez moi sur les réseaux</h2>`
    + b('b-fb',SOC.fb,'Likez moi sur Facebook')
    + b('b-ig',SOC.ig,'Suivez moi sur Instagram')
    + b('b-x', SOC.x, 'Suivez moi sur X')
    + b('b-li',SOC.li,'Connectons nous sur LinkedIn')
    + `</div>`;
}

function rows(card){
  const r=(ic,lab,val)=>`<div class="row ${card?'rowcard':''}"><span class="ric">${ICON[ic]}</span><div><div class="rlab">${lab}</div><div class="rval">${val}</div></div></div>`;
  return r('phone','Mobile Phone (Work)','06 00 00 00 00')+r('phone','Phone','01 00 00 00 00')+r('phone','Mobile Phone','07 00 00 00 00')+r('fax','Fax','01 00 00 00 01')+r('mail','Email','vous@exemple.fr');
}
function act3sq(){const a=(ic,l)=>`<div class="act-sq"><span class="ai">${ICON[ic]}</span><small>${l}</small></div>`;return `<div class="actions3">${a('phone','Phone')+a('mail','Email')+a('web','Website')}</div>`;}
function tabs3(bg){const t=(ic,l,i)=>`<div class="tab" style="${i?'border-left:1px solid rgba(0,0,0,.07)':''}">${ICON[ic]}${l}</div>`;return `<div style="display:flex;background:${bg||'#fff'};border-bottom:1px solid #eef0f4">${t('phone','Phone',0)+t('mail','Email',1)+t('web','Website',1)}</div>`;}

// G1 — bandeau bleu arrondi, petite photo ronde, onglets, lignes plates
function vc1(){return `<div class="vc">
  <div style="background:var(--bl);border-radius:0 0 26px 26px;padding:56px 0 20px;text-align:center;color:#fff">
    <div style="width:74px;height:74px;border-radius:50%;background:#dfe9f5;margin:0 auto 10px;border:3px solid #fff;display:flex;align-items:center;justify-content:center">${AV(58)}</div>
    <div class="vc-name" style="font-size:20px">Your Full Name</div>
    <div class="vc-pos" style="font-size:12px;opacity:.92">Position - Company Name</div>
  </div>
  ${tabs3('#fff')}
  <div class="vc-desc" style="padding:13px 0;background:#fff">Personal Description</div>
  ${rows(false)}
</div>`;}

// G2 — vague bleue + nom en haut, grande photo débordante, boutons carrés, lignes-cartes
function vc2(){return `<div class="vc">
  <div style="background:var(--bl);height:158px;border-radius:0 0 52% 52%/0 0 40px 40px;text-align:center;color:#fff;padding-top:54px">
    <div class="vc-name" style="font-size:21px">Your Full Name</div>
    <div class="vc-pos" style="font-size:12px;opacity:.92">Position - Company Name</div>
  </div>
  <div style="width:118px;height:118px;border-radius:50%;background:#dfe9f5;border:4px solid #fff;margin:-38px auto 0;display:flex;align-items:center;justify-content:center">${AV(92)}</div>
  <div class="vc-desc" style="padding:14px 0">Personal Description</div>
  <div style="padding:0 18px 16px">${act3sq()}</div>
  ${rows(true)}
</div>`;}

// G3 — fond gris, carte bleue avec photo ronde + pilule d'onglets blanche
function vc3(){return `<div class="vc">
  <div style="padding:92px 16px 0">
    <div style="background:var(--bl);border-radius:20px;padding:52px 16px 18px;text-align:center;color:#fff;position:relative">
      <div style="width:82px;height:82px;border-radius:50%;background:#dfe9f5;border:3px solid #fff;display:flex;align-items:center;justify-content:center;position:absolute;top:-41px;left:50%;transform:translateX(-50%)">${AV(64)}</div>
      <div class="vc-name" style="font-size:20px">Your Full Name</div>
      <div class="vc-pos" style="font-size:12px;opacity:.92;margin-bottom:9px">Position - Company Name</div>
      <div style="color:#eaf1fb;font-size:11px;margin-bottom:14px">Personal Description</div>
      <div style="background:#fff;border-radius:11px;display:flex;overflow:hidden">${tabs3('#fff').replace('border-bottom:1px solid #eef0f4','')}</div>
    </div>
  </div>
  <div style="height:16px"></div>${rows(false)}
</div>`;}

// G4 — grande photo ronde, carte bleue nom+boutons carrés, lignes-cartes
function vc4(){return `<div class="vc">
  <div style="text-align:center;padding:56px 0 0"><div style="width:128px;height:128px;border-radius:50%;background:#cdd9ea;margin:0 auto;display:flex;align-items:center;justify-content:center;border:1px solid #fff">${AV(100)}</div></div>
  <div style="background:var(--bl);border-radius:20px;margin:16px 16px 0;padding:16px;text-align:center;color:#fff">
    <div class="vc-name" style="font-size:20px">Your Full Name</div>
    <div class="vc-pos" style="font-size:12px;opacity:.92">Position - Company Name</div>
    <div style="color:#eaf1fb;font-size:11px;margin:9px 0 14px">Personal Description</div>
    ${act3sq()}
  </div>
  <div style="height:14px"></div>${rows(true)}
</div>`;}

// G5 — photo plein cadre à bord courbe, nom dessous, boutons pilules pleine largeur
function vc5(){return `<div class="vc">
  <div style="height:208px;background:linear-gradient(150deg,#c3d4e8,#9fb8d6);position:relative;overflow:hidden">
    <div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%)">${AV(140).replace('#fff','#eef3f9')}</div>
    <svg viewBox="0 0 378 34" preserveAspectRatio="none" style="position:absolute;bottom:-1px;left:0;width:100%;height:34px"><path d="M0 34 V14 Q189 40 378 14 V34 Z" fill="#eef2f7"/></svg>
  </div>
  <div style="text-align:center;padding:8px 18px 0">
    <div class="vc-name" style="font-size:21px;color:#243b5e">Your Full Name</div>
    <div class="vc-pos" style="font-size:12px;color:#7b8aa3">Position - Company Name</div>
    <div class="vc-desc" style="margin:9px 0 14px">Personal Description</div>
    <div style="display:flex;flex-direction:column;gap:10px"><div class="act-pill">${ICON.phone}Phone</div><div class="act-pill">${ICON.mail}Email</div><div class="act-pill">${ICON.web}Website</div></div>
  </div>
  <div style="height:14px"></div>${rows(false)}
</div>`;}

const CELLS=[
  ['Réseaux sociaux (ref Photoshop)',socialPage()],
  ['Carte de visite — gabarit 1',vc1()],
  ['Carte de visite — gabarit 2',vc2()],
  ['Carte de visite — gabarit 3',vc3()],
  ['Carte de visite — gabarit 4',vc4()],
  ['Carte de visite — gabarit 5',vc5()],
];
const grid=document.getElementById('grid');
for(const [lab,html] of CELLS){
  const c=document.createElement('div');c.className='cell';
  c.innerHTML=`<div class="lab">${lab}</div><div class="iph"><div class="scr"><div class="page">${html}</div></div></div>`;
  grid.appendChild(c);
}
window.__SCAN_DONE=true;
</script>
</body></html>
