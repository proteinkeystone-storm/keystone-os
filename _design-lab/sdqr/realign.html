<!DOCTYPE html>
<html lang="fr" class="light-mode">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SDQR — banc d'essai réalignement (vrai style.css)</title>
<!-- LIE LE VRAI style.css : ce que j'édite ici EST ce qui partira en prod -->
<link rel="stylesheet" href="../../app/style.css">
<style>
  /* Le pad est position:fixed/inset:0 — on le force visible dans la page d'essai */
  html, body { margin:0; height:100%; background:#0a1226; }
  .sdqr-fullscreen { position: static !important; height: 100vh; }
</style>
</head>
<body>

<div class="sdqr-fullscreen open">

  <!-- ── TOPBAR (chrome) ───────────────────────────────────────── -->
  <div class="sdqr-topbar">
    <div class="sdqr-topbar-left">
      <div class="ws-topbar-brand">
        <a class="ws-topbar-logo" href="#" title="Dashboard">
          <span style="font-weight:900;color:#c9a84c;font-size:15px;letter-spacing:-.02em">KEYSTONE</span>
        </a>
        <button class="ws-topbar-back" title="Retour" aria-label="Retour">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:34px;height:34px"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      <div class="sdqr-title-zone">
        <span class="ws-topbar-app-picto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="2" height="2" fill="currentColor" stroke="none"/><rect x="19" y="19" width="2" height="2" fill="currentColor" stroke="none"/></svg>
        </span>
        <div class="sdqr-title">Smart Dynamic QR</div>
      </div>
    </div>
    <div class="sdqr-topbar-right">
      <button class="ws-iconbtn" title="Aide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:18px;height:18px"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17"/></svg></button>
      <a class="sdqr-pill sdqr-pill--ok" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;vertical-align:-1px;margin-right:4px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Souverain &middot; RGPD
      </a>
    </div>
  </div>

  <!-- ── BODY : sidebar + main ─────────────────────────────────── -->
  <div class="sdqr-body">

    <aside class="sdqr-sidebar">
      <div class="sdqr-sidebar-head">
        <span class="sdqr-sidebar-title">Mes QRs</span>
        <button class="sdqr-new-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouveau
        </button>
      </div>
      <button class="sdqr-overview-btn" style="display:flex;align-items:center;gap:8px;margin:0 12px 10px;width:calc(100% - 24px);padding:9px 11px;border:1px solid rgba(99,102,241,.4);background:rgba(99,102,241,.12);color:#1b2a4a;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" style="width:15px;height:15px"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6" rx="0.5"/><rect x="12" y="7" width="3" height="10" rx="0.5"/><rect x="17" y="13" width="3" height="4" rx="0.5"/></svg>
        Vue d'ensemble
      </button>
      <div class="sdqr-sidebar-filters">
        <div class="sdqr-search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="sdqr-search-ico"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" class="sdqr-search-input" placeholder="Rechercher…">
          <kbd class="sdqr-search-kbd">&#8984;K</kbd>
        </div>
        <div class="sdqr-filter-pills">
          <button class="sdqr-filter-pill is-active">Tous</button>
          <button class="sdqr-filter-pill">Actifs</button>
          <button class="sdqr-filter-pill">Archivés</button>
        </div>
      </div>
      <div class="sdqr-sidebar-list">
        <button class="sdqr-li is-selected">
          <div class="sdqr-li-hd"><span class="sdqr-li-name">Bache chantier Azur</span><span class="sdqr-li-scans">128</span></div>
          <div class="sdqr-li-meta"><span class="sdqr-li-type">URL</span><span class="sdqr-li-status">Brouillon</span></div>
          <div class="sdqr-li-tags"><span class="sdqr-li-tag">chantier</span><span class="sdqr-li-tag">azur</span></div>
        </button>
        <button class="sdqr-li">
          <div class="sdqr-li-hd"><span class="sdqr-li-name">Menu restaurant</span><span class="sdqr-li-scans">54</span></div>
          <div class="sdqr-li-meta"><span class="sdqr-li-type">PDF</span></div>
        </button>
        <button class="sdqr-li">
          <div class="sdqr-li-hd"><span class="sdqr-li-name">Concierge Villa</span><span class="sdqr-li-scans">312</span></div>
          <div class="sdqr-li-meta"><span class="sdqr-li-type">Smart</span></div>
        </button>
      </div>
    </aside>

    <main class="sdqr-main">
      <div class="sdqr-tabs">
        <button class="sdqr-tab active">Studio</button>
        <button class="sdqr-tab">Statistiques</button>
      </div>
      <div class="sdqr-content sdqr-content--create" id="sdqr-content">

        <!-- ── FORMULAIRE DE CRÉATION (cible : panneaux blancs / cadre navy) ── -->
        <div class="sdqr-form-wrap">
          <div class="sdqr-form-head">
            <h2 class="sdqr-form-title">Nouveau QR code</h2>
            <p class="sdqr-form-sub">Choisissez ce qu'il doit faire — on s'occupe du reste.</p>
          </div>

          <!-- ÉTAPE 1 — Contenu (carte blanche) -->
          <section class="sdqr-step">
            <header class="sdqr-step-hd">
              <span class="sdqr-step-num">1</span>
              <span class="sdqr-step-title">Contenu</span>
            </header>

            <div class="sdqr-mode-toggle">
              <button class="sdqr-mode-btn">
                <span class="sdqr-mode-dot"></span>
                <div class="sdqr-mode-txt"><strong>Standard</strong><small>Permanent &middot; gratuit &middot; non modifiable</small></div>
              </button>
              <button class="sdqr-mode-btn is-active">
                <span class="sdqr-mode-dot"></span>
                <div class="sdqr-mode-txt"><strong>Dynamique</strong><small>Modifiable &middot; suivi &middot; stats</small></div>
              </button>
              <button class="sdqr-mode-btn">
                <span class="sdqr-mode-dot"></span>
                <div class="sdqr-mode-txt"><strong>Smart &#10022;</strong><small>Interstitiel personnalisé</small></div>
              </button>
            </div>

            <div class="sdqr-type-cards">
              <div class="sdqr-fam-row">
                <button class="sdqr-fam-pill is-active"><span class="sdqr-fam-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span>Liens</button>
                <button class="sdqr-fam-pill"><span class="sdqr-fam-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Contact</button>
                <button class="sdqr-fam-pill"><span class="sdqr-fam-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></span>Pratique</button>
              </div>
              <div class="sdqr-type-cards-grid">
                <button class="sdqr-type-card is-active">
                  <span class="sdqr-type-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span>
                  <span class="sdqr-type-label">URL</span>
                  <span class="sdqr-type-desc">Un lien web classique</span>
                </button>
                <button class="sdqr-type-card">
                  <span class="sdqr-type-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg></span>
                  <span class="sdqr-type-label">Texte</span>
                  <span class="sdqr-type-desc">Un message brut</span>
                </button>
              </div>
            </div>

            <div class="sdqr-form-grid">
              <label class="sdqr-field sdqr-field--full">
                <span class="sdqr-field-lbl">Adresse du lien <span class="sdqr-req">*</span></span>
                <input type="text" class="sdqr-input" placeholder="https://votre-site.com">
              </label>
            </div>
          </section>

          <!-- ÉTAPE 2 — Détails (carte blanche) -->
          <section class="sdqr-step">
            <header class="sdqr-step-hd">
              <span class="sdqr-step-num">2</span>
              <span class="sdqr-step-title">Détails</span>
              <span class="sdqr-step-opt">repérage interne</span>
            </header>
            <div class="sdqr-form-grid">
              <label class="sdqr-field sdqr-field--full">
                <span class="sdqr-field-lbl">Nom interne <span class="sdqr-req">*</span></span>
                <input type="text" class="sdqr-input" placeholder="ex: Bache chantier Azur">
              </label>
              <label class="sdqr-field sdqr-field--full">
                <span class="sdqr-field-lbl">Tags (séparés par virgule)</span>
                <input type="text" class="sdqr-input" placeholder="ex: chantier, azur, 2027">
              </label>
            </div>
          </section>

          <div class="sdqr-form-actions">
            <button class="sdqr-btn sdqr-btn--ghost">Annuler</button>
            <button class="sdqr-btn sdqr-btn--primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Créer le QR
            </button>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

</body>
</html>
