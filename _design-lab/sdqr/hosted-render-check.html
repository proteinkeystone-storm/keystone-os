<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>SDQR — vérif rendu WORKER (réseaux + carte de visite)</title>
<style>
  body { margin:0; padding:24px; background:#dfe5ec; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  h1 { font-size:15px; color:#1b2a4a; margin:0 0 4px; }
  p.sub { font-size:12px; color:#6b7790; margin:0 0 18px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px 16px; max-width:780px; }
  .cell { display:flex; flex-direction:column; align-items:center; }
  .lab { font-size:11px; font-weight:600; color:#3a4b6b; margin-bottom:8px; text-align:center; }
  .iph { width:236px; height:494px; background:#10182b; border-radius:42px; padding:9px; box-shadow:0 10px 26px rgba(8,15,35,.3); }
  .scr { width:100%; height:100%; border-radius:34px; overflow:hidden; position:relative; background:#fff; }
  .frame { position:absolute; top:0; left:0; width:390px; height:794px; border:0; transform:scale(0.5589); transform-origin:top left; background:#fff; }
</style></head>
<body>
  <h1>Vérification du VRAI rendu worker (renderHTML) — réseaux sociaux + carte de visite (5 designs)</h1>
  <p class="sub">Chaque iPhone affiche la page réellement servie au scan (sandbox statique). Données d'exemple.</p>
  <div class="grid" id="grid"></div>
<script type="module">
  // Cache-bust du module (le navigateur garde l'ancien index.js en cache ES).
  const { getTemplate } = await import('../../workers/src/routes/smart-templates/index.js?v=hrc2');

  const CV = {
    full_name:'Prénom Nom', position:'Votre fonction', company:'Votre société',
    description:'Quelques mots de présentation.',
    phone_work:'06 00 00 00 00', phone:'01 00 00 00 00', mobile:'07 00 00 00 00',
    fax:'01 00 00 00 01', email:'vous@exemple.fr', website:'https://votre-site.fr',
    accent_color:'#4a90d9',
  };
  // Photo d'exemple PORTRAIT, ostensiblement fictive (label « Exemple »),
  // en data-URI base64 (seul format accepté par safeUrl du worker). Portrait
  // 380×480 → on VOIT le recadrage object-fit:cover plein cadre du design 5.
  const PHOTO_SVG = `<svg xmlns='http://www.w3.org/2000/svg' width='380' height='480' viewBox='0 0 380 480'>`
    + `<defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='#7d97d6'/><stop offset='1' stop-color='#385399'/></linearGradient></defs>`
    + `<rect width='380' height='480' fill='url(#g)'/>`
    + `<circle cx='190' cy='176' r='84' fill='#eaf0fb'/>`
    + `<path d='M52 480 C52 358 128 296 190 296 C252 296 328 358 328 480 Z' fill='#eaf0fb'/>`
    + `<text x='190' y='250' font-family='sans-serif' font-size='22' font-weight='700' fill='#385399' text-anchor='middle' opacity='.55'>Exemple</text>`
    + `</svg>`;
  const PHOTO = 'data:image/svg+xml;base64,' + btoa(PHOTO_SVG);
  const CELLS = [
    ['Réseaux sociaux', 'reseaux-sociaux',
      { smart_title:'Suivez moi sur les réseaux',
        template_data:{ facebook_url:'https://facebook.com/x', instagram_url:'https://instagram.com/x', x_url:'https://x.com/x', linkedin_url:'https://linkedin.com/in/x' } }],
    ['Carte de visite — design 1', 'carte-visite', { template_data:{ ...CV, layout:'1' } }],
    ['Carte de visite — design 2', 'carte-visite', { template_data:{ ...CV, layout:'2' } }],
    ['Carte de visite — design 3', 'carte-visite', { template_data:{ ...CV, layout:'3' } }],
    ['Carte de visite — design 4', 'carte-visite', { template_data:{ ...CV, layout:'4' } }],
    ['Design 5 — AVEC photo (plein cadre)', 'carte-visite', { template_data:{ ...CV, layout:'5', photo_url:PHOTO } }],
    ['Design 5 — SANS photo (garde-fou silhouette)', 'carte-visite', { template_data:{ ...CV, layout:'5' } }],
  ];
  const grid = document.getElementById('grid');
  for (const [lab, id, extra] of CELLS) {
    const tpl = getTemplate(id);
    const qrData = { short_id:'PREVIEW', template_id:id, smart_title:extra.smart_title||'', smart_message:'', name:lab, template_data:extra.template_data||{} };
    let html = '';
    try { html = tpl.renderHTML(qrData, {}); } catch (e) { html = '<p style="color:#b00;font:13px sans-serif;padding:16px">KO: '+e.message+'</p>'; }
    const srcdoc = html.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `<div class="lab">${lab}</div><div class="iph"><div class="scr"><iframe class="frame" sandbox="" srcdoc="${srcdoc}"></iframe></div></div>`;
    grid.appendChild(cell);
  }
  // Laisse les iframes sandbox peindre avant la capture headless (sinon le
  // dernier cadre créé est encore blanc au moment du screenshot).
  await new Promise(r => setTimeout(r, 600));
  window.__SCAN_DONE = true;
</script>
</body></html>
