<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SDQR — banc cadres (visuel + scannabilité jsQR)</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#0f1d3a; color:#e8edf8; margin:0; padding:24px; }
  h1 { font-size:18px; } .sub { color:#9fb0cc; font-size:13px; margin-bottom:18px; }
  #summary { font-size:15px; font-weight:700; margin:10px 0 18px; }
  .ok { color:#7ee0b5; } .ko { color:#ff9a9a; }
  .grid { display:flex; flex-wrap:wrap; gap:18px; }
  .card { background:#16243f; border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:14px; width:230px; }
  .card .qr { background:#fff; border-radius:10px; padding:8px; display:flex; justify-content:center; }
  .card .qr svg { width:200px; height:auto; display:block; }
  .card .meta { margin-top:10px; display:flex; align-items:center; justify-content:space-between; }
  .card .name { font-size:13px; font-weight:700; }
  .badge { font-size:11px; font-weight:700; padding:2px 9px; border-radius:6px; }
  .badge.ok { background:rgba(46,179,124,.18); color:#7ee0b5; } .badge.ko { background:rgba(239,68,68,.18); color:#ff9a9a; }
</style>
</head>
<body>
<h1>Banc cadres SDQR — visuel + scannabilité jsQR</h1>
<p class="sub">Chaque style de cadre (accroche « Scannez-moi », couleur navy) est rendu par le vrai moteur puis décodé. Le cadre est AUTOUR du QR → le code doit rester scannable.</p>
<div id="summary">Chargement…</div>
<div class="grid" id="grid"></div>

<script type="module">
// Cache-bust : le navigateur met en cache le module ES → on force un fetch
// frais à chaque chargement du banc (sinon on teste une version périmée).
const { renderQrCustom, FRAME_OPTS } = await import('../../app/sdqr-render.js?cb=' + Date.now());
import jsQR from 'https://esm.sh/jsqr@1.4.0';

const TXT = 'https://protein-keystone.com/r/AB12CD34';

function withTimeout(p, ms) {
  return Promise.race([p, new Promise(r => setTimeout(() => r('__timeout__'), ms))]);
}
async function decodeFramed(svg, w, h) {
  const img = new Image();
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  await img.decode();
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
  ctx.drawImage(img, 0, 0, w, h);
  const res = jsQR(ctx.getImageData(0,0,w,h).data, w, h);
  return !!res && res.data === TXT;
}

const grid = document.getElementById('grid');
const cards = [];
// 1) Rendu VISUEL d'abord (toujours affiché, même si le décodage flanche).
for (const f of FRAME_OPTS) {
  let svg = '';
  try { svg = await renderQrCustom(TXT, { module:{shape:'rounded'}, anchor:{outer:{shape:'rounded'},inner:{shape:'dot'}}, frame:{ style:f.id, text:'Scannez-moi', color:'#1B2A4A' } }, 280); }
  catch (e) { svg = '<div style="color:#ff9a9a">ERR '+e.message+'</div>'; }
  const m = svg.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/);
  const W = m ? Math.round(+m[1]) : 280, Hh = m ? Math.round(+m[2]) : 280;
  const card = document.createElement('div'); card.className='card';
  card.innerHTML = `<div class="qr">${svg}</div><div class="meta"><span class="name">${f.label} (${f.id})</span><span class="badge" id="b-${f.id}">…</span></div>`;
  grid.appendChild(card);
  cards.push({ id:f.id, svg, W, Hh });
}
document.getElementById('summary').textContent = 'Visuels rendus — décodage en cours…';

// 2) Décodage non bloquant (timeout 5s/cadre → « non vérifié » au lieu de bloquer).
let pass = 0, done = 0;
for (const c of cards) {
  const r = await withTimeout(decodeFramed(c.svg, c.W, c.Hh).catch(() => false), 5000);
  const ok = r === true;
  if (ok) pass++;
  done++;
  const b = document.getElementById('b-' + c.id);
  if (b) { b.textContent = ok ? 'scan OK' : (r === '__timeout__' ? 'non vérifié' : '✗'); b.className = 'badge ' + (ok ? 'ok' : 'ko'); }
}
const s = document.getElementById('summary');
s.textContent = `${pass}/${cards.length} cadres scannables (décodés)`;
s.className = pass === cards.length ? 'ok' : 'ko';
window.__FRAME_RESULT = { pass, tot: cards.length };
</script>
</body>
</html>
