<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kora — Bouton voix (simulation)</title>
<style>
  /* ── Simulation : bouton voix compact À DROITE de « Envoyer », même
     gabarit, qui reprend l'animation du galet Kora (repérable d'un coup
     d'œil). Maintien = parler ; la zone de saisie devient le bandeau
     d'enregistrement ; glisser ← pour annuler. Charte Kora honorée. ── */
  :root{
    --bg:#080a18; --sheet:#0b0d20; --sheet-2:#0e1028;
    --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.14);
    --ink:#e8e9f5; --ink-2:rgba(232,233,245,.55); --ink-3:rgba(232,233,245,.32);
    --violet:#7d6bf0; --blue:#4a7df5; --teal:#1ae09e; --cyan:#26bfd9; --rose:#f0708a;
    --bubble-user:rgba(99,102,241,.16); --bubble-user-b:rgba(139,144,255,.30);
    --bubble-k:rgba(255,255,255,.045); --bubble-k-b:rgba(255,255,255,.10);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:radial-gradient(120% 60% at 50% 0%, #10132e 0%, var(--bg) 55%), var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    letter-spacing:-.01em; -webkit-user-select:none; user-select:none; overflow:hidden;
  }
  .app{ height:100dvh; display:flex; flex-direction:column; max-width:520px; margin:0 auto;
    border-left:1px solid var(--line); border-right:1px solid var(--line); }

  .hdr{ flex:0 0 auto; display:flex; align-items:center; gap:12px; padding:calc(env(safe-area-inset-top) + 12px) 16px 12px; }
  .brand{ font-weight:900; letter-spacing:.06em; font-size:17px; display:flex; align-items:center; gap:8px; }
  .brand .mark{ width:26px; height:26px; border-radius:50%; border:2px solid var(--violet); display:grid; place-items:center; }
  .brand .mark i{ width:7px; height:7px; border-radius:50%; background:var(--blue); box-shadow:0 0 10px var(--blue); }
  .chrome{ display:flex; gap:8px; margin-left:6px; }
  .chip{ width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:rgba(255,255,255,.04); display:grid; place-items:center; color:var(--ink-2); }
  .chip svg{ width:16px; height:16px; }
  .galet{ margin-left:auto; width:118px; height:34px; border-radius:9px; border:1px solid rgba(125,107,240,.35); background:rgba(125,107,240,.06); display:block; }

  .sheet{ flex:1 1 auto; display:flex; flex-direction:column; min-height:0; margin:0 8px 0;
    border:1px solid var(--line); border-top-left-radius:16px; border-top-right-radius:16px;
    background:linear-gradient(180deg, var(--sheet) 0%, var(--sheet-2) 100%); position:relative; overflow:hidden; }
  .sheet::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:34%; background:linear-gradient(180deg, transparent, rgba(125,107,240,.12)); pointer-events:none; }
  .s-head{ flex:0 0 auto; padding:20px 22px 0; position:relative; }
  .k-title{ font-weight:900; font-size:13px; letter-spacing:.3em; color:rgba(232,233,245,.85); }
  .k-sub{ font-size:12px; color:var(--ink-2); margin-top:3px; transition:color .3s; }
  .k-tools{ position:absolute; top:16px; right:18px; display:flex; gap:8px; }
  .k-tools .chip{ width:34px; height:34px; }
  .k-tools .voice{ color:#8ce0c4; border-color:rgba(46,197,168,.38); background:rgba(46,197,168,.12); }

  .log{ flex:1 1 auto; min-height:0; overflow-y:auto; overscroll-behavior:contain; display:flex; flex-direction:column; gap:8px; padding:14px 18px 8px; margin-top:auto; z-index:1; }
  .line{ max-width:88%; font-size:13.5px; line-height:1.45; padding:9px 13px; border-radius:12px; border:1px solid var(--bubble-k-b); background:var(--bubble-k); color:rgba(232,233,245,.9); white-space:pre-wrap; opacity:0; transform:translateY(8px); transition:opacity .4s, transform .4s; }
  .line.on{ opacity:1; transform:none; }
  .line.user{ align-self:flex-end; text-align:right; background:var(--bubble-user); border-color:var(--bubble-user-b); }
  .line .vtag{ display:inline-flex; align-items:center; gap:5px; color:var(--ink-2); }
  .line .vtag svg{ width:13px; height:13px; }

  .dock{ flex:0 0 auto; padding:10px 14px calc(env(safe-area-inset-bottom) + 12px); z-index:1; }
  .inputbar{ display:flex; gap:8px; align-items:center; }

  /* zone de saisie qui devient le bandeau d'enregistrement */
  .field{ flex:1 1 auto; min-width:0; position:relative; height:42px; }
  .field input{ position:absolute; inset:0; width:100%; height:100%; font:inherit; font-size:13.5px; color:var(--ink-3);
    background:rgba(255,255,255,.05); border:1px solid var(--line-2); border-radius:11px; padding:0 13px; outline:none; transition:opacity .18s; }
  .recstrip{ position:absolute; inset:0; display:none; align-items:center; gap:9px; padding:0 12px;
    background:rgba(26,224,158,.10); border:1px solid rgba(26,224,158,.42); border-radius:11px; }
  .inputbar.rec .field input{ opacity:0; }
  .inputbar.rec .recstrip{ display:flex; }
  .inputbar.cancel .recstrip{ background:rgba(240,112,138,.14); border-color:rgba(240,112,138,.5); }
  .rs-dot{ width:8px; height:8px; border-radius:50%; background:var(--teal); box-shadow:0 0 8px var(--teal); animation:pulse 1.1s ease-in-out infinite; }
  .inputbar.cancel .rs-dot{ background:var(--rose); box-shadow:0 0 8px var(--rose); }
  .rs-timer{ font-variant-numeric:tabular-nums; font-size:13px; font-weight:600; color:var(--teal); min-width:34px; }
  .inputbar.cancel .rs-timer{ color:var(--rose); }
  .rs-wave{ flex:1 1 auto; height:24px; display:block; min-width:0; }
  .rs-hint{ font-size:11.5px; color:var(--ink-2); white-space:nowrap; }
  .inputbar.cancel .rs-hint{ color:var(--rose); font-weight:600; }

  .send, .talk{ flex:0 0 auto; width:44px; height:42px; border-radius:11px; display:grid; place-items:center; padding:0; }
  .send{ border:1px solid rgba(139,144,255,.28); background:rgba(139,144,255,.14); color:#c9ccff; transition:opacity .18s; }
  .send svg{ width:17px; height:17px; }
  .inputbar.rec .send{ opacity:.28; pointer-events:none; }

  /* LE bouton voix : même gabarit que Envoyer, reprend l'animation du galet */
  .talk{ border:1px solid rgba(125,107,240,.42); background:rgba(125,107,240,.10); overflow:hidden; position:relative;
    touch-action:none; cursor:pointer; transition:background .2s, border-color .2s, box-shadow .2s, transform .12s; }
  .talk canvas{ width:100%; height:100%; display:block; }
  .talk:active{ transform:scale(.96); }
  .talk.rec{ border-color:rgba(26,224,158,.55); background:rgba(26,224,158,.16);
    box-shadow:0 0 0 1px rgba(26,224,158,.22), 0 6px 22px -8px rgba(26,224,158,.7); }
  .talk.cancel{ border-color:rgba(240,112,138,.55); background:rgba(240,112,138,.16); box-shadow:0 0 0 1px rgba(240,112,138,.22); }

  .toast{ position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 96px); transform:translate(-50%,10px);
    background:rgba(12,14,32,.96); border:1px solid var(--line-2); color:var(--ink); padding:9px 15px; border-radius:11px;
    font-size:13px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; backdrop-filter:blur(10px); z-index:5; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
  .tag{ position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:50%; transform:translateX(-50%); font-size:10px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--ink-3); border:1px solid var(--line); border-radius:20px; padding:3px 10px; background:rgba(8,10,24,.6); z-index:6; }

  @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.45; transform:scale(.8);} }
  @media (prefers-reduced-motion:reduce){ .rs-dot{ animation:none; } }
</style>
</head>
<body>


<div class="tag">Simulation · geste seulement</div>
<div class="app">
  <div class="hdr">
    <div class="brand"><span class="mark"><i></i></span>KeyStone</div>
    <div class="chrome">
      <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
      <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
      <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
    </div>
    <canvas class="galet" id="galet"></canvas>
  </div>

  <div class="sheet">
    <div class="s-head">
      <div class="k-title">K O R A</div>
      <div class="k-sub" id="sub">prête</div>
      <div class="k-tools">
        <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></span>
        <span class="chip voice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>
      </div>
    </div>

    <div class="log" id="log">
      <div class="line user on">Combien de scans cette semaine&nbsp;?</div>
      <div class="line on">Je regarde les scans de tes QR codes.</div>
      <div class="line on">Il y a eu 12 scans cette semaine.</div>
    </div>

    <div class="dock">
      <div class="inputbar" id="inputbar">
        <div class="field">
          <input type="text" placeholder="Demande-moi — « prépare-moi un post sur… »" readonly>
          <div class="recstrip">
            <span class="rs-dot"></span>
            <span class="rs-timer" id="timer">0:00</span>
            <canvas class="rs-wave" id="rswave"></canvas>
            <span class="rs-hint" id="rshint">glisse ← pour annuler</span>
          </div>
        </div>
        <button class="send" aria-label="Envoyer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        <button class="talk" id="talk" aria-label="Maintiens pour parler"><canvas id="talkgalet"></canvas></button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  function setup(cv, bars){
    var ctx=cv.getContext('2d'), dpr=Math.min(devicePixelRatio||1,2);
    function size(){ var r=cv.getBoundingClientRect(); cv.width=Math.max(2,r.width*dpr); cv.height=Math.max(2,r.height*dpr); }
    size(); addEventListener('resize', size);
    return { ctx:ctx, dpr:dpr, cv:cv, bars:bars };
  }
  var G  = setup(document.getElementById('galet'), 22);      // témoin header
  var T  = setup(document.getElementById('talkgalet'), 9);   // bouton voix (mini galet)
  var RW = setup(document.getElementById('rswave'), 20);     // bandeau d'enregistrement

  var galetActive=0, galetTarget=0, level=0, levelTarget=.2, t=0;
  function mix(a,b,k){ return [a[0]+(b[0]-a[0])*k, a[1]+(b[1]-a[1])*k, a[2]+(b[2]-a[2])*k]; }
  var C_REST_A=[125,107,240], C_REST_B=[74,125,245], C_TEAL_A=[26,224,158], C_TEAL_B=[38,191,217];

  function drawBars(S, active, lvl, cancel){
    var ctx=S.ctx, w=S.cv.width, h=S.cv.height, n=S.bars, dpr=S.dpr;
    ctx.clearRect(0,0,w,h);
    var gap=Math.max(2,2*dpr), bw=(w-gap*(n-1))/n, mid=h/2;
    for(var i=0;i<n;i++){
      var ph=t*2.1+i*0.55;
      var env=0.35+0.65*Math.abs(Math.sin(i/n*Math.PI));
      var amp=(0.18+active*0.30)+lvl*0.6*active;
      var hh=(0.12+amp*env*(0.5+0.5*Math.sin(ph))+0.05*Math.sin(ph*2.3))*h;
      hh=Math.max(2.4*dpr, Math.min(h*0.94, hh));
      var k=i/(n-1), col;
      if(cancel) col=[240,112,138];
      else col=active>0.5?mix(C_TEAL_A,C_TEAL_B,k):mix(C_REST_A,C_REST_B,k);
      col=mix(col,[255,255,255],0.10*(0.5+0.5*Math.sin(ph)));
      ctx.fillStyle='rgba('+(col[0]|0)+','+(col[1]|0)+','+(col[2]|0)+','+(0.6+0.35*active)+')';
      var x=i*(bw+gap), r=Math.min(bw/2,2.4*dpr), y=mid-hh/2;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(x,y,bw,hh,r); else ctx.rect(x,y,bw,hh);
      ctx.fill();
    }
  }
  function frame(now){
    t=(now||0)/1000;
    galetActive+=(galetTarget-galetActive)*0.12;
    level+=(levelTarget-level)*0.15;
    if(state==='rec') levelTarget=0.35+0.5*Math.abs(Math.sin(t*3.1)*Math.sin(t*1.3))+0.12*Math.sin(t*7.0);
    drawBars(G, galetActive, level, false);
    drawBars(T, galetActive, level, state==='cancel');   // le bouton voix vit toujours (repérable), turquoise à l'écoute
    if(state==='rec'||state==='cancel') drawBars(RW, 1, level, state==='cancel');
    else RW.ctx.clearRect(0,0,RW.cv.width,RW.cv.height);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  var talk=document.getElementById('talk'), bar=document.getElementById('inputbar'), sub=document.getElementById('sub'),
      timerEl=document.getElementById('timer'), rshint=document.getElementById('rshint'), log=document.getElementById('log'), toastEl=document.getElementById('toast');
  var state='idle', startX=0, t0=0, sec=0, timerInt=0, CANCEL_DX=58, demoI=0;

  function fmt(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
  function buzz(ms){ try{ navigator.vibrate&&navigator.vibrate(ms); }catch(e){} }
  function showToast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(function(){ toastEl.classList.remove('show'); },1400); }

  function enterRec(){
    state='rec'; sec=0; timerEl.textContent='0:00';
    bar.classList.add('rec'); bar.classList.remove('cancel'); talk.classList.add('rec'); talk.classList.remove('cancel');
    sub.textContent='à l’écoute…'; galetTarget=1; buzz(15);
    timerInt=setInterval(function(){ sec++; timerEl.textContent=fmt(sec); if(sec>=60) onUp(); },1000);
  }
  function toCancel(on){
    if(on&&state==='rec'){ state='cancel'; bar.classList.add('cancel'); talk.classList.add('cancel'); rshint.textContent='relâche pour annuler'; buzz(10); }
    else if(!on&&state==='cancel'){ state='rec'; bar.classList.remove('cancel'); talk.classList.remove('cancel'); rshint.textContent='glisse ← pour annuler'; }
  }
  function stopRec(){ clearInterval(timerInt); bar.classList.remove('rec','cancel'); talk.classList.remove('rec','cancel'); sub.textContent='prête'; galetTarget=0; levelTarget=.2; }

  function addLine(html,user){ var d=document.createElement('div'); d.className='line'+(user?' user':''); d.innerHTML=html;
    log.appendChild(d); requestAnimationFrame(function(){ d.classList.add('on'); log.scrollTop=log.scrollHeight; }); return d; }
  var DEMOS=[
    {u:'Combien de scans aujourd’hui&nbsp;?', a:['Je regarde tes QR codes.','Aucun scan aujourd’hui — 12 cette semaine.']},
    {u:'Qui je dois relancer&nbsp;?', a:['Je regarde tes relances networK.','2 contacts à recontacter : Camille Leroy et Yanis B.']},
    {u:'Quoi de neuf&nbsp;?', a:['Je fais le tour de ton tableau de bord.','4 sites en ligne, 3 posts programmés cette semaine.']}
  ];
  var MIC='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>';
  function sendSim(){
    var d=DEMOS[demoI%DEMOS.length]; demoI++;
    addLine('<span class="vtag">'+MIC+' '+d.u+'</span>', true);
    showToast('Message envoyé'); galetTarget=1; sub.textContent='je réfléchis…';
    setTimeout(function(){ addLine(d.a[0]); sub.textContent='je travaille…'; },520);
    setTimeout(function(){ addLine(d.a[1]); },1250);
    setTimeout(function(){ sub.textContent='prête'; galetTarget=0; },2100);
  }

  function onMove(e){
    if(state==='idle') return;
    var x=e.clientX!=null?e.clientX:(e.touches&&e.touches[0]?e.touches[0].clientX:startX);
    toCancel((startX-x)>CANCEL_DX);   // glisse vers la GAUCHE = annuler
  }
  function onUp(){
    removeEventListener('pointermove', onMove);
    var dur=performance.now()-t0, wasCancel=state==='cancel', tooShort=dur<350&&!wasCancel;
    stopRec(); state='idle';
    if(tooShort){ showToast('Maintiens pour parler'); return; }
    if(wasCancel){ showToast('Annulé'); return; }
    sendSim();
  }
  talk.addEventListener('pointerdown', function(e){
    e.preventDefault();
    try{ talk.setPointerCapture(e.pointerId); }catch(_){}
    startX=e.clientX; t0=performance.now(); enterRec();
    addEventListener('pointermove', onMove);
    addEventListener('pointerup', onUp, {once:true});
    addEventListener('pointercancel', onUp, {once:true});
  });
})();
</script>

</body>
</html>
