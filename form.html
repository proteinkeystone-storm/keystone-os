<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0a2741" data-slot="theme">
  <title>Pulsa — Formulaire</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       PULSA · Page publique de formulaire (P3.2)
       Renderer mobile-first inspiré Sentinelle iPad + Diagnostic
       Prométhée. Charte adaptable via CSS vars définies par JS
       depuis la config form.meta.brand_color / brand_accent.
       ═══════════════════════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --pf-brand:   #0a2741;
      --pf-brand-2: #0d3254;
      --pf-accent:  #c9b48a;
      --pf-accent-2:#a8895a;
      --pf-body:    #1a2a3a;
      --pf-muted:   #6b7a8d;
      --pf-light:   #f4f6f9;
      --pf-border:  #dde3ec;
      --pf-bg:      #eef1f5;
      --pf-green:   #22c55e;
      --pf-danger:  #e05c5c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--pf-bg);
      color: var(--pf-body);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Loading / Error states ─────────────────────────── */
    .pf-loading, .pf-error {
      max-width: 480px;
      margin: 80px auto 40px;
      padding: 40px 24px;
      text-align: center;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(10, 39, 65, .08);
    }
    .pf-loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 18px;
      border: 3px solid var(--pf-border);
      border-top-color: var(--pf-accent);
      border-radius: 50%;
      animation: pf-spin .9s linear infinite;
    }
    @keyframes pf-spin { to { transform: rotate(360deg); } }
    .pf-loading p, .pf-error p { color: var(--pf-muted); font-size: 14px; line-height: 1.6; }
    .pf-error h1 {
      font-size: 22px; font-weight: 900; letter-spacing: -.03em;
      color: var(--pf-brand); margin-bottom: 8px;
    }
    .pf-error-code {
      display: inline-block; margin-top: 16px;
      padding: 4px 12px; border-radius: 999px;
      background: var(--pf-light); color: var(--pf-muted);
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ── Header sticky ──────────────────────────────────── */
    .pf-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--pf-brand);
      padding: 0 20px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .15);
    }
    .pf-header-inner {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0 10px;
      max-width: 680px; margin: 0 auto;
    }
    .pf-logo {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .08);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .pf-logo img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
    .pf-logo-fallback {
      font-size: 16px; font-weight: 900;
      color: var(--pf-accent);
    }
    .pf-header-text { flex: 1; min-width: 0; }
    .pf-header-tag {
      font-size: 10px; font-weight: 800; letter-spacing: .14em;
      text-transform: uppercase; color: var(--pf-accent); opacity: .85;
    }
    .pf-header-title {
      font-size: 15px; font-weight: 900; color: #fff;
      letter-spacing: -.02em; line-height: 1.25;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pf-progress {
      height: 3px; background: rgba(255, 255, 255, .12);
      max-width: 680px; margin: 0 auto;
    }
    .pf-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pf-accent-2), var(--pf-accent));
      width: 0%;
      transition: width .35s ease;
    }
    .pf-progress-label {
      font-size: 10px; color: rgba(255, 255, 255, .55);
      letter-spacing: .04em; text-align: center;
      padding: 5px 0 8px;
    }

    /* ── Bandeau anonymat ───────────────────────────────── */
    .pf-anon-banner {
      background: rgba(34, 197, 94, .12);
      border-bottom: 1px solid rgba(34, 197, 94, .25);
      padding: 10px 20px;
      text-align: center;
      font-size: 12.5px; font-weight: 600;
      color: #15803d;
    }
    .pf-anon-banner strong { color: #14532d; }

    /* ── Container ──────────────────────────────────────── */
    .pf-container {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 0;
    }

    .pf-intro {
      background: #fff;
      border-left: 4px solid var(--pf-accent);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 16px;
      font-size: 14px; line-height: 1.6;
      color: var(--pf-body);
      white-space: pre-line;
    }

    /* ── Sections ───────────────────────────────────────── */
    .pf-section {
      background: #fff;
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
    }
    .pf-section-head {
      background: var(--pf-brand);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .pf-section-num {
      background: var(--pf-accent);
      color: var(--pf-brand);
      font-size: 10px; font-weight: 900; letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px;
      flex-shrink: 0;
    }
    .pf-section-title {
      font-size: 15px; font-weight: 800; color: #fff;
      letter-spacing: -.02em; flex: 1;
    }
    .pf-section-sub {
      font-size: 12.5px; color: var(--pf-muted);
      padding: 12px 20px 0;
      font-style: italic;
    }
    .pf-section-body {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      padding: 18px 20px;
    }
    @media (min-width: 640px) {
      .pf-section-body { grid-template-columns: repeat(12, 1fr); }
    }

    /* ── Field wrapper ──────────────────────────────────── */
    .pf-field {
      grid-column: 1 / -1; /* mobile = pleine largeur */
    }
    @media (min-width: 640px) {
      .pf-field[data-width="full"] { grid-column: span 12; }
      .pf-field[data-width="3/4"]  { grid-column: span 9; }
      .pf-field[data-width="1/2"]  { grid-column: span 6; }
      .pf-field[data-width="1/4"]  { grid-column: span 4; }
    }

    .pf-field-label {
      display: block;
      font-size: 13.5px; font-weight: 700; color: var(--pf-brand);
      margin-bottom: 8px; line-height: 1.4;
    }
    .pf-field-label .pf-req { color: var(--pf-danger); margin-left: 3px; display: none; }
    .pf-field.is-required .pf-field-label .pf-req { display: inline; }
    .pf-input-computed {
      background: var(--pf-light);
      color: var(--pf-body);
      font-weight: 700;
      cursor: not-allowed;
    }
    .pf-input-computed:focus { box-shadow: none; border-color: var(--pf-border); }
    .pf-field-help {
      display: block;
      font-size: 12px; color: var(--pf-muted);
      margin-top: -4px; margin-bottom: 8px;
      line-height: 1.5;
    }
    .pf-field-error {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--pf-danger);
      margin-top: 6px;
      min-height: 16px;
    }

    /* ── Inputs ─────────────────────────────────────────── */
    .pf-input, .pf-textarea {
      width: 100%;
      border: 1.5px solid var(--pf-border);
      background: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      font-size: 15px;
      color: var(--pf-body);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
      appearance: none;
    }
    .pf-input:focus, .pf-textarea:focus {
      border-color: var(--pf-accent);
      box-shadow: 0 0 0 3px rgba(201, 180, 138, .18);
    }
    .pf-textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.55;
      font-family: inherit;
    }
    .pf-input::placeholder, .pf-textarea::placeholder { color: #b0bec5; }
    .pf-input.is-invalid, .pf-textarea.is-invalid {
      border-color: var(--pf-danger);
    }

    /* ── Compteur de caractères (text-long) ─────────────── */
    .pf-charcount {
      display: block;
      text-align: right;
      font-size: 11px; color: var(--pf-muted);
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }
    .pf-charcount.is-warning { color: #f59e0b; }
    .pf-charcount.is-over    { color: var(--pf-danger); font-weight: 700; }

    /* ── Chips (single select) ──────────────────────────── */
    .pf-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .pf-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      border-radius: 50px;
      border: 1.5px solid var(--pf-border);
      background: #fff;
      font: inherit; font-size: 13px; font-weight: 600;
      color: var(--pf-muted);
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
    .pf-chip:hover { border-color: var(--pf-muted); color: var(--pf-body); }
    .pf-chip.is-selected {
      background: var(--pf-brand);
      border-color: var(--pf-brand);
      color: #fff;
    }

    /* ── Tool cards (multi) ─────────────────────────────── */
    .pf-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 420px) {
      .pf-cards { grid-template-columns: 1fr; }
    }
    .pf-card {
      background: var(--pf-light);
      border: 2px solid var(--pf-border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      text-align: left;
      font: inherit;
      color: var(--pf-body);
    }
    .pf-card:hover { border-color: var(--pf-muted); }
    .pf-card.is-selected {
      background: rgba(10, 39, 65, .04);
      border-color: var(--pf-brand);
      box-shadow: 0 0 0 1px var(--pf-brand);
    }
    .pf-card-title {
      font-size: 13.5px; font-weight: 800;
      letter-spacing: -.01em;
      color: var(--pf-brand);
      margin-bottom: 3px;
      line-height: 1.3;
    }
    .pf-card-desc {
      font-size: 11.5px; color: var(--pf-muted); line-height: 1.45;
    }

    /* ── Yes / No binaire ───────────────────────────────── */
    .pf-yesno {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .pf-yesno-btn {
      padding: 14px;
      border-radius: 12px;
      border: 2px solid var(--pf-border);
      background: #fff;
      font: inherit; font-size: 14px; font-weight: 700;
      color: var(--pf-body);
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .pf-yesno-btn.is-selected {
      background: var(--pf-brand);
      border-color: var(--pf-brand);
      color: #fff;
    }

    /* ── Rank top N ─────────────────────────────────────── */
    .pf-rank {
      display: flex; flex-direction: column; gap: 8px;
    }
    .pf-rank-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--pf-light);
      border: 1.5px solid var(--pf-border);
      border-radius: 12px;
      padding: 10px 14px;
    }
    .pf-rank-num {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--pf-brand);
      color: var(--pf-accent);
      font-size: 13px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
    }
    .pf-rank-input {
      flex: 1;
      border: none; background: transparent;
      font: inherit; font-size: 15px; color: var(--pf-body);
      outline: none;
    }

    /* ── Signature manuscrite (canvas) ──────────────────── */
    .pf-sig {
      display: flex; flex-direction: column; gap: 8px;
    }
    .pf-sig-canvas {
      width: 100%;
      max-width: 100%;
      aspect-ratio: 10 / 3;
      background: #fff;
      border: 1.5px dashed var(--pf-border);
      border-radius: 10px;
      cursor: crosshair;
      touch-action: none;
      display: block;
    }
    .pf-sig-actions {
      display: flex; justify-content: space-between; align-items: center;
    }
    .pf-sig-hint {
      font-size: 11.5px; color: var(--pf-muted); font-style: italic;
    }
    .pf-sig-clear {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--pf-border);
      border-radius: 999px;
      color: var(--pf-muted);
      font: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .pf-sig-clear:hover { color: var(--pf-body); border-color: var(--pf-muted); }

    /* ── NPS (0 à 10 avec dégradé rouge/orange/vert) ────── */
    .pf-nps {
      display: flex; flex-direction: column; gap: 8px;
    }
    .pf-nps-scale {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 4px;
    }
    @media (max-width: 480px) {
      .pf-nps-scale { gap: 2px; }
    }
    .pf-nps-btn {
      padding: 12px 0;
      border-radius: 8px;
      border: 1.5px solid transparent;
      background: var(--pf-light);
      font: inherit; font-size: 14px; font-weight: 700;
      color: var(--pf-body);
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .pf-nps-btn.pf-nps-detractor { background: rgba(224, 92, 92, .12); color: #b9302e; }
    .pf-nps-btn.pf-nps-passive   { background: rgba(245, 158, 11, .14); color: #c47600; }
    .pf-nps-btn.pf-nps-promoter  { background: rgba(34, 197, 94, .14); color: #15803d; }
    .pf-nps-btn.is-selected {
      background: var(--pf-brand) !important;
      color: #fff !important;
      border-color: var(--pf-brand);
      transform: scale(1.05);
    }
    .pf-nps-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--pf-muted);
      padding: 0 4px;
    }

    /* ── Slider numérique ──────────────────────────────── */
    .pf-slider {
      display: flex; flex-direction: column; gap: 8px;
    }
    .pf-slider-input {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: var(--pf-border);
      border-radius: 999px;
      outline: none;
    }
    .pf-slider-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--pf-accent);
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(201, 180, 138, .35);
      cursor: pointer;
    }
    .pf-slider-input::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--pf-accent);
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(201, 180, 138, .35);
      cursor: pointer;
    }
    .pf-slider-value {
      text-align: center;
      font-size: 18px; font-weight: 900;
      letter-spacing: -.02em;
      color: var(--pf-brand);
    }
    .pf-slider-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--pf-muted);
    }

    /* ── Likert (échelle horizontale) ───────────────────── */
    .pf-likert {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 6px;
    }
    .pf-likert-btn {
      padding: 12px 10px;
      border-radius: 10px;
      border: 1.5px solid var(--pf-border);
      background: #fff;
      font: inherit; font-size: 12.5px; font-weight: 600;
      color: var(--pf-body);
      cursor: pointer;
      transition: all .15s;
      line-height: 1.3;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .pf-likert-btn:hover { border-color: var(--pf-muted); }
    .pf-likert-btn.is-selected {
      background: var(--pf-brand);
      border-color: var(--pf-brand);
      color: #fff;
    }

    /* ── Social links ──────────────────────────────────── */
    .pf-socials {
      display: flex; flex-direction: column; gap: 10px;
    }
    .pf-social {
      display: flex; flex-direction: column; gap: 4px;
    }
    .pf-social-label {
      font-size: 11.5px; font-weight: 700;
      letter-spacing: .04em;
      color: var(--pf-muted);
      text-transform: uppercase;
    }

    /* ── Submit ─────────────────────────────────────────── */
    .pf-submit-section {
      background: var(--pf-brand);
      border-radius: 16px;
      padding: 24px 22px;
      margin-top: 8px;
      text-align: center;
    }
    .pf-submit-title {
      font-size: 18px; font-weight: 900;
      letter-spacing: -.03em; color: #fff;
      margin-bottom: 6px;
    }
    .pf-submit-sub {
      font-size: 13px;
      color: rgba(255, 255, 255, .65);
      line-height: 1.5;
      margin-bottom: 18px;
    }
    .pf-submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--pf-accent-2), var(--pf-accent));
      color: var(--pf-brand);
      font: inherit;
      font-size: 15px; font-weight: 900;
      letter-spacing: -.02em;
      padding: 16px 24px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(201, 180, 138, .35);
      transition: transform .15s, box-shadow .15s, opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .pf-submit-btn:active { transform: scale(.97); }
    .pf-submit-btn:disabled {
      opacity: .55; cursor: not-allowed; box-shadow: none;
    }

    .pf-footer {
      text-align: center;
      padding: 20px 16px;
      font-size: 11px;
      color: var(--pf-muted);
      opacity: .7;
    }
    .pf-footer a { color: inherit; text-decoration: underline; }

    /* ── Toast d'erreur global ─────────────────────────── */
    .pf-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--pf-brand);
      color: #fff;
      border-left: 4px solid var(--pf-danger);
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 13.5px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
      z-index: 9999;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      max-width: 340px;
      text-align: center;
    }
    .pf-toast.is-on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="pf-app">
    <div class="pf-loading">
      <div class="pf-loading-spinner" aria-hidden="true"></div>
      <p>Chargement du formulaire…</p>
    </div>
  </div>

  <div class="pf-toast" id="pf-toast" role="alert" aria-live="assertive"></div>

  <script type="module">
    /* ═══════════════════════════════════════════════════════════════
       Pulsa Public · Renderer P3.2
       12 types de champs rendus côté répondant, validation client,
       progress bar, application des couleurs de marque.
       Soumission = placeholder pour P3.3 (route Worker collecte).
       ═══════════════════════════════════════════════════════════════ */

    const API_BASE = 'https://keystone-os-api.keystone-os.workers.dev';

    // ── État local ─────────────────────────────────────────
    let _form = null;
    const _values = {};   // fieldId → value
    let _submitting = false;
    let _visibleFieldIds = new Set();  // ids des champs actuellement visibles

    // ── Utilitaires ────────────────────────────────────────
    function escape(s) {
      if (s == null) return '';
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll('\'', '&#039;');
    }

    function getSlug() {
      const params = new URLSearchParams(location.search);
      const fromQuery = params.get('s') || params.get('slug');
      if (fromQuery && /^[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?$/.test(fromQuery)) return fromQuery;
      const m = location.pathname.match(/^\/f\/([a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?)\/?$/);
      return m ? m[1] : null;
    }

    function renderError(title, msg, code) {
      document.getElementById('pf-app').innerHTML = `
        <div class="pf-error">
          <h1>${escape(title)}</h1>
          <p>${escape(msg)}</p>
          ${code ? `<span class="pf-error-code">${escape(code)}</span>` : ''}
        </div>
      `;
    }

    function showToast(msg, ms = 3500) {
      const t = document.getElementById('pf-toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('is-on');
      setTimeout(() => t.classList.remove('is-on'), ms);
    }

    // ═══════════════════════════════════════════════════════════════
    // Logique conditionnelle (visible_if) + pré-remplissage URL
    // ═══════════════════════════════════════════════════════════════

    /**
     * Évalue une condition `visible_if` contre les valeurs courantes.
     * Renvoie true si le champ doit être affiché.
     */
    function evalCondition(cond, values) {
      if (!cond || !cond.field) return true;
      const v = values[cond.field];
      switch (cond.op) {
        case 'truthy':
          if (v == null) return false;
          if (Array.isArray(v)) return v.length > 0;
          if (typeof v === 'object') return Object.values(v).some(x => x != null && String(x).trim());
          return String(v).trim() !== '';
        case 'falsy':
          if (v == null) return true;
          if (Array.isArray(v)) return v.length === 0;
          if (typeof v === 'object') return !Object.values(v).some(x => x != null && String(x).trim());
          return String(v).trim() === '';
        case 'eq':
          if (Array.isArray(v)) return v.map(String).includes(String(cond.value));
          return String(v ?? '') === String(cond.value ?? '');
        case 'neq':
          if (Array.isArray(v)) return !v.map(String).includes(String(cond.value));
          return String(v ?? '') !== String(cond.value ?? '');
      }
      return true;
    }

    /**
     * Recalcule la visibilité de chaque champ et applique display:none
     * aux champs cachés. Met aussi à jour la set _visibleFieldIds.
     */
    function refreshVisibility() {
      if (!_form) return;
      _visibleFieldIds = new Set();
      for (const sec of _form.sections || []) {
        for (const f of (sec.fields || [])) {
          const visible = !f.visible_if || evalCondition(f.visible_if, _values);
          if (visible) _visibleFieldIds.add(f.id);
          const el = document.querySelector(`.pf-field[data-fid="${f.id}"]`);
          if (el) el.style.display = visible ? '' : 'none';
        }
      }
    }

    /**
     * Évalue si un champ est requis maintenant : soit field.required est
     * vrai, soit required_if est défini ET satisfait. Les champs cachés
     * (visible_if non satisfait) ne sont JAMAIS requis.
     */
    function isFieldRequired(field) {
      if (!_visibleFieldIds.has(field.id)) return false;
      if (field.required) return true;
      if (field.required_if) return evalCondition(field.required_if, _values);
      return false;
    }

    /**
     * Met à jour l'asterisque rouge des champs requis dynamiques.
     * Le span .pf-req est toujours présent dans le DOM ; on bascule
     * la classe is-required sur le wrapper pour l'afficher/le masquer.
     */
    function refreshRequiredIndicators() {
      if (!_form) return;
      for (const sec of _form.sections || []) {
        for (const f of (sec.fields || [])) {
          const el = document.querySelector(`.pf-field[data-fid="${f.id}"]`);
          if (el) el.classList.toggle('is-required', isFieldRequired(f));
        }
      }
    }

    /**
     * Recalcule les valeurs des champs avec compute_from. Pour V1,
     * seul l'op='sum' est supporté : somme des valeurs numériques
     * des champs sources.
     */
    function recomputeAll() {
      if (!_form) return;
      for (const sec of _form.sections || []) {
        for (const f of (sec.fields || [])) {
          if (!f.compute_from) continue;
          const srcIds = f.compute_from.fields || [];
          const op = f.compute_from.op || 'sum';
          const nums = srcIds
            .map(id => _values[id])
            .map(v => Number(v))
            .filter(n => !isNaN(n));
          let result = 0;
          if (op === 'sum') {
            result = nums.reduce((a, n) => a + n, 0);
          } else if (op === 'avg' && nums.length > 0) {
            result = nums.reduce((a, n) => a + n, 0) / nums.length;
          }
          // Arrondi selon les décimales configurées du champ amount
          const dec = Number.isInteger(f.options?.decimals) ? f.options.decimals : 2;
          const rounded = Number(result.toFixed(dec));
          _values[f.id] = rounded;
          const inp = document.getElementById('pf-' + f.id);
          if (inp) inp.value = rounded;
        }
      }
    }

    /**
     * Pré-remplit les valeurs à partir des query params de l'URL.
     * Les paramètres réservés (s, slug) sont ignorés.
     * Format : ?fld_xxx=valeur ; pour les champs avec choices,
     * on accepte aussi le label du choix (matchera l'id correspondant).
     */
    function prefillFromUrl() {
      const params = new URLSearchParams(location.search);
      const reserved = new Set(['s', 'slug']);
      const allFields = [];
      for (const sec of _form.sections || []) {
        for (const f of (sec.fields || [])) allFields.push(f);
      }
      for (const [key, value] of params) {
        if (reserved.has(key)) continue;
        const field = allFields.find(f => f.id === key);
        if (!field) continue;
        // Cas spécial chips/cards : si la valeur match un choice.id ou choice.label
        if (field.type === 'chips') {
          const choices = field.options?.choices || [];
          const match = choices.find(c => c.id === value || c.label === value);
          _values[field.id] = match?.id || value;
        } else if (field.type === 'yes-no') {
          const v = value.toLowerCase();
          if (['oui', 'yes', 'y', '1', 'true'].includes(v)) _values[field.id] = 'yes';
          else if (['non', 'no', 'n', '0', 'false'].includes(v)) _values[field.id] = 'no';
          else _values[field.id] = value;
        } else if (field.type === 'cards') {
          // multi-valeurs séparées par virgule
          const ids = value.split(',').map(s => s.trim()).filter(Boolean);
          _values[field.id] = ids;
        } else {
          _values[field.id] = value;
        }
      }
    }

    /**
     * Applique les _values pré-remplis aux inputs déjà rendus dans le DOM
     * (texte, email, url, date, amount, rank, social-links, et marquage
     * visuel des chips/cards/yes-no).
     */
    function applyPrefilledToDom() {
      for (const fid of Object.keys(_values)) {
        const v = _values[fid];
        if (v == null) continue;
        // chips
        const chipsGroup = document.querySelector(`.pf-chips[data-fid="${fid}"]`);
        if (chipsGroup) {
          chipsGroup.querySelectorAll('.pf-chip').forEach(c => {
            const on = c.dataset.cid === String(v);
            c.classList.toggle('is-selected', on);
            c.setAttribute('aria-checked', on ? 'true' : 'false');
          });
          continue;
        }
        // cards multi
        const cardsGroup = document.querySelector(`.pf-cards[data-fid="${fid}"]`);
        if (cardsGroup) {
          const set = new Set(Array.isArray(v) ? v.map(String) : [String(v)]);
          cardsGroup.querySelectorAll('.pf-card').forEach(c => {
            c.classList.toggle('is-selected', set.has(c.dataset.cid));
          });
          continue;
        }
        // yes/no
        const ynGroup = document.querySelector(`.pf-yesno[data-fid="${fid}"]`);
        if (ynGroup) {
          ynGroup.querySelectorAll('.pf-yesno-btn').forEach(b => {
            b.classList.toggle('is-selected', b.dataset.val === String(v));
          });
          continue;
        }
        // social-links (objet)
        if (typeof v === 'object' && !Array.isArray(v)) {
          for (const [netId, netVal] of Object.entries(v)) {
            const inp = document.querySelector(`[data-fid="${fid}"][data-net="${netId}"]`);
            if (inp) inp.value = netVal;
          }
          continue;
        }
        // rank (array)
        if (Array.isArray(v)) {
          v.forEach((val, i) => {
            const inp = document.querySelector(`[data-fid="${fid}"][data-rank="${i + 1}"]`);
            if (inp) inp.value = val ?? '';
          });
          continue;
        }
        // input simple par id
        const input = document.getElementById('pf-' + fid);
        if (input) input.value = v;
        // compteur de caractères pour text-long
        if (input?.dataset?.kind === 'textlong') updateCharCount(input);
      }
    }

    // ── Application charte (couleurs de marque) ────────────
    function applyBrand(meta) {
      const root = document.documentElement;
      if (meta.brand_color)  root.style.setProperty('--pf-brand', meta.brand_color);
      if (meta.brand_accent) root.style.setProperty('--pf-accent', meta.brand_accent);
      // theme-color iOS
      const themeMeta = document.querySelector('[data-slot="theme"]');
      if (themeMeta && meta.brand_color) themeMeta.setAttribute('content', meta.brand_color);
    }

    // ═══════════════════════════════════════════════════════════════
    // Renderers par type (12 dispatchers)
    // ═══════════════════════════════════════════════════════════════
    const RENDERERS = {
      'text-short':   renderTextShort,
      'text-long':    renderTextLong,
      'email':        renderEmail,
      'website':      renderWebsite,
      'url-external': renderUrlExternal,
      'chips':        renderChips,
      'cards':        renderCards,
      'yes-no':       renderYesNo,
      'rank-top3':    renderRank,
      'date':         renderDate,
      'amount':       renderAmount,
      'social-links': renderSocialLinks,
      'signature':    renderSignature,
      'nps':          renderNps,
      'slider':       renderSlider,
      'likert':       renderLikert,
    };

    function renderField(field) {
      const renderer = RENDERERS[field.type];
      if (!renderer) return `<div class="pf-field-error">Type de champ non supporté : ${escape(field.type)}</div>`;
      // L'asterisque est toujours rendu ; sa visibilité est gérée
      // par .is-required appliquée dynamiquement selon evalRequired().
      const labelHtml = `
        <label class="pf-field-label" for="pf-${field.id}">
          ${escape(field.label)}<span class="pf-req" aria-hidden="true" data-slot="req-${field.id}">*</span>
        </label>
        ${field.help ? `<span class="pf-field-help">${escape(field.help)}</span>` : ''}
      `;
      return `
        <div class="pf-field" data-width="${field.width || 'full'}" data-fid="${field.id}">
          ${labelHtml}
          ${renderer(field)}
          <span class="pf-field-error" data-slot="err-${field.id}"></span>
        </div>
      `;
    }

    function renderTextShort(field) {
      const opts = field.options || {};
      return `<input class="pf-input" type="text" id="pf-${field.id}"
                     placeholder="${escape(opts.placeholder || '')}"
                     ${opts.max_chars ? `maxlength="${opts.max_chars}"` : ''}
                     data-fid="${field.id}" data-kind="text">`;
    }

    function renderTextLong(field) {
      const opts = field.options || {};
      const max = opts.max_chars || 500;
      return `
        <textarea class="pf-textarea" id="pf-${field.id}"
                  placeholder="${escape(opts.placeholder || '')}"
                  rows="${opts.rows || 4}"
                  ${opts.strict !== false ? `maxlength="${max}"` : ''}
                  data-fid="${field.id}" data-kind="textlong"
                  data-max="${max}"></textarea>
        <span class="pf-charcount" data-slot="cc-${field.id}">0 / ${max}</span>
      `;
    }

    function renderEmail(field) {
      const opts = field.options || {};
      return `<input class="pf-input" type="email" id="pf-${field.id}"
                     placeholder="${escape(opts.placeholder || 'prenom.nom@exemple.fr')}"
                     autocomplete="email" inputmode="email"
                     data-fid="${field.id}" data-kind="email">`;
    }

    function renderWebsite(field) {
      const opts = field.options || {};
      return `<input class="pf-input" type="url" id="pf-${field.id}"
                     placeholder="${escape(opts.placeholder || 'https://votre-site.com')}"
                     inputmode="url" autocomplete="url"
                     data-fid="${field.id}" data-kind="url">`;
    }

    function renderUrlExternal(field) {
      const opts = field.options || {};
      const hint = opts.providers_hint || 'WeTransfer · Google Drive · Dropbox · Vimeo · YouTube';
      return `
        <input class="pf-input" type="url" id="pf-${field.id}"
               placeholder="${escape(opts.placeholder || 'https://wetransfer.com/…')}"
               inputmode="url" autocomplete="off"
               data-fid="${field.id}" data-kind="url">
        <span class="pf-field-help" style="margin-top:6px;margin-bottom:0;">
          Fournisseurs acceptés : ${escape(hint)}
        </span>
      `;
    }

    function renderChips(field) {
      const choices = field.options?.choices || [];
      return `
        <div class="pf-chips" role="radiogroup" data-fid="${field.id}" data-kind="chips">
          ${choices.map(c => `
            <button type="button" class="pf-chip" role="radio" aria-checked="false"
                    data-fid="${field.id}" data-cid="${escape(c.id)}">
              ${escape(c.label)}
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderCards(field) {
      const choices = field.options?.choices || [];
      return `
        <div class="pf-cards" data-fid="${field.id}" data-kind="cards">
          ${choices.map(c => `
            <button type="button" class="pf-card"
                    data-fid="${field.id}" data-cid="${escape(c.id)}">
              <span class="pf-card-title">${escape(c.label)}</span>
              ${c.desc ? `<span class="pf-card-desc">${escape(c.desc)}</span>` : ''}
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderYesNo(field) {
      const opts = field.options || {};
      return `
        <div class="pf-yesno" data-fid="${field.id}" data-kind="yesno">
          <button type="button" class="pf-yesno-btn" data-fid="${field.id}" data-val="yes">${escape(opts.yes_label || 'Oui')}</button>
          <button type="button" class="pf-yesno-btn" data-fid="${field.id}" data-val="no">${escape(opts.no_label || 'Non')}</button>
        </div>
      `;
    }

    function renderRank(field) {
      const opts = field.options || {};
      const slots = Math.max(1, Math.min(10, opts.slots || 3));
      const phLabel = opts.placeholder || 'Priorité';
      const rows = [];
      for (let i = 1; i <= slots; i++) {
        rows.push(`
          <div class="pf-rank-item">
            <span class="pf-rank-num">${i}</span>
            <input class="pf-rank-input" type="text"
                   placeholder="${escape(phLabel)} n°${i}"
                   data-fid="${field.id}" data-rank="${i}" data-kind="rank">
          </div>
        `);
      }
      return `<div class="pf-rank">${rows.join('')}</div>`;
    }

    function renderDate(field) {
      const opts = field.options || {};
      const minAttr = opts.min ? `min="${escape(opts.min)}"` : '';
      const maxAttr = opts.max ? `max="${escape(opts.max)}"` : '';
      return `<input class="pf-input" type="date" id="pf-${field.id}"
                     ${minAttr} ${maxAttr}
                     data-fid="${field.id}" data-kind="date">`;
    }

    function renderAmount(field) {
      const opts = field.options || {};
      const cur = opts.currency || 'EUR';
      const symbol = { EUR: '€', USD: '$', GBP: '£', CHF: 'CHF' }[cur] || cur;
      const dec = Number.isInteger(opts.decimals) ? opts.decimals : 2;
      const step = dec > 0 ? '0.' + '0'.repeat(dec - 1) + '1' : '1';
      const minAttr = opts.min != null ? `min="${escape(opts.min)}"` : '';
      const maxAttr = opts.max != null ? `max="${escape(opts.max)}"` : '';
      // compute_from rend le champ readonly : la valeur est calculée
      // automatiquement par recomputeAll() à chaque changement de source.
      const isComputed = !!field.compute_from;
      const computedAttr = isComputed ? 'readonly' : '';
      const placeholder = isComputed ? 'Calculé automatiquement' : `0${dec > 0 ? ',' + '0'.repeat(dec) : ''}`;
      return `
        <div style="display:flex;align-items:stretch;gap:8px;">
          <input class="pf-input ${isComputed ? 'pf-input-computed' : ''}" type="number" id="pf-${field.id}"
                 inputmode="decimal" step="${step}" ${minAttr} ${maxAttr} ${computedAttr}
                 placeholder="${escape(placeholder)}"
                 data-fid="${field.id}" data-kind="amount"
                 data-decimals="${dec}"
                 style="flex:1;">
          <span style="display:inline-flex;align-items:center;padding:0 14px;background:var(--pf-light);border:1.5px solid var(--pf-border);border-radius:10px;font-size:14px;font-weight:700;color:var(--pf-muted);">${escape(symbol)}</span>
        </div>
        ${isComputed ? `<span class="pf-field-help" style="margin-top:6px;margin-bottom:0;">Calculé à partir des autres montants</span>` : ''}
      `;
    }

    function renderSignature(field) {
      const opts = field.options || {};
      const hint = opts.hint || 'Signez dans le cadre ci-dessous';
      return `
        <div class="pf-sig" data-fid="${field.id}" data-kind="signature">
          <canvas class="pf-sig-canvas" data-fid="${field.id}" width="600" height="180"></canvas>
          <div class="pf-sig-actions">
            <span class="pf-sig-hint">${escape(hint)}</span>
            <button type="button" class="pf-sig-clear" data-act="sig-clear" data-fid="${field.id}">
              Effacer
            </button>
          </div>
        </div>
      `;
    }

    function renderNps(field) {
      const opts = field.options || {};
      const buttons = [];
      for (let n = 0; n <= 10; n++) {
        const cls = n <= 6 ? 'pf-nps-detractor' : (n <= 8 ? 'pf-nps-passive' : 'pf-nps-promoter');
        buttons.push(`
          <button type="button" class="pf-nps-btn ${cls}"
                  data-fid="${field.id}" data-nps="${n}">
            ${n}
          </button>
        `);
      }
      return `
        <div class="pf-nps" data-fid="${field.id}" data-kind="nps">
          <div class="pf-nps-scale">${buttons.join('')}</div>
          <div class="pf-nps-labels">
            <span>${escape(opts.low_label || 'Pas du tout probable')}</span>
            <span>${escape(opts.high_label || 'Extrêmement probable')}</span>
          </div>
        </div>
      `;
    }

    function renderSlider(field) {
      const opts = field.options || {};
      const min = Number(opts.min ?? 0);
      const max = Number(opts.max ?? 100);
      const step = Number(opts.step ?? 1);
      const initial = Math.round((min + max) / 2);
      return `
        <div class="pf-slider" data-fid="${field.id}" data-kind="slider">
          <input class="pf-slider-input" type="range"
                 min="${min}" max="${max}" step="${step}" value="${initial}"
                 id="pf-${field.id}"
                 data-fid="${field.id}" data-kind="slider">
          <div class="pf-slider-value" data-slot="sv-${field.id}">
            ${initial}${opts.unit ? ' ' + escape(opts.unit) : ''}
          </div>
          ${(opts.low_label || opts.high_label) ? `
            <div class="pf-slider-labels">
              <span>${escape(opts.low_label || '')}</span>
              <span>${escape(opts.high_label || '')}</span>
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderLikert(field) {
      const levels = field.options?.choices || [];
      return `
        <div class="pf-likert" data-fid="${field.id}" data-kind="likert" role="radiogroup">
          ${levels.map(l => `
            <button type="button" class="pf-likert-btn" role="radio" aria-checked="false"
                    data-fid="${field.id}" data-lid="${escape(l.id)}">
              ${escape(l.label)}
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderSocialLinks(field) {
      const networks = (field.options?.networks || []).filter(n => n.enabled);
      if (networks.length === 0) {
        return `<span class="pf-field-help" style="margin:0;">Aucun réseau configuré.</span>`;
      }
      return `
        <div class="pf-socials" data-fid="${field.id}" data-kind="socials">
          ${networks.map(n => `
            <div class="pf-social">
              <span class="pf-social-label">${escape(n.label)}</span>
              <input class="pf-input" type="text"
                     placeholder="${escape(n.placeholder || '')}"
                     data-fid="${field.id}" data-net="${escape(n.id)}">
            </div>
          `).join('')}
        </div>
      `;
    }

    // ═══════════════════════════════════════════════════════════════
    // Délégation événements (clics + saisies)
    // ═══════════════════════════════════════════════════════════════
    function bindEvents(root) {
      root.addEventListener('click', e => {
        // NPS button
        const npsBtn = e.target.closest('.pf-nps-btn');
        if (npsBtn) {
          const fid = npsBtn.dataset.fid;
          npsBtn.closest('.pf-nps-scale').querySelectorAll('.pf-nps-btn').forEach(b => b.classList.remove('is-selected'));
          npsBtn.classList.add('is-selected');
          _values[fid] = Number(npsBtn.dataset.nps);
          refreshVisibility();
          recomputeAll();
          refreshRequiredIndicators();
          refreshProgress();
          clearFieldError(fid);
          return;
        }
        // Likert button
        const likBtn = e.target.closest('.pf-likert-btn');
        if (likBtn) {
          const fid = likBtn.dataset.fid;
          likBtn.closest('.pf-likert').querySelectorAll('.pf-likert-btn').forEach(b => {
            b.classList.remove('is-selected');
            b.setAttribute('aria-checked', 'false');
          });
          likBtn.classList.add('is-selected');
          likBtn.setAttribute('aria-checked', 'true');
          _values[fid] = likBtn.dataset.lid;
          refreshVisibility();
          recomputeAll();
          refreshRequiredIndicators();
          refreshProgress();
          clearFieldError(fid);
          return;
        }
        // Signature clear
        const sigClear = e.target.closest('[data-act="sig-clear"]');
        if (sigClear) {
          const fid = sigClear.dataset.fid;
          const cnv = document.querySelector(`.pf-sig-canvas[data-fid="${fid}"]`);
          if (cnv) {
            const ctx = cnv.getContext('2d');
            ctx.clearRect(0, 0, cnv.width, cnv.height);
            _values[fid] = '';
            refreshRequiredIndicators();
            refreshProgress();
          }
          return;
        }

        // Chips single-select
        const chip = e.target.closest('.pf-chip');
        if (chip) {
          const fid = chip.dataset.fid;
          const cid = chip.dataset.cid;
          const group = chip.closest('.pf-chips');
          group.querySelectorAll('.pf-chip').forEach(c => {
            c.classList.remove('is-selected');
            c.setAttribute('aria-checked', 'false');
          });
          chip.classList.add('is-selected');
          chip.setAttribute('aria-checked', 'true');
          _values[fid] = cid;
          refreshVisibility();
          recomputeAll();
          refreshRequiredIndicators();
          refreshProgress();
          clearFieldError(fid);
          return;
        }
        // Cards multi-select
        const card = e.target.closest('.pf-card');
        if (card) {
          const fid = card.dataset.fid;
          const cid = card.dataset.cid;
          card.classList.toggle('is-selected');
          const set = new Set(_values[fid] || []);
          if (card.classList.contains('is-selected')) set.add(cid);
          else set.delete(cid);
          _values[fid] = Array.from(set);
          refreshProgress();
          clearFieldError(fid);
          return;
        }
        // Yes/No
        const yn = e.target.closest('.pf-yesno-btn');
        if (yn) {
          const fid = yn.dataset.fid;
          yn.closest('.pf-yesno').querySelectorAll('.pf-yesno-btn').forEach(b => b.classList.remove('is-selected'));
          yn.classList.add('is-selected');
          _values[fid] = yn.dataset.val;
          refreshVisibility();
          recomputeAll();
          refreshRequiredIndicators();
          refreshProgress();
          clearFieldError(fid);
          return;
        }
        // Submit
        if (e.target.closest('[data-act="submit"]')) {
          submitForm();
        }
      });

      root.addEventListener('input', e => {
        const t = e.target;
        const fid = t.dataset?.fid;
        if (!fid) return;
        const kind = t.dataset.kind;
        if (kind === 'rank') {
          const rank = t.dataset.rank;
          const arr = _values[fid] || [];
          arr[rank - 1] = t.value;
          _values[fid] = arr;
        } else if (kind === 'socials') {
          const net = t.dataset.net;
          const obj = _values[fid] || {};
          obj[net] = t.value;
          _values[fid] = obj;
        } else if (kind === 'textlong') {
          _values[fid] = t.value;
          updateCharCount(t);
        } else if (kind === 'amount') {
          _values[fid] = t.value === '' ? null : Number(t.value);
        } else if (kind === 'slider') {
          _values[fid] = Number(t.value);
          const sv = document.querySelector(`[data-slot="sv-${fid}"]`);
          if (sv) {
            const field = _findField(fid);
            const unit = field?.options?.unit ? ' ' + field.options.unit : '';
            sv.textContent = t.value + unit;
          }
        } else {
          _values[fid] = t.value;
        }
        refreshVisibility();
        refreshProgress();
        clearFieldError(fid);
      });
    }

    /**
     * Trouve un champ par id dans la config courante.
     */
    function _findField(fid) {
      for (const sec of _form?.sections || []) {
        const f = (sec.fields || []).find(x => x.id === fid);
        if (f) return f;
      }
      return null;
    }

    /**
     * Initialise les canvas de signature après le rendu.
     * Capture mouse + touch et stocke en SVG inline dans _values[fid].
     */
    function initSignatureCanvases() {
      document.querySelectorAll('.pf-sig-canvas').forEach(cnv => {
        const fid = cnv.dataset.fid;
        const ctx = cnv.getContext('2d');
        ctx.strokeStyle = '#1a2a3a';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let drawing = false;
        let lastX = 0, lastY = 0;
        const points = []; // pour reconstruire un path SVG

        function getPos(e) {
          const rect = cnv.getBoundingClientRect();
          const scaleX = cnv.width / rect.width;
          const scaleY = cnv.height / rect.height;
          const cx = e.touches ? e.touches[0].clientX : e.clientX;
          const cy = e.touches ? e.touches[0].clientY : e.clientY;
          return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
        }

        function start(e) {
          e.preventDefault();
          drawing = true;
          const { x, y } = getPos(e);
          lastX = x; lastY = y;
          points.push('M' + x.toFixed(1) + ',' + y.toFixed(1));
        }
        function move(e) {
          if (!drawing) return;
          e.preventDefault();
          const { x, y } = getPos(e);
          ctx.beginPath();
          ctx.moveTo(lastX, lastY);
          ctx.lineTo(x, y);
          ctx.stroke();
          points.push('L' + x.toFixed(1) + ',' + y.toFixed(1));
          lastX = x; lastY = y;
        }
        function end() {
          if (!drawing) return;
          drawing = false;
          // Sérialise en SVG inline
          const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${cnv.width} ${cnv.height}" width="${cnv.width}" height="${cnv.height}"><path d="${points.join(' ')}" fill="none" stroke="#1a2a3a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
          _values[fid] = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
          refreshRequiredIndicators();
          refreshProgress();
          clearFieldError(fid);
        }

        cnv.addEventListener('mousedown', start);
        cnv.addEventListener('mousemove', move);
        cnv.addEventListener('mouseup', end);
        cnv.addEventListener('mouseleave', end);
        cnv.addEventListener('touchstart', start, { passive: false });
        cnv.addEventListener('touchmove', move, { passive: false });
        cnv.addEventListener('touchend', end);
      });
    }

    function updateCharCount(textarea) {
      const fid = textarea.dataset.fid;
      const max = Number(textarea.dataset.max) || 0;
      const len = textarea.value.length;
      const cc = document.querySelector(`[data-slot="cc-${fid}"]`);
      if (!cc) return;
      cc.textContent = `${len} / ${max}`;
      cc.classList.remove('is-warning', 'is-over');
      if (max && len >= max)              cc.classList.add('is-over');
      else if (max && len > max * 0.85)   cc.classList.add('is-warning');
    }

    function clearFieldError(fid) {
      const err = document.querySelector(`[data-slot="err-${fid}"]`);
      if (err) err.textContent = '';
      document.querySelectorAll(`[data-fid="${fid}"]`).forEach(el => el.classList?.remove?.('is-invalid'));
    }

    function setFieldError(fid, msg) {
      const err = document.querySelector(`[data-slot="err-${fid}"]`);
      if (err) err.textContent = msg;
      document.querySelectorAll(`[data-fid="${fid}"]`).forEach(el => el.classList?.add?.('is-invalid'));
    }

    // ═══════════════════════════════════════════════════════════════
    // Progress (pourcentage des champs requis remplis)
    // ═══════════════════════════════════════════════════════════════
    function refreshProgress() {
      if (!_form) return;
      const required = [];
      for (const sec of _form.sections || []) {
        for (const f of (sec.fields || [])) {
          // Ne compte que les champs requis ET visibles à l'instant T
          if (isFieldRequired(f)) required.push(f);
        }
      }
      if (required.length === 0) {
        document.getElementById('pf-progress-fill').style.width = '100%';
        document.getElementById('pf-progress-label').textContent = 'Aucun champ obligatoire';
        return;
      }
      const filled = required.filter(f => hasValue(f.id)).length;
      const pct = Math.round((filled / required.length) * 100);
      document.getElementById('pf-progress-fill').style.width = pct + '%';
      document.getElementById('pf-progress-label').textContent = `${filled} / ${required.length} champs obligatoires`;
    }

    function hasValue(fid) {
      const v = _values[fid];
      if (v == null) return false;
      if (typeof v === 'string') return v.trim().length > 0;
      if (Array.isArray(v)) return v.filter(x => x != null && String(x).trim()).length > 0;
      if (typeof v === 'object') return Object.values(v).some(x => x != null && String(x).trim());
      return true;
    }

    // ═══════════════════════════════════════════════════════════════
    // Validation
    // ═══════════════════════════════════════════════════════════════
    function validate() {
      let firstErrId = null;
      for (const sec of _form.sections || []) {
        for (const f of (sec.fields || [])) {
          clearFieldError(f.id);
          // Skip les champs cachés (visible_if non satisfait) :
          // leur valeur ne doit pas bloquer la soumission ni être
          // considérée comme "requise non remplie".
          if (!_visibleFieldIds.has(f.id)) continue;
          if (isFieldRequired(f) && !hasValue(f.id)) {
            setFieldError(f.id, 'Ce champ est obligatoire');
            firstErrId = firstErrId || f.id;
            continue;
          }
          const v = _values[f.id];
          if (v == null || v === '') continue;
          if (f.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
            setFieldError(f.id, 'Adresse email invalide');
            firstErrId = firstErrId || f.id;
          } else if ((f.type === 'website' || f.type === 'url-external') && !/^https?:\/\//.test(v)) {
            setFieldError(f.id, 'L\'URL doit commencer par http:// ou https://');
            firstErrId = firstErrId || f.id;
          } else if (f.type === 'text-long' && f.options?.max_chars && f.options?.strict !== false && v.length > f.options.max_chars) {
            setFieldError(f.id, `Trop long (${v.length} / ${f.options.max_chars} caractères max)`);
            firstErrId = firstErrId || f.id;
          }
        }
      }
      if (firstErrId) {
        const el = document.querySelector(`.pf-field[data-fid="${firstErrId}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        showToast('Quelques champs nécessitent votre attention');
        return false;
      }
      return true;
    }

    // ═══════════════════════════════════════════════════════════════
    // Soumission (placeholder P3.2 — vraie soumission = P3.3)
    // ═══════════════════════════════════════════════════════════════
    async function submitForm() {
      if (_submitting) return;
      if (!validate()) return;
      _submitting = true;
      const btn = document.querySelector('[data-act="submit"]');
      if (btn) { btn.disabled = true; btn.textContent = 'Envoi en cours…'; }

      const slug = getSlug();
      try {
        const res = await fetch(`${API_BASE}/api/pulsa/responses/${slug}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ responses: _values }),
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const msg = data?.error || data?.message || `Erreur HTTP ${res.status}`;
          showToast('Envoi échoué : ' + msg);
          if (btn) { btn.disabled = false; btn.textContent = 'Envoyer mes réponses'; }
          _submitting = false;
          return;
        }

        // Succès — écran de remerciement avec accusé de réception
        const mailNote = data?.mail === 'sent'
          ? 'Les destinataires ont été notifiés par mail.'
          : (data?.mail === 'failed'
              ? 'Votre réponse a été enregistrée. La notification mail n\'a pas pu partir, mais l\'équipe sera prévenue.'
              : 'Votre réponse a été enregistrée.');
        document.getElementById('pf-app').innerHTML = `
          <div class="pf-loading" style="margin-top:60px;max-width:520px;">
            <div style="font-size:48px;line-height:1;margin-bottom:16px;color:var(--pf-green);">✓</div>
            <h1 style="font-size:26px;font-weight:900;letter-spacing:-.03em;color:var(--pf-brand);margin-bottom:10px;">
              Merci pour votre réponse !
            </h1>
            <p style="font-size:14px;color:var(--pf-muted);line-height:1.6;margin-bottom:8px;">
              ${escape(mailNote)}
            </p>
            <p style="font-size:12px;color:var(--pf-muted);line-height:1.6;font-style:italic;">
              Vous pouvez fermer cette page.
            </p>
            ${data?.response_id ? `
              <p style="margin-top:24px;padding:10px;background:var(--pf-light);border-radius:8px;font-size:11px;color:var(--pf-muted);font-family:'SF Mono',Menlo,monospace;">
                Accusé : ${escape(data.response_id)}
              </p>
            ` : ''}
          </div>
        `;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (e) {
        showToast('Erreur réseau — réessayez dans un instant');
        if (btn) { btn.disabled = false; btn.textContent = 'Envoyer mes réponses'; }
        _submitting = false;
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // Bootstrap
    // ═══════════════════════════════════════════════════════════════
    async function load() {
      const slug = getSlug();
      if (!slug) {
        renderError('Adresse incorrecte', 'L\'URL ne contient pas d\'identifiant de formulaire valide. Format attendu : /form?s=mon-slug', 'NO_SLUG');
        return;
      }
      try {
        const res = await fetch(`${API_BASE}/api/pulsa/public/${slug}`);
        if (res.status === 404) {
          renderError('Formulaire introuvable', 'Ce lien ne pointe vers aucun formulaire publié. Vérifiez l\'URL auprès de l\'expéditeur.', '404');
          return;
        }
        if (!res.ok) {
          renderError('Erreur temporaire', 'Le formulaire n\'a pas pu être chargé. Réessayez dans un instant.', 'HTTP ' + res.status);
          return;
        }
        const data = await res.json();
        _form = data?.form;
        if (!_form || !Array.isArray(_form.sections)) {
          renderError('Formulaire introuvable', 'La réponse du serveur est invalide.', 'NO_FORM');
          return;
        }
        applyBrand(_form.meta || {});
        renderForm();
      } catch (e) {
        renderError('Erreur réseau', 'Impossible de joindre le serveur. Vérifiez votre connexion et réessayez.', e?.message || 'NETWORK');
      }
    }

    function renderForm() {
      const meta = _form.meta || {};
      const sections = _form.sections || [];
      const totalFields = sections.reduce((a, s) => a + (s.fields?.length || 0), 0);
      document.title = (meta.title || 'Pulsa') + ' — Formulaire';

      const logoHtml = (meta.logo_data_url || meta.logo_url)
        ? `<img src="${escape(meta.logo_data_url || meta.logo_url)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'pf-logo-fallback',textContent:'P'}))">`
        : `<span class="pf-logo-fallback">P</span>`;

      document.getElementById('pf-app').innerHTML = `
        <header class="pf-header">
          <div class="pf-header-inner">
            <div class="pf-logo">${logoHtml}</div>
            <div class="pf-header-text">
              <div class="pf-header-tag">Formulaire</div>
              <div class="pf-header-title">${escape(meta.title || 'Sans titre')}</div>
            </div>
          </div>
          <div class="pf-progress"><div class="pf-progress-fill" id="pf-progress-fill"></div></div>
          <div class="pf-progress-label" id="pf-progress-label">0 / 0</div>
        </header>

        ${meta.anonymous !== false ? `
          <div class="pf-anon-banner">
            <strong>Réponses anonymes</strong> — vos réponses ne servent qu'à préparer le suivi.
          </div>
        ` : ''}

        <div class="pf-container">
          ${meta.intro ? `<div class="pf-intro">${escape(meta.intro)}</div>` : ''}

          ${sections.map((s, idx) => `
            <section class="pf-section">
              <header class="pf-section-head">
                <span class="pf-section-num">Bloc ${String(idx + 1).padStart(2, '0')}</span>
                <span class="pf-section-title">${escape(s.title || 'Section ' + (idx + 1))}</span>
              </header>
              ${s.subtitle ? `<div class="pf-section-sub">${escape(s.subtitle)}</div>` : ''}
              <div class="pf-section-body">
                ${(s.fields || []).map(renderField).join('')}
              </div>
            </section>
          `).join('')}

          <div class="pf-submit-section">
            <div class="pf-submit-title">Tout est prêt ?</div>
            <div class="pf-submit-sub">
              ${totalFields} champ${totalFields > 1 ? 's' : ''} dans ce formulaire. Vérifiez vos réponses, puis envoyez.
            </div>
            <button class="pf-submit-btn" type="button" data-act="submit">
              Envoyer mes réponses
            </button>
          </div>

          <p class="pf-footer">
            Formulaire propulsé par <a href="https://protein-keystone.com" target="_blank" rel="noopener">Keystone OS</a> · Pulsa
          </p>
        </div>
      `;

      bindEvents(document.getElementById('pf-app'));
      initSignatureCanvases();
      prefillFromUrl();
      applyPrefilledToDom();
      refreshVisibility();
      recomputeAll();
      refreshRequiredIndicators();
      refreshProgress();
    }

    load();
  </script>
</body>
</html>
