<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#05060f">
  <title>Assistant</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       SMART AGENT · Page publique de dialogue (SA-5.1)
       Chat anonyme mobile-first, charte Apple premium navy/gold.
       Le visiteur n'a pas de compte : il interroge un agent publié,
       qui répond UNIQUEMENT depuis son coffre de savoir (ancré).
       ═══════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sa-brand:   #0a2741;
      --sa-brand-2: #0d3254;
      --sa-accent:  #c9b48a;
      --sa-accent-2:#a8895a;
      --sa-body:    #1a2a3a;
      --sa-muted:   #6b7a8d;
      --sa-light:   #f4f6f9;
      --sa-border:  #dde3ec;
      --sa-bg:      #eef1f5;
      --sa-danger:  #e05c5c;
      /* Accent des éléments interactifs du v2 (barre du haut + bouton d'envoi).
         Défauts = l'indigo d'origine ; surchargés par theme.ui_color (applyTheme,
         dérivés calculés en JS — pas de dépendance color-mix). */
      --sav2-brand:   #6f6cf0;
      --sav2-brand-2: #5046d6;
      --sav2-brand-lt:#c2c0ff;
      --sav2-brand-tx:rgba(196,194,255,.82);
      --sav2-brand-sh:rgba(80,70,214,.5);
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--sa-bg);
      color: var(--sa-body);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── États plein écran (chargement / erreur) ───────────── */
    .sa-full {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 40px 28px;
    }
    .sa-spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--sa-border);
      border-top-color: var(--sa-accent);
      border-radius: 50%;
      animation: sa-spin .9s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes sa-spin { to { transform: rotate(360deg); } }
    .sa-full h1 {
      font-size: 22px; font-weight: 900; letter-spacing: -.03em;
      color: var(--sa-brand); margin-bottom: 8px;
    }
    .sa-full p { font-size: 14px; color: var(--sa-muted); line-height: 1.6; max-width: 360px; }

    /* ── Header ────────────────────────────────────────────── */
    .sa-header {
      position: sticky; top: 0; z-index: 30;
      background: var(--sa-brand);
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 13px;
      display: flex; align-items: center; gap: 13px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .16);
    }
    .sa-avatar {
      flex-shrink: 0;
      width: 40px; height: 40px; border-radius: 11px;
      background: linear-gradient(135deg, var(--sa-accent-2), var(--sa-accent));
      color: var(--sa-brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900;
    }
    .sa-head-txt { flex: 1; min-width: 0; }
    .sa-head-tag {
      font-size: 10px; font-weight: 800; letter-spacing: .14em;
      text-transform: uppercase; color: var(--sa-accent); opacity: .9;
    }
    .sa-head-name {
      font-size: 16px; font-weight: 900; color: #fff;
      letter-spacing: -.02em; line-height: 1.25;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Fil de discussion ─────────────────────────────────── */
    .sa-thread {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px 8px;
    }
    .sa-thread-inner { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

    .sa-msg { display: flex; max-width: 86%; }
    .sa-msg-bubble {
      padding: 12px 15px;
      border-radius: 16px;
      font-size: 15px; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    .sa-msg.agent { align-self: flex-start; }
    .sa-msg.agent .sa-msg-bubble {
      background: #fff;
      color: var(--sa-body);
      border-bottom-left-radius: 5px;
      box-shadow: 0 1px 7px rgba(10, 39, 65, .07);
    }
    .sa-msg.user { align-self: flex-end; }
    .sa-msg.user .sa-msg-bubble {
      background: var(--sa-brand);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .sa-msg.agent.is-fallback .sa-msg-bubble {
      background: var(--sa-light);
      color: var(--sa-muted);
      border: 1px dashed var(--sa-border);
      font-style: italic;
    }
    /* SA-8.4 — les bulles de l'assistant se lisent au toucher */
    .sa-msg.agent .sa-msg-bubble { cursor: pointer; }
    .sa-retry {
      margin-left: 6px;
      padding: 4px 12px;
      border: 1px solid var(--sa-border);
      border-radius: 999px;
      background: #fff;
      color: var(--sa-brand);
      font: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer;
    }
    /* SA-8.4 — préparation de la voix (téléchargement du modèle, une fois) */
    .sa-head-voice.is-loading { animation: sa-voice-pulse 1s ease-in-out infinite; }
    @keyframes sa-voice-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }

    /* ── Indicateur de frappe ──────────────────────────────── */
    .sa-typing { display: flex; gap: 4px; padding: 14px 16px; }
    .sa-typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--sa-muted); opacity: .5;
      animation: sa-bounce 1.2s infinite ease-in-out;
    }
    .sa-typing span:nth-child(2) { animation-delay: .15s; }
    .sa-typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes sa-bounce { 0%, 60%, 100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-5px); opacity: .9; } }

    /* ── Barre de saisie ───────────────────────────────────── */
    .sa-composer {
      position: sticky; bottom: 0;
      background: rgba(238, 241, 245, .92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--sa-border);
      padding: 10px 14px calc(env(safe-area-inset-bottom, 0px) + 10px);
    }
    .sa-composer-inner {
      max-width: 720px; margin: 0 auto;
      display: flex; align-items: flex-end; gap: 9px;
    }
    .sa-input {
      flex: 1;
      border: 1.5px solid var(--sa-border);
      background: #fff;
      border-radius: 22px;
      padding: 11px 16px;
      font: inherit; font-size: 16px;   /* < 16px = zoom automatique iOS au focus */
      color: var(--sa-body);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color .15s, box-shadow .15s;
    }
    .sa-input:focus { border-color: var(--sa-accent); box-shadow: 0 0 0 3px rgba(201, 180, 138, .18); }
    .sa-send {
      flex-shrink: 0;
      width: 44px; height: 44px; border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--sa-accent-2), var(--sa-accent));
      color: var(--sa-brand);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(201, 180, 138, .3);
      transition: transform .15s, opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sa-send:active { transform: scale(.92); }
    .sa-send:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
    .sa-send svg { width: 20px; height: 20px; }

    .sa-foot {
      text-align: center;
      font-size: 11px; color: var(--sa-muted); opacity: .7;
      padding: 8px 16px 0;
    }

    /* ── Vocal : interrupteur lecture (header) + micro dictée (barre) ── */
    .sa-head-voice {
      flex-shrink: 0; margin-left: auto;
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, .22);
      background: rgba(255, 255, 255, .08);
      color: rgba(255, 255, 255, .85);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sa-head-voice:hover { background: rgba(255, 255, 255, .16); color: #fff; }
    .sa-head-voice.is-on {
      color: var(--sa-accent);
      border-color: var(--sa-accent);
      background: rgba(201, 180, 138, .16);
    }
    .sa-head-voice svg { width: 19px; height: 19px; }
    .sa-head-voice-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .sa-head-voice-pick {
      max-width: 150px; height: 34px;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, .22);
      background: rgba(255, 255, 255, .10);
      color: #fff;
      font-size: 12px; padding: 0 8px;
      cursor: pointer;
    }
    .sa-head-voice-pick option { color: #111; }

    .sa-mic {
      flex-shrink: 0;
      width: 44px; height: 44px; border-radius: 50%;
      border: 1.5px solid var(--sa-border);
      background: #fff;
      color: var(--sa-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sa-mic:hover { color: var(--sa-brand); border-color: var(--sa-accent); }
    .sa-mic svg { width: 20px; height: 20px; }
    .sa-mic.is-listening {
      color: #fff;
      background: #e5484d; border-color: #e5484d;
      animation: sa-mic-pulse 1.2s ease-in-out infinite;
    }
    @keyframes sa-mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229, 72, 77, .4); }
      50%      { box-shadow: 0 0 0 7px rgba(229, 72, 77, 0); }
    }

    /* ── Mode embed (?embed=1) — la landing embarque la page dans un
       téléphone et porte SA PROPRE barre de saisie (postMessage) : on
       n'affiche que la conversation, header épuré. Opt-in par query,
       zéro impact sur la page publique normale. ── */
    .sa-embed .sa-composer { display: none; }
    .sa-embed .sa-head-tag { display: none; }

    /* ═══════════════════════════════════════════════════════════════
       MODE PUBLIC v2 (refonte 2026-06) — thème sombre, réponse unique.
       Actif via la classe `sa-v2` (ajoutée tôt, hors embed). Le mode
       embed (landing) garde l'ancien rendu clair ci-dessus, intact.
       Classes préfixées `sav2-` → zéro collision avec l'ancien.
       ═══════════════════════════════════════════════════════════════ */
    .sa-v2 body {
      color: #fff;
      background:
        radial-gradient(125% 78% at 50% 102%, rgba(96,74,206,.50) 0%, rgba(40,28,86,0) 58%),
        linear-gradient(180deg,#05060f 0%,#0a0b1e 27%,#15123a 54%,#221a52 80%,#2c2160 100%);
      background-attachment: fixed;
    }
    .sa-v2 .sa-full h1 { color: #fff; }
    .sa-v2 .sa-full p  { color: rgba(255,255,255,.72); }

    /* Header : lien URL (gauche) · téléphone · onde voix (droite) */
    .sav2-top { display: flex; align-items: center; gap: 11px; padding: calc(env(safe-area-inset-top,0px) + 16px) 16px 6px; }
    .sav2-url { flex: 1; min-width: 0; height: 46px; display: flex; align-items: center; gap: 11px; padding: 0 16px;
      border: 2px solid var(--sav2-brand-lt); border-radius: 24px; background: rgba(255,255,255,.045); text-decoration: none; }
    .sav2-url-globe { flex-shrink: 0; color: var(--sav2-brand-lt); display: flex; align-items: center; justify-content: center; }
    .sav2-url-globe svg { width: 22px; height: 22px; }
    .sav2-url-txt { font-size: 14px; letter-spacing: .01em; color: var(--sav2-brand-tx); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sav2-top-spacer { flex: 1; }
    .sav2-top-btn { flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%; background: transparent; border: none; cursor: pointer;
      color: var(--sav2-brand-lt); display: flex; align-items: center; justify-content: center; text-decoration: none;
      -webkit-tap-highlight-color: transparent; transition: transform .12s; }
    .sav2-top-btn:active { transform: scale(.92); }
    .sav2-top-btn svg { width: 46px; height: 46px; display: block; }
    .sav2-voice.is-on { color: #fff; }
    .sav2-voice.is-on svg { filter: drop-shadow(0 0 6px rgba(160,160,255,.7)); }
    .sav2-voice.is-loading { animation: sav2-pulse 1s ease-in-out infinite; }
    @keyframes sav2-pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    /* SA-13.3 — le sélecteur de langue du header a été retiré (header allégé) :
       l'écrit s'adapte tout seul à la langue de la question (worker), et le
       choix explicite vit dans le mode vocal (.sav2-vm-langs ci-dessous). */

    /* Carrousel de cartes (slide latéral, nombre illimité) */
    .sav2-cards { display: flex; gap: 10px; padding: 12px 16px 6px; overflow-x: auto; scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .sav2-cards::-webkit-scrollbar { display: none; }
    .sav2-card { position: relative; flex: 0 0 31%; aspect-ratio: 4/3; border: 1px solid rgba(164,162,255,.42); border-radius: 16px; overflow: hidden;
      cursor: pointer; scroll-snap-align: start; background: rgba(255,255,255,.04); padding: 0;
      -webkit-tap-highlight-color: transparent; transition: transform .14s; }
    .sav2-card:active { transform: scale(.96); }
    .sav2-card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sav2-card-pill { position: absolute; left: 6px; right: 6px; bottom: 6px; padding: 5px 9px; border-radius: 11px;
      background: rgba(8,8,22,.66); color: #fff; font-size: 13px; font-weight: 500; line-height: 1.25; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
    /* Repère de défilement : la barre native est masquée et une souris classique
       (Windows, molette verticale seule) ne sait pas défiler à l'horizontale →
       poignée de points sous les cartes + glisser à la souris + molette mappée. */
    .sav2-cards.is-draggable { cursor: grab; }
    .sav2-cards.is-dragging  { cursor: grabbing; scroll-snap-type: none; scroll-behavior: auto; }
    .sav2-dots { display: none; justify-content: center; align-items: center; gap: 2px; padding: 2px 16px 4px; }
    .sav2-dots.is-on { display: flex; }
    .sav2-dot { width: auto; min-width: 18px; height: 16px; padding: 0 3px; border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .sav2-dot::after { content: ''; display: block; width: 6px; height: 6px; border-radius: 3px;
      background: rgba(164,162,255,.32); transition: width .18s ease, background .18s ease; }
    .sav2-dot.is-on::after { width: 17px; background: var(--sav2-brand-lt); }

    /* Zone de réponse : UNE seule réponse, centrée (pas de fil) */
    .sav2-answer { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }
    .sav2-answer::-webkit-scrollbar { width: 3px; }
    .sav2-answer::-webkit-scrollbar-thumb { background: rgba(180,178,255,.45); border-radius: 3px; }
    .sav2-answer-scroll { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 26px 24px; }
    .sav2-answer-text { text-align: center; font-weight: 800; font-size: clamp(20px,5.6vw,24px); line-height: 1.36;
      letter-spacing: -.01em; color: #fff; white-space: pre-wrap; cursor: pointer; animation: sav2-rise .45s ease both; }
    @keyframes sav2-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .sav2-answer-text.is-fallback { font-weight: 600; color: rgba(228,227,255,.92); }
    .sav2-answer.is-thinking .sav2-answer-text { opacity: .3; filter: blur(.3px); }
    /* Markdown rendu dans la réponse v2 (gras + listes, lisibles dans le bloc centré) */
    .sav2-answer-text p { margin: 0 0 .55em; }
    .sav2-answer-text p:last-child { margin-bottom: 0; }
    .sav2-answer-text strong { font-weight: 900; }
    .sav2-answer-text em { font-style: italic; }
    .sav2-answer-text ol,
    .sav2-answer-text ul { display: inline-block; text-align: left; margin: .5em 0 0; padding-left: 1.25em;
      font-weight: 600; font-size: .72em; line-height: 1.5; letter-spacing: normal; }
    .sav2-answer-text li { margin: .3em 0; }
    .sav2-answer-text code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .82em;
      background: rgba(255,255,255,.12); padding: .08em .34em; border-radius: 5px; font-weight: 600; }
    .sav2-answer-text a { color: #c7c5ff; text-decoration: underline; }
    /* Markdown rendu dans la bulle embed (legacy) */
    .sa-msg-bubble p { margin: 0 0 .5em; }
    .sa-msg-bubble p:last-child { margin-bottom: 0; }
    .sa-msg-bubble ol,
    .sa-msg-bubble ul { margin: .4em 0; padding-left: 1.4em; }
    .sa-msg-bubble li { margin: .2em 0; }
    .sa-msg-bubble strong { font-weight: 700; }
    .sa-msg-bubble em { font-style: italic; }
    .sa-msg-bubble code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em;
      background: rgba(127, 127, 127, .16); padding: .08em .34em; border-radius: 5px; }
    .sa-msg-bubble a { color: inherit; text-decoration: underline; }
    .sav2-thinking { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
      display: none; justify-content: center; gap: 7px; }
    .sav2-answer.is-thinking .sav2-thinking { display: flex; }
    .sav2-thinking span { width: 8px; height: 8px; border-radius: 50%; background: rgba(200,198,255,.85); animation: sav2-blink 1.25s ease-in-out infinite; }
    .sav2-thinking span:nth-child(2) { animation-delay: .18s; }
    .sav2-thinking span:nth-child(3) { animation-delay: .36s; }
    @keyframes sav2-blink { 0%,60%,100% { opacity: .28; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }

    /* Composer : champ blanc + micro + envoyer */
    .sav2-composer { padding: 6px 16px 4px; }
    .sav2-field { display: flex; align-items: flex-end; gap: 8px; background: #fff; border-radius: 22px;
      padding: 11px 11px 11px 18px; box-shadow: 0 10px 30px rgba(0,0,0,.32); }
    .sav2-input { flex: 1; border: none; outline: none; resize: none; background: transparent; font: inherit; font-size: 16px;
      line-height: 1.4; color: #11122a; max-height: 104px; padding: 6px 0; }
    .sav2-input::placeholder { color: #9498a8; }
    .sav2-mic { flex-shrink: 0; width: 40px; height: 40px; border: none; background: transparent; cursor: pointer; color: #3c3c4c;
      display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .sav2-mic svg { width: 23px; height: 23px; }
    .sav2-mic.is-listening { color: #e0484f; }
    .sav2-send { flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
      background: linear-gradient(135deg,var(--sav2-brand),var(--sav2-brand-2)); color: #fff; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px var(--sav2-brand-sh); -webkit-tap-highlight-color: transparent; transition: transform .12s; }
    .sav2-send:active { transform: scale(.92); }
    .sav2-send:disabled { opacity: .5; }
    .sav2-send svg { width: 22px; height: 22px; }
    .sav2-retry { margin-left: 8px; padding: 4px 12px; border: 1px solid rgba(196,194,255,.5); border-radius: 999px;
      background: transparent; color: #fff; font: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
    .sav2-rgpd { text-align: center; font-size: 11px; line-height: 1.45; color: rgba(196,194,255,.78); opacity: .82;
      padding: 8px 20px calc(env(safe-area-inset-bottom,0px) + 14px); }

    /* ═══ SA-13 — MODE CONVERSATION VOCALE (plein écran, half-duplex) ═══
       Orbe central = seul contrôle : son état (écoute / réfléchit / parle)
       est porté par une classe sur l'overlay. Écran de préparation intégré
       (1er téléchargement de la voix : progression réelle + conseils). */
    .sav2-vm { position: fixed; inset: 0; z-index: 90; display: flex; flex-direction: column;
      background:
        radial-gradient(125% 78% at 50% 102%, rgba(96,74,206,.55) 0%, rgba(40,28,86,0) 58%),
        linear-gradient(180deg,#05060f 0%,#0a0b1e 27%,#15123a 54%,#221a52 80%,#2c2160 100%);
      animation: sav2-vm-in .22s ease-out; }
    @keyframes sav2-vm-in { from { opacity: 0; } to { opacity: 1; } }
    .sav2-vm-head { display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: calc(env(safe-area-inset-top,0px) + 14px) 14px 0; }
    /* SA-13.3 — choix de langue DANS le mode vocal (seul endroit où il est
       techniquement requis : la reconnaissance doit connaître la langue
       à l'avance). Pré-positionné sur la langue détectée, mémorisé session. */
    .sav2-vm-langs { display: flex; gap: 7px; }
    .sav2-vm-langpill { min-width: 42px; height: 32px; padding: 0 10px; border-radius: 999px; cursor: pointer;
      border: 1px solid rgba(164,162,255,.35); background: transparent; color: #c2c0ff;
      font: 700 12.5px/1 -apple-system, system-ui, sans-serif; letter-spacing: .04em;
      -webkit-tap-highlight-color: transparent; transition: all .14s; }
    .sav2-vm-langpill.is-active { background: rgba(164,162,255,.22); color: #fff; border-color: rgba(164,162,255,.85); }
    .sav2-vm-close { width: 46px; height: 46px; border-radius: 50%; border: none; background: rgba(255,255,255,.08);

        : '<option value="">Voix par défaut…</option>';
    }

    const SVG_MIC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>';
    function svgVol(on) {
      return on
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
    }
    // Construit et joue l'utterance : voix résolue à l'instant T, langue
    // TOUJOURS posée (sans elle, iOS retombe sur une voix anglaise robot),
    // référence gardée (sans elle, Chrome garbage-collecte et coupe net).
    function _speakNow(text) {
      const u = new SpeechSynthesisUtterance(text);
      const v = chosenVoice();
      if (v) u.voice = v;
      u.lang = (v && v.lang) ? v.lang : 'fr-FR';
      _lastUtter = u;
      window.speechSynthesis.speak(u);
    }
    function _speakRaw(text) {
      if (!HAS_TTS || !text) return;
      try {
        const synth = window.speechSynthesis;
        if (synth.speaking || synth.pending) {
          synth.cancel();
          // iOS saute l'utterance si speak() suit cancel() dans le même tick.
          setTimeout(() => { try { _speakNow(text); } catch (_) {} }, 120);
        } else {
          _speakNow(text);
        }
      } catch (_) {}
    }
    function speak(text) {
      if ((!_voiceOn && !_vmOn) || !text) return;   // SA-13.1 — le mode vocal parle même si la lecture n'est pas activée
      _speakSmart(text);
    }
    function toggleVoice() {
      _voiceOn = !_voiceOn;
      try { localStorage.setItem('sa_voice_on', _voiceOn ? '1' : '0'); } catch (_) {}
      if (_voiceOn) {
        _primeTtsAudio();   // geste → audio débloqué pour les lectures à venir
        _warmPiper();       // le modèle se télécharge pendant que le visiteur écrit
        ensureVoices();     // prépare aussi le repli natif
      } else {
        if (_piperMod && _piperMod.stopSpeaking) { try { _piperMod.stopSpeaking(); } catch (_) {} }
        if (HAS_TTS) window.speechSynthesis.cancel();
      }
      const btn = document.getElementById('sa-voice');
      if (btn) {
        btn.classList.toggle('is-on', _voiceOn);
        if (!NEW_UI) btn.innerHTML = svgVol(_voiceOn);   // v2 : garde l'icône onde (l'état ON est porté par .is-on)
        btn.title = _voiceOn ? t('voiceOn') : t('voiceOff');
        btn.setAttribute('aria-pressed', _voiceOn ? 'true' : 'false');
      }
    }
    function startDictation() {
      if (!SR_CLASS) return;
      const input = document.getElementById('sa-input');
      const mic = document.getElementById('sa-mic');
      if (!input) return;
      if (_listening) { try { _rec && _rec.stop(); } catch (_) {} return; }
      try {
        _rec = new SR_CLASS();
        _rec.lang = LANG_BCP[_lang] || 'fr-FR'; _rec.interimResults = true; _rec.continuous = false;   // SA-11.2 — dictée dans la langue active
        const base = (input.value || '').trim();
        _rec.onstart = () => { _listening = true; mic && mic.classList.add('is-listening'); };
        _rec.onresult = (e) => {
          if (_busy) return;   // un résultat tardif ne doit pas re-remplir le champ vidé à l'envoi
          let txt = '';
          for (let k = 0; k < e.results.length; k++) txt += e.results[k][0].transcript;
          input.value = (base ? base + ' ' : '') + txt;
          input.dispatchEvent(new Event('input'));
        };
        _rec.onerror = (e) => {
          _listening = false; mic && mic.classList.remove('is-listening');
          if (e && (e.error === 'not-allowed' || e.error === 'service-not-allowed')) {
            addBubble('agent', t('micBlocked'), true);
          }
        };
        _rec.onend = () => { _listening = false; mic && mic.classList.remove('is-listening'); input.focus(); };
        _rec.start();
      } catch (_) { _listening = false; }
    }

    /* ═══ SA-13.1 — MODE CONVERSATION VOCALE (half-duplex, type assistant) ═══
       Boucle : écoute (SpeechRecognition) → fin de parole détectée → envoi via
       le pipeline NORMAL (sendMessage : streaming SSE + Piper phrase par
       phrase) → fin de lecture (onState 'idle') → ré-écoute automatique.
       Half-duplex assumé : le micro ne s'ouvre JAMAIS pendant que l'agent
       parle (sur haut-parleur il se transcrirait lui-même) ; toucher l'orbe
       = interrompre la lecture ou reprendre la parole. v2 uniquement. */
    let _vmOn = false, _vmRec = null, _vmState = 'idle';
    function vmSet(state, statusText) {
      if (!_vmOn) return;
      _vmState = state;
      const root = document.getElementById('sav2-vm');
      if (!root) return;
      root.classList.toggle('is-prep',      state === 'prep');
      root.classList.toggle('is-listening', state === 'listening');
      root.classList.toggle('is-thinking',  state === 'thinking');
      root.classList.toggle('is-speaking',  state === 'speaking');
      const lbl = document.getElementById('sav2-vm-status');
      if (lbl) lbl.textContent = statusText != null ? statusText :
        (state === 'listening' ? t('vmListening') : state === 'thinking' ? t('vmThinking')
          : state === 'speaking' ? t('vmSpeaking') : t('vmTap'));
    }
    function vmSub(text) {
      if (!_vmOn) return;
      const el = document.getElementById('sav2-vm-sub');
      if (el) el.textContent = String(text || '');
    }
    // Relais des états du moteur voix (createSpeechStream / speakText) vers
    // l'orbe. Fin de lecture ('idle' depuis 'speaking') → le micro se rouvre
    // tout seul : c'est LA boucle conversationnelle.
    function vmOnSpeech(st) {
      if (!_vmOn) return;
      if (st === 'loading')       vmSet('thinking');
      else if (st === 'speaking') vmSet('speaking');
      else if (st === 'idle' && _vmState === 'speaking') { vmSet('idle'); vmListen(); }
    }
    function vmListen() {
      if (!_vmOn || !SR_CLASS || _busy) return;
      try {
        _vmRec = new SR_CLASS();
        _vmRec.lang = LANG_BCP[_lang] || 'fr-FR';
        _vmRec.interimResults = true; _vmRec.continuous = false;
        let finalTxt = '';
        _vmRec.onstart  = () => { vmSet('listening'); vmSub(''); };
        _vmRec.onresult = (e) => {
          let txt = '';
          for (let k = 0; k < e.results.length; k++) txt += e.results[k][0].transcript;
          vmSub(txt);   // ce que le visiteur dit, affiché en direct
          if (e.results.length && e.results[e.results.length - 1].isFinal) finalTxt = txt.trim();
        };
        _vmRec.onerror = (e) => {
          _vmRec = null;
          if (e && (e.error === 'not-allowed' || e.error === 'service-not-allowed')) { vmSub(t('micBlocked')); vmSet('idle'); }
        };
        _vmRec.onend = () => {
          _vmRec = null;
          if (!_vmOn) return;
          if (finalTxt && !_busy) { vmSet('thinking'); sendMessage(finalTxt); }
          else if (_vmState === 'listening') vmSet('idle');   // silence → « touchez pour parler » (pas de micro qui tourne en boucle)
        };
        _vmRec.start();
      } catch (_) { vmSet('idle'); }
    }
    function vmOrbTap() {
      if (_vmState === 'speaking') {           // barge-in : couper la lecture → ré-écoute (via le relais 'idle')
        if (_piperMod && _piperMod.stopSpeaking) { try { _piperMod.stopSpeaking(); } catch (_) {} }
        if (HAS_TTS) { try { window.speechSynthesis.cancel(); } catch (_) {} }
        return;
      }
      if (_vmState === 'listening') { try { _vmRec && _vmRec.abort(); } catch (_) {} _vmRec = null; vmSet('idle'); return; }
      if (_vmState === 'idle') vmListen();     // 'thinking' / 'prep' : l'orbe est inerte
    }
    async function openVoiceMode() {
      if (_vmOn || _busy) return;
      _primeTtsAudio();                        // geste → élément audio béni (iOS)
      if (_listening) { try { _rec && _rec.abort(); } catch (_) {} _listening = false; document.getElementById('sa-mic')?.classList.remove('is-listening'); }
      _vmOn = true;
      const div = document.createElement('div');
      div.className = 'sav2-vm'; div.id = 'sav2-vm';
      div.innerHTML = `
        <div class="sav2-vm-head">
          <div class="sav2-vm-langs" role="radiogroup" aria-label="${escape(t('lang'))}">${SA_LANGS.map(l =>
            `<button class="sav2-vm-langpill${l === _lang ? ' is-active' : ''}" type="button" role="radio" aria-checked="${l === _lang ? 'true' : 'false'}" data-l="${l}">${l.toUpperCase()}</button>`).join('')}</div>
          <button class="sav2-vm-close" id="sav2-vm-close" type="button" aria-label="${escape(t('vmClose'))}">${SVG_V2.close}</button>
        </div>
        <div class="sav2-vm-center">
          <button class="sav2-vm-orb" id="sav2-vm-orb" type="button" aria-label="${escape(t('vmTap'))}"></button>
          <div class="sav2-vm-status" id="sav2-vm-status"></div>
          <div class="sav2-vm-sub" id="sav2-vm-sub" aria-live="polite"></div>
          <div class="sav2-vm-prep">
            <h2>${escape(t('vmPrepTitle'))}</h2>
            <p>${escape(t('vmPrepBody'))}</p>
            <div class="sav2-vm-bar"><span id="sav2-vm-barfill"></span></div>
            <ul class="sav2-vm-tips"><li>${escape(t('vmTip1'))}</li><li>${escape(t('vmTip2'))}</li><li>${escape(t('vmTip3'))}</li></ul>
          </div>
        </div>`;
      document.body.appendChild(div);
      document.getElementById('sav2-vm-close').addEventListener('click', closeVoiceMode);
      document.getElementById('sav2-vm-orb').addEventListener('click', vmOrbTap);
      // SA-13.3 — bascule de langue : micro + voix + libellés suivent ; la
      // voix de la nouvelle langue se télécharge en fond si nécessaire.
      div.querySelectorAll('.sav2-vm-langpill').forEach(pill => {
        pill.addEventListener('click', () => {
          const l = pill.dataset.l;
          if (!SA_LANGS.includes(l) || l === _lang) return;
          setLang(l);
          div.querySelectorAll('.sav2-vm-langpill').forEach(p => {
            const on = p.dataset.l === l;
            p.classList.toggle('is-active', on);
            p.setAttribute('aria-checked', on ? 'true' : 'false');
          });
          applyI18n();
          if (_vmState === 'prep') return; // préparation en cours : la langue est prise, on ne casse rien
          try { _vmRec && _vmRec.abort(); } catch (_) {}
          _vmRec = null;
          if (_piperMod && _piperMod.stopSpeaking) { try { _piperMod.stopSpeaking(); } catch (_) {} }
          if (HAS_TTS) { try { window.speechSynthesis.cancel(); } catch (_) {} }
          _warmPiper();                    // voix de la nouvelle langue (fond)
          vmSet('idle'); vmSub('');
          vmListen();                      // ré-écoute dans la nouvelle langue
        });
      });
      try {
        if (!_piperMod) _piperMod = await import('/app/lib/piper-tts.js');
        if (!_piperMod.isSupported()) throw new Error('wasm');
        const voiceId = _piperMod.voiceForLang(_lang);
        if (!_piperMod.isVoiceReady(voiceId)) {
          // SA-13.2 — écran de préparation : progression RÉELLE du premier
          // téléchargement + conseils d'usage. Jamais revu une fois en cache
          // (modèles servis immutable 1 an) — l'attente devient l'onboarding.
          vmSet('prep');
          const fill = document.getElementById('sav2-vm-barfill');
          await _piperMod.warmUp(voiceId, (p) => { if (fill) fill.style.width = Math.round(p * 100) + '%'; });
        }
      } catch (_) { /* moteur voix KO → la lecture retombera sur la voix système */ }
      if (!_vmOn) return;                      // fermé pendant la préparation
      vmListen();
    }
    function closeVoiceMode() {
      _vmOn = false;
      try { _vmRec && _vmRec.abort(); } catch (_) {}
      _vmRec = null;
      if (_piperMod && _piperMod.stopSpeaking) { try { _piperMod.stopSpeaking(); } catch (_) {} }
      if (HAS_TTS) { try { window.speechSynthesis.cancel(); } catch (_) {} }
      document.getElementById('sav2-vm')?.remove();
    }

    function escape(s) {
      return String(s == null ? '' : s)
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll('\'', '&#039;');
    }
    // Mini-rendu Markdown SÛR : on échappe d'abord (anti-XSS) puis on met en
    // forme la chaîne échappée — **gras**, *italique*, `code`, liens http(s),
    // listes (1. / -) et sauts de ligne. Seules NOS balises apparaissent.
    function mdInline(s) {
      return s
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }
    function mdToHtml(text) {
      const lines = escape(String(text == null ? '' : text)).split(/\r?\n/);
      const out = []; let list = null, para = [];
      const closeList = () => { if (list) { out.push('</' + list + '>'); list = null; } };
      const flushPara = () => { if (para.length) { out.push('<p>' + para.join('<br>') + '</p>'); para = []; } };
      for (const line of lines) {
        let m;
        if ((m = line.match(/^\s*\d+[.)]\s+(.*)$/))) {
          flushPara(); if (list !== 'ol') { closeList(); out.push('<ol>'); list = 'ol'; }
          out.push('<li>' + mdInline(m[1]) + '</li>');
        } else if ((m = line.match(/^\s*[-+*]\s+(.*)$/))) {
          flushPara(); if (list !== 'ul') { closeList(); out.push('<ul>'); list = 'ul'; }
          out.push('<li>' + mdInline(m[1]) + '</li>');
        } else if (line.trim() === '') {
          flushPara(); closeList();
        } else {
          closeList(); para.push(mdInline(line));
        }
      }
      flushPara(); closeList();
      return out.join('');
    }

    // Le rewrite Vercel /a/:slug est transparent (l'URL du navigateur reste
    // /a/:slug) → on lit le slug depuis le chemin, avec repli sur ?s=.
    function getSlug() {
      const m = location.pathname.match(/^\/a\/([0-9A-Za-z]{8})\/?$/);
      if (m) return m[1];
      const q = new URLSearchParams(location.search).get('s');
      return (q && /^[0-9A-Za-z]{8}$/.test(q)) ? q : null;
    }

    function renderError(title, msg) {
      document.getElementById('sa-root').innerHTML =
        `<div class="sa-full"><h1>${escape(title)}</h1><p>${escape(msg)}</p></div>`;
    }

    // Construit l'ossature du chat une fois l'accueil chargé.
    function renderChat(meta) {
      const initial = (meta.name || 'A').trim().charAt(0).toUpperCase() || 'A';
      document.getElementById('sa-root').outerHTML = `
        <header class="sa-header">
          <div class="sa-avatar">${escape(initial)}</div>
          <div class="sa-head-txt">
            <div class="sa-head-tag">${escape(meta.role || 'Assistant')}</div>
            <div class="sa-head-name">${escape(meta.name || 'Assistant')}</div>
          </div>
          ${(HAS_WASM || HAS_TTS) ? `<div class="sa-head-voice-wrap">
            <button class="sa-head-voice ${_voiceOn ? 'is-on' : ''}" id="sa-voice" type="button" aria-pressed="${_voiceOn ? 'true' : 'false'}" title="${_voiceOn ? 'Couper la lecture vocale' : 'Lire les réponses à voix haute'}">${svgVol(_voiceOn)}</button>
          </div>` : ''}
        </header>
        <main class="sa-thread" id="sa-thread"><div class="sa-thread-inner" id="sa-thread-inner"></div></main>
        <div class="sa-composer">
          <div class="sa-composer-inner">
            <textarea class="sa-input" id="sa-input" rows="1" maxlength="500"
                      autocapitalize="sentences" autocomplete="off" enterkeyhint="send"
                      placeholder="Posez votre question…" aria-label="Votre question"></textarea>
            ${HAS_SR ? `<button class="sa-mic" id="sa-mic" type="button" aria-label="Dicter votre question" title="Dicter votre question">${SVG_MIC}</button>` : ''}
            <button class="sa-send" id="sa-send" aria-label="Envoyer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                   stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
          <div class="sa-foot">Réponses issues du savoir de l'assistant. Vos questions ne sont pas rattachées à votre identité et sont effacées après 90&nbsp;jours.</div>
        </div>`;

      const input = document.getElementById('sa-input');
      const send  = document.getElementById('sa-send');
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
      });
      send.addEventListener('click', submit);
      // Clavier virtuel : quand il s'ouvre (focus / resize du viewport visuel),
      // on garde le fil collé en bas — sinon le composer disparaît derrière.
      input.addEventListener('focus', () => setTimeout(scrollDown, 250));
      if (window.visualViewport) window.visualViewport.addEventListener('resize', scrollDown);

      const voiceBtn = document.getElementById('sa-voice');
      if (voiceBtn) voiceBtn.addEventListener('click', toggleVoice);
      const micBtn = document.getElementById('sa-mic');
      if (micBtn) micBtn.addEventListener('click', startDictation);

      // SA-8.4 — lecture déjà active (visite précédente) : préchauffe direct.
      if (_voiceOn && HAS_WASM) _warmPiper();

      if (meta.opening) addBubble('agent', meta.opening);
      input.focus();
    }

    function addBubble(role, text, isFallback) {
      if (NEW_UI) {                         // v2 : zone unique ; la question ne s'affiche jamais
        if (role === 'user') return null;
        setAnswerV2(text, isFallback);
        return null;
      }
      const inner = document.getElementById('sa-thread-inner');
      const div = document.createElement('div');
      div.className = `sa-msg ${role}${isFallback ? ' is-fallback' : ''}`;
      div.innerHTML = `<div class="sa-msg-bubble">${mdToHtml(text)}</div>`;
      // SA-8.4 — toute bulle de l'assistant se lit AU TOUCHER (accueil compris).
      if (role === 'agent') {
        const b = div.querySelector('.sa-msg-bubble');
        b.title = t('listen');
        b.addEventListener('click', () => speakTap(text));
      }
      inner.appendChild(div);
      scrollDown(role === 'user');   // son propre message : toujours visible
      return div;
    }

    // Erreur réseau : bulle avec bouton « Réessayer » (renvoie le même message).
    function addRetryBubble(message) {
      if (NEW_UI) { setAnswerRetryV2(message); return; }
      const inner = document.getElementById('sa-thread-inner');
      const div = document.createElement('div');
      div.className = 'sa-msg agent is-fallback';
      const b = document.createElement('div');
      b.className = 'sa-msg-bubble';
      b.textContent = 'Connexion impossible. ';
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'sa-retry'; btn.textContent = 'Réessayer';
      btn.addEventListener('click', () => { div.remove(); sendMessage(message); });
      b.appendChild(btn); div.appendChild(b); inner.appendChild(div);
      scrollDown(true);
    }

    function showTyping() {
      if (NEW_UI) { showThinkingV2(); return; }
      const inner = document.getElementById('sa-thread-inner');
      const div = document.createElement('div');
      div.className = 'sa-msg agent'; div.id = 'sa-typing-row';
      div.innerHTML = `<div class="sa-msg-bubble"><div class="sa-typing"><span></span><span></span><span></span></div></div>`;
      inner.appendChild(div);
      scrollDown();
    }
    function hideTyping() {
      if (NEW_UI) { hideThinkingV2(); return; }
      document.getElementById('sa-typing-row')?.remove();
    }

    function scrollDown(force) {
      if (NEW_UI) { const a = document.getElementById('sav2-answer'); if (a) a.scrollTop = 0; return; }
      const t = document.getElementById('sa-thread');
      if (!t) return;
      // SA-8.4 — ne recolle en bas que si le visiteur y était déjà (à 140 px
      // près) : remonté relire un message, il n'est plus interrompu.
      if (!force && (t.scrollHeight - t.scrollTop - t.clientHeight) >= 140) return;
      requestAnimationFrame(() => { t.scrollTop = t.scrollHeight; });
    }

    /* ── SA-10.1 — affichage progressif pendant le streaming SSE ──
       streamStart/Update/Final s'abstraient de l'UI (v2 réponse unique OU
       thread legacy). Le texte canonique du `done` remplace l'aperçu. */
    let _streamBubble = null;   // legacy : bulle agent en cours de remplissage
    function setAnswerStreamingV2(text) {
      const a = document.getElementById('sav2-answer');
      const t = document.getElementById('sav2-answer-text');
      if (!t) return;
      if (a) a.classList.remove('is-thinking');
      t.classList.remove('is-fallback');
      t.innerHTML = mdToHtml(text);     // rendu léger au fil de l'eau (pas d'animation = pas de flicker)
      t.dataset.text = text;
      if (a) a.scrollTop = 0;
    }
    function streamStart() {
      hideTyping();
      if (NEW_UI) { setAnswerStreamingV2(''); return; }
      const inner = document.getElementById('sa-thread-inner');
      _streamBubble = document.createElement('div');
      _streamBubble.className = 'sa-msg agent';
      _streamBubble.innerHTML = '<div class="sa-msg-bubble"></div>';
      inner.appendChild(_streamBubble);
      scrollDown();
    }
    function streamUpdate(acc) {
      if (NEW_UI) { setAnswerStreamingV2(acc); return; }
      if (_streamBubble) { _streamBubble.querySelector('.sa-msg-bubble').innerHTML = mdToHtml(acc); scrollDown(); }
    }
    function streamFinal(reply, gapped) {
      if (NEW_UI) { setAnswerV2(reply, gapped); _streamBubble = null; return; }
      if (_streamBubble) {
        const b = _streamBubble.querySelector('.sa-msg-bubble');
        b.innerHTML = mdToHtml(reply);
        _streamBubble.classList.toggle('is-fallback', !!gapped);
        b.title = t('listen');
        b.addEventListener('click', () => speakTap(reply));
        _streamBubble = null;
      } else {
        addBubble('agent', reply, gapped);
      }
    }

    async function submit() {
      if (_busy) return;
      const input = document.getElementById('sa-input');
      const message = (input.value || '').trim();
      if (!message) return;

      // Une dictée encore active re-remplirait le champ après l'envoi
      // (résultat final tardif) : on la coupe net, sans résultat.
      if (_listening) {
        try { _rec && _rec.abort(); } catch (_) {}
        _listening = false;
        document.getElementById('sa-mic')?.classList.remove('is-listening');
      }

      input.value = ''; input.style.height = 'auto';
      input.dispatchEvent(new Event('input'));   // SA-13.1 — le bouton d'envoi redevient l'orbe (champ vide)
      addBubble('user', message);
      await sendMessage(message);
    }

    // Envoi proprement dit — séparé de submit() pour le bouton « Réessayer ».
    // SA-10.1 — STREAMING SSE : le texte s'écrit au fil de l'eau et la voix
    // Siwis lit dès la 1ʳᵉ phrase (1er son après ~1 phrase, plus toute la
    // réponse). Le `done` porte le texte canonique (anti-radotage). Repli JSON
    // si le flux n'est pas disponible — le visiteur n'est jamais sans réponse.
    async function sendMessage(message) {
      if (_busy) return;
      if (IS_PREVIEW) { previewReply(message); return; }   // démo : réponse simulée, pas d'appel worker
      _busy = true;
      document.getElementById('sa-send').disabled = true;
      showTyping();
      _showingGreeting = false;   // SA-11.2 — l'accueil n'est plus à l'écran : un switch de langue ne l'écrase plus
      // SA-9.2 — la réponse prend quelques secondes : le moteur vocal chauffe
      // pendant ce temps (téléchargement/amorçage hors du chemin).
      if (_voiceOn || _vmOn) _warmPiper();

      const ctrl = new AbortController();
      let timer = setTimeout(() => ctrl.abort(), 45000);
      const bump = () => { clearTimeout(timer); timer = setTimeout(() => ctrl.abort(), 45000); };   // garde d'INACTIVITÉ (un flux vivant n'est pas tué)
      let speech = null, acc = '', gotChunk = false;
      try {
        const res = await fetch(`${API_BASE}/api/smart-agent/p/${_slug}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: _sessionId, stream: true, lang: chatLang() }),
          signal: ctrl.signal,
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          hideTyping();
          addBubble('agent', data.error || t('err'), true);
          if (_vmOn) { vmSub(data.error || t('err')); vmSet('idle'); }
          return;
        }
        if (!res.body) {                       // navigateur sans ReadableStream → JSON
          hideTyping();
          if (!await sendMessageJSON(message)) addRetryBubble(message);
          return;
        }

        // Voix : file incrémentale (alimentée au fil des chunks) si activée
        // — ou si le mode conversation vocale est ouvert (SA-13.1).
        // SA-13.4 — le flux voix n'est créé qu'au PREMIER chunk : l'événement
        // `meta` (arrivé avant) porte la langue de la réponse → bonne voix
        // (Amy pour une réponse EN…), plus la voix de la langue d'interface.
        if (_voiceOn || _vmOn) {
          try { if (!_piperMod) _piperMod = await import('/app/lib/piper-tts.js'); } catch (_) {}
        }
        const _openSpeech = () => {
          if (!(_voiceOn || _vmOn) || !_piperMod) return null;
          try {
            if (_piperMod.isSupported && _piperMod.isSupported() && _piperMod.createSpeechStream) {
              return _piperMod.createSpeechStream({ voiceId: _piperMod.voiceForLang(_replyLang || _lang), onState: (st) => { setVoiceLoading(st === 'loading'); vmOnSpeech(st); } });
            }
          } catch (_) {}
          return null;
        };

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '', gapped = false, finalReply = '';
        for (;;) {
          const { done, value } = await reader.read();
          if (done) break;
          bump();
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const payload = line.slice(5).trim();
            if (!payload) continue;
            let ev; try { ev = JSON.parse(payload); } catch (_) { continue; }
            if (ev.type === 'meta' || ev.type === 'done') {
              if (ev.session_id) {
                _sessionId = ev.session_id;
                // La conversation survit à un rafraîchissement PENDANT la visite
                // (sessionStorage : rien ne persiste après fermeture — RGPD).
                try { sessionStorage.setItem('sa_sess_' + _slug, _sessionId); } catch (_) {}
              }
              if (SA_LANGS.includes(ev.lang)) _replyLang = ev.lang;   // SA-13.4 — langue de la réponse (voix de lecture)
            }
            if (ev.type === 'chunk') {
              if (!gotChunk) { gotChunk = true; streamStart(); speech = _openSpeech(); }
              acc += ev.text || '';
              streamUpdate(acc);
              if (_vmOn) vmSub(acc);            // sous-titre du mode vocal
              if (speech) speech.push(acc);
            } else if (ev.type === 'done') {
              gapped = !!ev.gapped;
              finalReply = (ev.reply != null) ? ev.reply : acc;
            } else if (ev.type === 'error') {
              throw Object.assign(new Error(ev.error || 'server'), { _server: true });
            }
          }
        }
        const reply = finalReply || acc;
        if (!gotChunk) hideTyping();
        streamFinal(reply, gapped);
        if (_vmOn) vmSub(reply);
        if (speech) speech.end(reply);
        else if (_voiceOn || _vmOn) speak(reply);   // voix ON mais flux voix indispo → lecture classique
      } catch (e) {
        if (speech) { try { speech.cancel(); } catch (_) {} }
        if (gotChunk) {
          addRetryBubble(message);                         // coupure après des chunks → réessai
        } else if (e && e._server) {
          hideTyping();
          addBubble('agent', t('err'), true);              // erreur serveur (message localisé, pas de boucle)
        } else {
          hideTyping();
          if (!await sendMessageJSON(message)) addRetryBubble(message);   // réseau/SSE KO → repli JSON
        }
        if (_vmOn && _vmState === 'thinking') { vmSub(t('err')); vmSet('idle'); }   // l'orbe ne reste jamais bloqué
      } finally {
        clearTimeout(timer);
        hideTyping();
        _busy = false;
        document.getElementById('sa-send').disabled = false;
        document.getElementById('sa-input')?.focus();
      }
    }

    // Repli non-streaming (worker sans SSE ou flux indisponible). Renvoie true
    // si une réponse a été affichée. Réutilise l'ancien chemin JSON.
    async function sendMessageJSON(message) {
      try {
        const res = await fetch(`${API_BASE}/api/smart-agent/p/${_slug}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: _sessionId, lang: chatLang() }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) { addBubble('agent', data.error || t('err'), true); return true; }
        if (data.session_id) {
          _sessionId = data.session_id;
          try { sessionStorage.setItem('sa_sess_' + _slug, _sessionId); } catch (_) {}
        }
        if (SA_LANGS.includes(data.lang)) _replyLang = data.lang;   // SA-13.4 — voix de lecture calée sur la réponse
        addBubble('agent', data.reply || '', !!data.gapped);
        if (_vmOn) vmSub(data.reply || '');
        speak(data.reply || '');
        return true;
      } catch (_) { return false; }
    }

    function prettyUrl(u) { return String(u || '').replace(/^https?:\/\//i, '').replace(/\/+$/, ''); }
    function fullUrl(u) { u = String(u || '').trim(); return /^https?:\/\//i.test(u) ? u : ('https://' + u); }

    // Personnalisation du fond (page v2) : couleur du bas du dégradé (le haut
    // reste sombre pour la lisibilité du header) + image en filigrane plein
    // cadre derrière le contenu (z-index -1 → au-dessus du dégradé, sous le
    // texte). Valeurs déjà sanitisées côté worker (couleur #rrggbb, URL =
    // origine + clé validée). Voile (text-shadow) ajouté pour garder le texte
    // blanc lisible quelle que soit la couleur choisie.
    function applyTheme(meta) {
      const th = (meta && meta.theme) ? meta.theme : {};
      // Accent des éléments interactifs (barre du haut + bouton d'envoi) : un
      // seul hex choisi par l'agent, décliné en JS (foncé pour le dégradé, clair
      // pour les icônes/bordure) — pas de dépendance color-mix. Défauts (indigo)
      // gardés si absent.
      const ui = (typeof th.ui_color === 'string' && /^#[0-9a-f]{6}$/i.test(th.ui_color)) ? th.ui_color : '';
      if (ui) {
        const rgb = [1, 3, 5].map(i => parseInt(ui.slice(i, i + 2), 16));
        const dark = rgb.map(c => Math.round(c * 0.76));                      // −24 % → fin de dégradé
        const lt   = rgb.map(c => Math.round(c + (255 - c) * 0.55));          // +55 % blanc → clair
        const rs = document.documentElement.style;
        rs.setProperty('--sav2-brand', ui);
        rs.setProperty('--sav2-brand-2', 'rgb(' + dark.join(',') + ')');
        rs.setProperty('--sav2-brand-lt', 'rgb(' + lt.join(',') + ')');
        rs.setProperty('--sav2-brand-tx', 'rgba(' + lt.join(',') + ',.88)');
        rs.setProperty('--sav2-brand-sh', 'rgba(' + rgb.join(',') + ',.5)');
      }
      const bottom = (typeof th.bg_bottom === 'string' && /^#[0-9a-f]{6}$/i.test(th.bg_bottom)) ? th.bg_bottom : '';
      if (bottom) {
        document.body.style.background =
          'radial-gradient(125% 78% at 50% 102%,' + bottom + '88 0%,transparent 58%),' +
          'linear-gradient(180deg,#05060f 0%,#0a0b1e 30%,' + bottom + ' 100%)';
        document.body.style.backgroundAttachment = 'fixed';
      }
      const wmUrl = (typeof th.watermark === 'string') ? th.watermark : '';
      let wm = document.getElementById('sav2-wm');
      if (wmUrl) {
        if (!wm) { wm = document.createElement('div'); wm.id = 'sav2-wm'; document.body.appendChild(wm); }
        const op = (typeof th.watermark_opacity === 'number' && th.watermark_opacity >= 0 && th.watermark_opacity <= 1) ? th.watermark_opacity : 0.15;
        wm.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;background-position:center;background-size:cover;background-repeat:no-repeat;opacity:' + op;
        wm.style.backgroundImage = 'url("' + wmUrl.replace(/["\\]/g, '') + '")';
      } else if (wm) { wm.remove(); }
      if (bottom || wmUrl) {
        const at = document.getElementById('sav2-answer-text');
        if (at) at.style.textShadow = '0 1px 16px rgba(0,0,0,.6)';
      }
    }

      refreshSendBtn();
      input.addEventListener('focus', () => setTimeout(scrollDown, 250));
      if (window.visualViewport) window.visualViewport.addEventListener('resize', scrollDown);

      const voiceBtn = document.getElementById('sa-voice');
      if (voiceBtn) voiceBtn.addEventListener('click', toggleVoice);
      const micBtn = document.getElementById('sa-mic');
      if (micBtn) micBtn.addEventListener('click', startDictation);
      // SA-13.3 — plus de sélecteur de langue au header (allégé : lien ·
      // téléphone · voix). L'écrit est AUTO (langue de la question, côté
      // worker) ; le choix explicite vit dans le mode vocal, seul endroit où
      // la langue doit être connue à l'avance (reconnaissance + voix).

      if (cards.length) {
        document.querySelectorAll('.sav2-card').forEach(btn => {
          btn.addEventListener('click', () => { const c = cards[+btn.dataset.i]; if (c && c.question) askCard(c.question); });
        });
        mountCardsNav();
      }
      const ansText = document.getElementById('sav2-answer-text');
      if (ansText) ansText.addEventListener('click', () => { const txt = ansText.dataset.text; if (txt) speakTap(txt); });

      if (_voiceOn && HAS_WASM) _warmPiper();
      // SA-13.0 — préchargement INTELLIGENT : voix pas encore demandée, mais
      // connexion correcte et pas d'économie de données → le modèle (~60 Mo,
      // en cache navigateur 1 an ensuite) se télécharge en fond quelques
      // secondes après l'accueil. Première écoute quasi instantanée pour la
      // majorité, zéro impact sur les connexions fragiles (2g/3g/saveData).
      else if (HAS_WASM) {
        const c = navigator.connection || {};
        if (!c.saveData && (!c.effectiveType || c.effectiveType === '4g')) {
          const idle = window.requestIdleCallback || ((fn) => setTimeout(fn, 400));
          setTimeout(() => idle(() => { if (!_piperMod || !_piperMod.unsupported) _warmPiper(true); }), 2500);
        }
      }
      _showingGreeting = true;
      setAnswerV2(greetingText());   // jamais d'écran vide ; accueil natif ou générique localisé
      input.focus();
    }

    /* Carrousel de cartes — rendre le défilement possible SANS geste tactile ni
       trackpad horizontal. Trois affordances, toutes optionnelles :
         • poignée de points sous les cartes (indique + permet de sauter d'un écran),
         • glisser à la souris sur la bande (le clic reste intact tant qu'on ne bouge pas),
         • molette verticale mappée sur l'axe horizontal quand la souris est dessus.
       Les points disparaissent d'eux-mêmes si tout tient dans la largeur. */
    function mountCardsNav() {
      const el   = document.getElementById('sav2-cards');
      const dots = document.getElementById('sav2-dots');
      if (!el || !dots) return;

      const pageW  = () => Math.max(1, el.clientWidth - 32);   // un « écran » = la largeur visible, moins un chevauchement
      const pages  = () => Math.max(1, Math.ceil((el.scrollWidth - el.clientWidth) / pageW()) + 1);
      let n = 0;

      function build() {
        const p = el.scrollWidth - el.clientWidth > 4 ? pages() : 1;
        el.classList.toggle('is-draggable', p > 1);
        dots.classList.toggle('is-on', p > 1);
        if (p === n) { sync(); return; }
        n = p;
        dots.innerHTML = p > 1
          ? Array.from({ length: p }, (_, i) =>
              `<button class="sav2-dot" type="button" data-p="${i}" aria-label="${escape(t('suggested'))} ${i + 1}/${p}"></button>`).join('')
          : '';
        dots.querySelectorAll('.sav2-dot').forEach(b => {
          b.addEventListener('click', () => el.scrollTo({ left: (+b.dataset.p) * pageW(), behavior: 'smooth' }));
        });
        sync();
      }
      function sync() {
        if (n < 2) return;
        const cur = Math.min(n - 1, Math.round(el.scrollLeft / pageW()));
        dots.querySelectorAll('.sav2-dot').forEach((b, i) => b.classList.toggle('is-on', i === cur));
      }

      el.addEventListener('scroll', () => { if (!_rafDots) _rafDots = requestAnimationFrame(() => { _rafDots = 0; sync(); }); }, { passive: true });

      // Molette : sur une souris classique il n'y a QUE deltaY → on le convertit.
      el.addEventListener('wheel', (e) => {
        if (el.scrollWidth - el.clientWidth < 4) return;
        const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
        if (!d) return;
        const max = el.scrollWidth - el.clientWidth;
        if ((d < 0 && el.scrollLeft <= 0) || (d > 0 && el.scrollLeft >= max - 1)) return;  // en butée : on rend la main à la page
        e.preventDefault();
        el.scrollLeft += d;
      }, { passive: false });

      // Glisser à la souris (souris sans axe horizontal). Le pointeur tactile
      // garde le défilement natif : on n'intercepte que la souris.
      let dragging = false, moved = false, x0 = 0, l0 = 0;
      el.addEventListener('pointerdown', (e) => {
        if (e.pointerType !== 'mouse' || e.button !== 0) return;
        if (el.scrollWidth - el.clientWidth < 4) return;
        dragging = true; moved = false; x0 = e.clientX; l0 = el.scrollLeft;
      });
      el.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - x0;
        if (!moved && Math.abs(dx) < 5) return;                 // sous 5 px : c'est un clic, pas un glissé
        if (!moved) { moved = true; el.classList.add('is-dragging'); el.setPointerCapture(e.pointerId); }
        el.scrollLeft = l0 - dx;
      });
      const endDrag = () => { if (!dragging) return; dragging = false; el.classList.remove('is-dragging'); };
      el.addEventListener('pointerup', endDrag);
      el.addEventListener('pointercancel', endDrag);
      // Un glissé ne doit pas déclencher la question de la carte relâchée
      // (le drapeau retombe ici, ou au prochain appui : jamais sur un minuteur).
      el.addEventListener('click', (e) => { if (moved) { moved = false; e.preventDefault(); e.stopPropagation(); } }, true);

      build();
      if (window.ResizeObserver) new ResizeObserver(build).observe(el);
      else window.addEventListener('resize', build);
      // Les images arrivent en `loading="lazy"` : la largeur totale bouge encore après le rendu.
      el.querySelectorAll('img').forEach(img => img.addEventListener('load', build, { once: true }));
    }
    let _rafDots = 0;

    // Réponse unique : on REMPLACE le contenu, on n'empile jamais.
    function setAnswerV2(text, isFallback) {
      const a = document.getElementById('sav2-answer');
      const t = document.getElementById('sav2-answer-text');
      if (!t) return;
      if (a) a.classList.remove('is-thinking');
      t.classList.toggle('is-fallback', !!isFallback);
      t.innerHTML = mdToHtml(text);                             // **gras**, listes… rendus (plus de Markdown brut lu/affiché)
      t.dataset.text = text;                                    // texte BRUT conservé pour la lecture au toucher
      t.style.animation = 'none'; void t.offsetWidth; t.style.animation = '';
      if (a) a.scrollTop = 0;
    }
    // « Réflexion » : la réponse précédente reste estompée + points (overlay).
    function showThinkingV2() { document.getElementById('sav2-answer')?.classList.add('is-thinking'); }
    function hideThinkingV2() { document.getElementById('sav2-answer')?.classList.remove('is-thinking'); }
    function setAnswerRetryV2(message) {
      const a = document.getElementById('sav2-answer');
      const el = document.getElementById('sav2-answer-text');
      if (!el) return;
      if (a) a.classList.remove('is-thinking');
      el.classList.add('is-fallback');
      el.textContent = t('offline');
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'sav2-retry'; btn.textContent = t('retry');
      btn.addEventListener('click', () => sendMessage(message));
      el.appendChild(btn);
    }
    // Carte cliquée : on pose sa question CACHÉE (jamais affichée) dans le flux normal.
    function askCard(q) { if (_busy || !q) return; sendMessage(q); }

    /* Démo (?preview=1) — design v2 sans worker : meta + réponses simulées. */
    function demoImg(col) { return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="90"><rect width="120" height="90" fill="' + col + '"/></svg>'); }
    const DEMO_META = {
      lang: 'fr',
      role: 'Conseiller', opening: 'Bienvenue !\nJe suis votre conseiller,\ncomment puis-je vous aider ?',
      opening_i18n: { en: 'Welcome!\nI am your guide,\nhow may I help you today?', es: '¡Bienvenido!\nSoy su guía,\n¿en qué puedo ayudarle?', de: 'Willkommen!\nIch bin Ihr Berater,\nwie kann ich helfen?' },
      url: 'www.musee-copte.eg', phone: '+20 2 2362 8766',
      cards: [
        { image: demoImg('#a87b3a'), question: 'Parlez-moi de cet objet',          answer: 'Cet encensoir en argent ciselé date du XVIIIᵉ siècle ; la fumée de l\'encens y symbolise les prières qui montent vers le ciel.', title: 'L\'encensoir', title_i18n: { en: 'The censer', es: 'El incensario', de: 'Das Räuchergefäß' } },
        { image: demoImg('#5d6b86'), question: 'Qu\'est-ce que cette fontaine ?',    answer: 'Une fontaine d\'ablutions du XIᵉ siècle, en marbre incrusté, qui ornait la cour d\'une maison copte.', title: 'La fontaine', title_i18n: { en: 'The fountain', es: 'La fuente', de: 'Der Brunnen' } },
        { image: demoImg('#9a7a3a'), question: 'Racontez-moi cette icône',          answer: 'Une icône de la Fuite en Égypte : la Sainte Famille accueillie sur la terre d\'Égypte, épisode cher aux coptes.', title: 'L\'icône', title_i18n: { en: 'The icon', es: 'El icono', de: 'Die Ikone' } }
      ]
    };
    const DEMO_DEFAULT = 'Le Musée Copte est ouvert du lundi au samedi de 9h00 à 12h00 et de 14h00 à 18h00. Il est fermé le dimanche. Avez-vous besoin d\'autres informations pour préparer votre visite ?';
    function previewReply(message) {
      _busy = true;
      const send = document.getElementById('sa-send'); if (send) send.disabled = true;
      showTyping();
      if (_voiceOn || _vmOn) _warmPiper();
      const card = (DEMO_META.cards || []).find(c => c.question === message);
      const reply = card ? card.answer : DEMO_DEFAULT;
      setTimeout(() => {
        hideTyping(); addBubble('agent', reply);
        if (_vmOn) vmSub(reply);
        speak(reply);
        _busy = false; if (send) send.disabled = false;
        document.getElementById('sa-input')?.focus();
      }, 950);
    }

    async function load() {
      _slug = getSlug();
      if (IS_PREVIEW) { renderChatV2(DEMO_META); return; }   // démo : design v2 sans worker/slug
      if (!_slug) { renderError('Lien invalide', 'Ce lien ne correspond à aucun assistant.'); return; }
      try { _sessionId = sessionStorage.getItem('sa_sess_' + _slug) || null; } catch (_) {}
      try {
        const res = await fetch(`${API_BASE}/api/smart-agent/p/${_slug}`);
        if (!res.ok) { renderError('Assistant introuvable', 'Ce lien n\'est plus actif ou n\'existe pas.'); return; }
        const data = await res.json();
        (NEW_UI ? renderChatV2 : renderChat)(data.agent || {});
        if (IS_EMBED) {
          // Pont avec la landing : elle envoie { type:'sa-ask', text } ;
          // on rend la bulle + la réponse comme un submit() normal. Si un
          // envoi arrive pendant qu'on répond déjà, on rend le texte au
          // parent (il le remet dans sa barre) plutôt que de l'avaler.
          window.addEventListener('message', (e) => {
            if (e.origin !== location.origin) return;
            const d = e.data || {};
            if (d.type !== 'sa-ask' || typeof d.text !== 'string') return;
            const text = d.text.trim().slice(0, 500);
            if (!text) return;
            if (_busy) {
              try { parent.postMessage({ type: 'sa-rejected', text }, location.origin); } catch (_) {}
              return;
            }
            addBubble('user', text);
            sendMessage(text);
          });
          try { parent.postMessage({ type: 'sa-ready' }, location.origin); } catch (_) {}
        }
      } catch (_) {
        renderError('Connexion impossible', 'Impossible de charger l\'assistant. Réessayez plus tard.');
      }
    }

    load();
  </script>
</body>
