<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#05060f">
  <title>Assistant</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       SMART AGENT · Page publique de dialogue (SA-5.1)
       Chat anonyme mobile-first, charte Apple premium navy/gold.
       Le visiteur n'a pas de compte : il interroge un agent publié,
       qui répond UNIQUEMENT depuis son coffre de savoir (ancré).
       ═══════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sa-brand:   #0a2741;
      --sa-brand-2: #0d3254;
      --sa-accent:  #c9b48a;
      --sa-accent-2:#a8895a;
      --sa-body:    #1a2a3a;
      --sa-muted:   #6b7a8d;
      --sa-light:   #f4f6f9;
      --sa-border:  #dde3ec;
      --sa-bg:      #eef1f5;
      --sa-danger:  #e05c5c;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--sa-bg);
      color: var(--sa-body);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── États plein écran (chargement / erreur) ───────────── */
    .sa-full {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 40px 28px;
    }
    .sa-spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--sa-border);
      border-top-color: var(--sa-accent);
      border-radius: 50%;
      animation: sa-spin .9s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes sa-spin { to { transform: rotate(360deg); } }
    .sa-full h1 {
      font-size: 22px; font-weight: 900; letter-spacing: -.03em;
      color: var(--sa-brand); margin-bottom: 8px;
    }
    .sa-full p { font-size: 14px; color: var(--sa-muted); line-height: 1.6; max-width: 360px; }

    /* ── Header ────────────────────────────────────────────── */
    .sa-header {
      position: sticky; top: 0; z-index: 30;
      background: var(--sa-brand);
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 13px;
      display: flex; align-items: center; gap: 13px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .16);
    }
    .sa-avatar {
      flex-shrink: 0;
      width: 40px; height: 40px; border-radius: 11px;
      background: linear-gradient(135deg, var(--sa-accent-2), var(--sa-accent));
      color: var(--sa-brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900;
    }
    .sa-head-txt { flex: 1; min-width: 0; }
    .sa-head-tag {
      font-size: 10px; font-weight: 800; letter-spacing: .14em;
      text-transform: uppercase; color: var(--sa-accent); opacity: .9;
    }
    .sa-head-name {
      font-size: 16px; font-weight: 900; color: #fff;
      letter-spacing: -.02em; line-height: 1.25;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Fil de discussion ─────────────────────────────────── */
    .sa-thread {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px 8px;
    }
    .sa-thread-inner { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

    .sa-msg { display: flex; max-width: 86%; }
    .sa-msg-bubble {
      padding: 12px 15px;
      border-radius: 16px;
      font-size: 15px; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    .sa-msg.agent { align-self: flex-start; }
    .sa-msg.agent .sa-msg-bubble {
      background: #fff;
      color: var(--sa-body);
      border-bottom-left-radius: 5px;
      box-shadow: 0 1px 7px rgba(10, 39, 65, .07);
    }
    .sa-msg.user { align-self: flex-end; }
    .sa-msg.user .sa-msg-bubble {
      background: var(--sa-brand);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .sa-msg.agent.is-fallback .sa-msg-bubble {
      background: var(--sa-light);
      color: var(--sa-muted);
      border: 1px dashed var(--sa-border);
      font-style: italic;
    }
    /* SA-8.4 — les bulles de l'assistant se lisent au toucher */
    .sa-msg.agent .sa-msg-bubble { cursor: pointer; }
    .sa-retry {
      margin-left: 6px;
      padding: 4px 12px;
      border: 1px solid var(--sa-border);
      border-radius: 999px;
      background: #fff;
      color: var(--sa-brand);
      font: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer;
    }
    /* SA-8.4 — préparation de la voix (téléchargement du modèle, une fois) */
    .sa-head-voice.is-loading { animation: sa-voice-pulse 1s ease-in-out infinite; }
    @keyframes sa-voice-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }

    /* ── Indicateur de frappe ──────────────────────────────── */
    .sa-typing { display: flex; gap: 4px; padding: 14px 16px; }
    .sa-typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--sa-muted); opacity: .5;
      animation: sa-bounce 1.2s infinite ease-in-out;
    }
    .sa-typing span:nth-child(2) { animation-delay: .15s; }
    .sa-typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes sa-bounce { 0%, 60%, 100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-5px); opacity: .9; } }

    /* ── Barre de saisie ───────────────────────────────────── */
    .sa-composer {
      position: sticky; bottom: 0;
      background: rgba(238, 241, 245, .92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--sa-border);
      padding: 10px 14px calc(env(safe-area-inset-bottom, 0px) + 10px);
    }
    .sa-composer-inner {
      max-width: 720px; margin: 0 auto;
      display: flex; align-items: flex-end; gap: 9px;
    }
    .sa-input {
      flex: 1;
      border: 1.5px solid var(--sa-border);
      background: #fff;
      border-radius: 22px;
      padding: 11px 16px;
      font: inherit; font-size: 16px;   /* < 16px = zoom automatique iOS au focus */
      color: var(--sa-body);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color .15s, box-shadow .15s;
    }
    .sa-input:focus { border-color: var(--sa-accent); box-shadow: 0 0 0 3px rgba(201, 180, 138, .18); }
    .sa-send {
      flex-shrink: 0;
      width: 44px; height: 44px; border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--sa-accent-2), var(--sa-accent));
      color: var(--sa-brand);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(201, 180, 138, .3);
      transition: transform .15s, opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sa-send:active { transform: scale(.92); }
    .sa-send:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
    .sa-send svg { width: 20px; height: 20px; }

    .sa-foot {
      text-align: center;
      font-size: 11px; color: var(--sa-muted); opacity: .7;
      padding: 8px 16px 0;
    }

    /* ── Vocal : interrupteur lecture (header) + micro dictée (barre) ── */
    .sa-head-voice {
      flex-shrink: 0; margin-left: auto;
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, .22);
      background: rgba(255, 255, 255, .08);
      color: rgba(255, 255, 255, .85);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sa-head-voice:hover { background: rgba(255, 255, 255, .16); color: #fff; }
    .sa-head-voice.is-on {
      color: var(--sa-accent);
      border-color: var(--sa-accent);
      background: rgba(201, 180, 138, .16);
    }
    .sa-head-voice svg { width: 19px; height: 19px; }
    .sa-head-voice-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .sa-head-voice-pick {
      max-width: 150px; height: 34px;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, .22);
      background: rgba(255, 255, 255, .10);
      color: #fff;
      font-size: 12px; padding: 0 8px;
      cursor: pointer;
    }
    .sa-head-voice-pick option { color: #111; }

    .sa-mic {
      flex-shrink: 0;
      width: 44px; height: 44px; border-radius: 50%;
      border: 1.5px solid var(--sa-border);
      background: #fff;
      color: var(--sa-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sa-mic:hover { color: var(--sa-brand); border-color: var(--sa-accent); }
    .sa-mic svg { width: 20px; height: 20px; }
    .sa-mic.is-listening {
      color: #fff;
      background: #e5484d; border-color: #e5484d;
      animation: sa-mic-pulse 1.2s ease-in-out infinite;
    }
    @keyframes sa-mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229, 72, 77, .4); }
      50%      { box-shadow: 0 0 0 7px rgba(229, 72, 77, 0); }
    }

    /* ── Mode embed (?embed=1) — la landing embarque la page dans un
       téléphone et porte SA PROPRE barre de saisie (postMessage) : on
       n'affiche que la conversation, header épuré. Opt-in par query,
       zéro impact sur la page publique normale. ── */
    .sa-embed .sa-composer { display: none; }
    .sa-embed .sa-head-tag { display: none; }

    /* ═══════════════════════════════════════════════════════════════
       MODE PUBLIC v2 (refonte 2026-06) — thème sombre, réponse unique.
       Actif via la classe `sa-v2` (ajoutée tôt, hors embed). Le mode
       embed (landing) garde l'ancien rendu clair ci-dessus, intact.
       Classes préfixées `sav2-` → zéro collision avec l'ancien.
       ═══════════════════════════════════════════════════════════════ */
    .sa-v2 body {
      color: #fff;
      background:
        radial-gradient(125% 78% at 50% 102%, rgba(96,74,206,.50) 0%, rgba(40,28,86,0) 58%),
        linear-gradient(180deg,#05060f 0%,#0a0b1e 27%,#15123a 54%,#221a52 80%,#2c2160 100%);
      background-attachment: fixed;
    }
    .sa-v2 .sa-full h1 { color: #fff; }
    .sa-v2 .sa-full p  { color: rgba(255,255,255,.72); }

    /* Header : lien URL (gauche) · téléphone · onde voix (droite) */
    .sav2-top { display: flex; align-items: center; gap: 11px; padding: calc(env(safe-area-inset-top,0px) + 16px) 16px 6px; }
    .sav2-url { flex: 1; min-width: 0; height: 46px; display: flex; align-items: center; gap: 11px; padding: 0 16px;
      border: 2px solid #c2c0ff; border-radius: 24px; background: rgba(255,255,255,.045); text-decoration: none; }
    .sav2-url-globe { flex-shrink: 0; color: #c2c0ff; display: flex; align-items: center; justify-content: center; }
    .sav2-url-globe svg { width: 22px; height: 22px; }
    .sav2-url-txt { font-size: 14px; letter-spacing: .01em; color: rgba(196,194,255,.82); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sav2-top-spacer { flex: 1; }
    .sav2-top-btn { flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%; background: transparent; border: none; cursor: pointer;
      color: #c2c0ff; display: flex; align-items: center; justify-content: center; text-decoration: none;
      -webkit-tap-highlight-color: transparent; transition: transform .12s; }
    .sav2-top-btn:active { transform: scale(.92); }
    .sav2-top-btn svg { width: 46px; height: 46px; display: block; }
    .sav2-voice.is-on { color: #fff; }
    .sav2-voice.is-on svg { filter: drop-shadow(0 0 6px rgba(160,160,255,.7)); }
    .sav2-voice.is-loading { animation: sav2-pulse 1s ease-in-out infinite; }
    @keyframes sav2-pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    /* SA-11.2 — sélecteur de langue (pilule compacte, accordé au header) */
    /* SA-11.2/11.3 — sélecteur de langue : bouton ROND BORDÉ (cohérent avec les
       autres CTA du header) + menu déroulant CUSTOM (sombre, blur, aligné). */
    .sav2-langwrap { position: relative; flex-shrink: 0; }
    .sav2-lang { border: 1.5px solid rgba(164,162,255,.42); color: #c2c0ff;
      font: 800 13px/1 -apple-system, system-ui, sans-serif; letter-spacing: .03em; }
    .sav2-lang.is-open { color: #fff; border-color: rgba(164,162,255,.85); }
    .sav2-langmenu { position: absolute; top: calc(100% + 8px); right: 0; z-index: 60;
      min-width: 170px; padding: 6px; display: none; flex-direction: column; gap: 2px;
      background: rgba(16,16,32,.94); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
      border: 1px solid rgba(164,162,255,.22); border-radius: 16px; box-shadow: 0 16px 44px rgba(0,0,0,.55); }
    .sav2-langmenu.is-open { display: flex; animation: sav2-langpop .14s ease-out; }
    @keyframes sav2-langpop { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .sav2-langopt { appearance: none; border: none; cursor: pointer; text-align: left; white-space: nowrap;
      background: transparent; color: #d7d6ff; border-radius: 11px; padding: 11px 14px;
      font: 600 15px/1 -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: space-between; gap: 18px;
      -webkit-tap-highlight-color: transparent; transition: background .12s; }
    .sav2-langopt:hover { background: rgba(164,162,255,.12); }
    .sav2-langopt.is-active { background: rgba(164,162,255,.18); color: #fff; }
    .sav2-langtick { opacity: 0; color: #a8a6ff; font-weight: 700; }
    .sav2-langopt.is-active .sav2-langtick { opacity: 1; }

    /* Carrousel de cartes (slide latéral, nombre illimité) */
    .sav2-cards { display: flex; gap: 10px; padding: 12px 16px 6px; overflow-x: auto; scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .sav2-cards::-webkit-scrollbar { display: none; }
    .sav2-card { position: relative; flex: 0 0 31%; aspect-ratio: 4/3; border: 1px solid rgba(164,162,255,.42); border-radius: 16px; overflow: hidden;
      cursor: pointer; scroll-snap-align: start; background: rgba(255,255,255,.04); padding: 0;
      -webkit-tap-highlight-color: transparent; transition: transform .14s; }
    .sav2-card:active { transform: scale(.96); }
    .sav2-card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sav2-card-pill { position: absolute; left: 6px; right: 6px; bottom: 6px; padding: 5px 9px; border-radius: 11px;
      background: rgba(8,8,22,.66); color: #fff; font-size: 13px; font-weight: 500; line-height: 1.25; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }

    /* Zone de réponse : UNE seule réponse, centrée (pas de fil) */
    .sav2-answer { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }
    .sav2-answer::-webkit-scrollbar { width: 3px; }
    .sav2-answer::-webkit-scrollbar-thumb { background: rgba(180,178,255,.45); border-radius: 3px; }
    .sav2-answer-scroll { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 26px 24px; }
    .sav2-answer-text { text-align: center; font-weight: 800; font-size: clamp(20px,5.6vw,24px); line-height: 1.36;
      letter-spacing: -.01em; color: #fff; white-space: pre-wrap; cursor: pointer; animation: sav2-rise .45s ease both; }
    @keyframes sav2-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .sav2-answer-text.is-fallback { font-weight: 600; color: rgba(228,227,255,.92); }
    .sav2-answer.is-thinking .sav2-answer-text { opacity: .3; filter: blur(.3px); }
    /* Markdown rendu dans la réponse v2 (gras + listes, lisibles dans le bloc centré) */
    .sav2-answer-text p { margin: 0 0 .55em; }
    .sav2-answer-text p:last-child { margin-bottom: 0; }
    .sav2-answer-text strong { font-weight: 900; }
    .sav2-answer-text em { font-style: italic; }
    .sav2-answer-text ol,
    .sav2-answer-text ul { display: inline-block; text-align: left; margin: .5em 0 0; padding-left: 1.25em;
      font-weight: 600; font-size: .72em; line-height: 1.5; letter-spacing: normal; }
    .sav2-answer-text li { margin: .3em 0; }
    .sav2-answer-text code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .82em;
      background: rgba(255,255,255,.12); padding: .08em .34em; border-radius: 5px; font-weight: 600; }
    .sav2-answer-text a { color: #c7c5ff; text-decoration: underline; }
    /* Markdown rendu dans la bulle embed (legacy) */
    .sa-msg-bubble p { margin: 0 0 .5em; }
    .sa-msg-bubble p:last-child { margin-bottom: 0; }
    .sa-msg-bubble ol,
    .sa-msg-bubble ul { margin: .4em 0; padding-left: 1.4em; }
    .sa-msg-bubble li { margin: .2em 0; }
    .sa-msg-bubble strong { font-weight: 700; }
    .sa-msg-bubble em { font-style: italic; }
    .sa-msg-bubble code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em;
      background: rgba(127, 127, 127, .16); padding: .08em .34em; border-radius: 5px; }
    .sa-msg-bubble a { color: inherit; text-decoration: underline; }
    .sav2-thinking { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
      display: none; justify-content: center; gap: 7px; }
    .sav2-answer.is-thinking .sav2-thinking { display: flex; }
    .sav2-thinking span { width: 8px; height: 8px; border-radius: 50%; background: rgba(200,198,255,.85); animation: sav2-blink 1.25s ease-in-out infinite; }
    .sav2-thinking span:nth-child(2) { animation-delay: .18s; }
    .sav2-thinking span:nth-child(3) { animation-delay: .36s; }
    @keyframes sav2-blink { 0%,60%,100% { opacity: .28; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }

    /* Composer : champ blanc + micro + envoyer */
    .sav2-composer { padding: 6px 16px 4px; }
    .sav2-field { display: flex; align-items: flex-end; gap: 8px; background: #fff; border-radius: 22px;
      padding: 11px 11px 11px 18px; box-shadow: 0 10px 30px rgba(0,0,0,.32); }
    .sav2-input { flex: 1; border: none; outline: none; resize: none; background: transparent; font: inherit; font-size: 16px;
      line-height: 1.4; color: #11122a; max-height: 104px; padding: 6px 0; }
    .sav2-input::placeholder { color: #9498a8; }
    .sav2-mic { flex-shrink: 0; width: 40px; height: 40px; border: none; background: transparent; cursor: pointer; color: #3c3c4c;
      display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .sav2-mic svg { width: 23px; height: 23px; }
    .sav2-mic.is-listening { color: #e0484f; }
    .sav2-send { flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
      background: linear-gradient(135deg,#6f6cf0,#5046d6); color: #fff; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(80,70,214,.5); -webkit-tap-highlight-color: transparent; transition: transform .12s; }
    .sav2-send:active { transform: scale(.92); }
    .sav2-send:disabled { opacity: .5; }
    .sav2-send svg { width: 22px; height: 22px; }
    .sav2-retry { margin-left: 8px; padding: 4px 12px; border: 1px solid rgba(196,194,255,.5); border-radius: 999px;
      background: transparent; color: #fff; font: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
    .sav2-rgpd { text-align: center; font-size: 11px; line-height: 1.45; color: rgba(196,194,255,.78); opacity: .82;
      padding: 8px 20px calc(env(safe-area-inset-bottom,0px) + 14px); }
  </style>
  <!-- Très tôt : thème sombre par défaut (public v2), ancien rendu clair pour l'embed. Évite le flash de fond. -->
  <script>(function(){ var e = new URLSearchParams(location.search).has('embed'); document.documentElement.classList.add(e ? 'sa-embed' : 'sa-v2'); })();</script>
</head>
<body>
  <div id="sa-root">
    <div class="sa-full">
      <div class="sa-spinner" aria-hidden="true"></div>
      <p>Chargement…</p>
    </div>
  </div>

  <script type="module">
    /* ═══════════════════════════════════════════════════════════════
       Smart Agent Public · dialogue anonyme (SA-5.1)
       Aucune authentification : on lit le slug du lien, on charge
       l'accueil (GET /p/:slug), puis chaque question passe par
       POST /p/:slug/chat (le worker débite le propriétaire, applique
       le rate-limit et n'expose jamais le coffre).
       ═══════════════════════════════════════════════════════════════ */
    const API_BASE = 'https://keystone-os-api.keystone-os.workers.dev';

    let _slug = null;
    let _sessionId = null;
    let _busy = false;

    // Mode embed : la landing (même origine) embarque la page dans son
    // téléphone vitrine et envoie les questions par postMessage — la
    // saisie vit chez elle, la conversation s'affiche ici.
    const IS_EMBED = new URLSearchParams(location.search).has('embed');
    if (IS_EMBED) document.documentElement.classList.add('sa-embed');

    // Refonte 2026-06 : le public normal passe sur le design v2 (sombre,
    // réponse unique). L'embed (landing) garde l'ancien rendu fil → vitrine
    // intacte. NEW_UI ne change QUE le rendu ; la logique réseau / session /
    // voix reste commune et inchangée.
    const NEW_UI = !IS_EMBED;

    function setVoiceLoading(on) {

    // liste à intervalles courts au démarrage, et SURTOUT à chaque lecture

    function frVoices() { return _voices.filter(v => /^fr\b/i.test((v.lang || '').replace('_', '-'))); }
    function voiceScore(v) {

      if (/(siri|premium|enhanced|neural|natural|amélie|amelie|aurélie|aurelie|audrey|thomas|chantal|marie)/.test(n)) s += 60;

    function bestFrVoice() { const fr = frVoices(); return fr.length ? fr.slice().sort((a, b) => voiceScore(b) - voiceScore(a))[0] : null; }
    function currentVoiceName() { try { return localStorage.getItem('sa_voice_name') || ''; } catch (_) { return ''; } }
    function chosenVoice() {

      // FIGE le choix automatique : sans ça, la liste iOS s'étoffe entre deux
      // lectures et la « meilleure voix » change (une réponse Amélie, la

    const SVG_MIC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>';

    function escape(s) {

    // Mini-rendu Markdown SÛR : on échappe d'abord (anti-XSS) puis on met en
    // forme la chaîne échappée — **gras**, *italique*, `code`, liens http(s),
    // listes (1. / -) et sauts de ligne. Seules NOS balises apparaissent.
    function mdInline(s) {

        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')

    function mdToHtml(text) {
      const lines = escape(String(text == null ? '' : text)).split(/\r?\n/);

      const closeList = () => { if (list) { out.push('</' + list + '>'); list = null; } };
      const flushPara = () => { if (para.length) { out.push('<p>' + para.join('<br>') + '</p>'); para = []; } };
      for (const line of lines) {
        let m;
        if ((m = line.match(/^\s*\d+[.)]\s+(.*)$/))) {

      });

      });

      // on garde le fil collé en bas — sinon le composer disparaît derrière.

    function addBubble(role, text, isFallback) {
      if (NEW_UI) {                         // v2 : zone unique ; la question ne s'affiche jamais
        if (role === 'user') return null;
        setAnswerV2(text, isFallback);
        return null;
      }
      const inner = document.getElementById('sa-thread-inner');
      const div = document.createElement('div');
      div.className = `sa-msg ${role}${isFallback ? ' is-fallback' : ''}`;
      div.innerHTML = `<div class="sa-msg-bubble">${mdToHtml(text)}</div>`;
      // SA-8.4 — toute bulle de l'assistant se lit AU TOUCHER (accueil compris).
      if (role === 'agent') {
        const b = div.querySelector('.sa-msg-bubble');
        b.title = t('listen');
        b.addEventListener('click', () => speakTap(text));
      }
      inner.appendChild(div);
      scrollDown(role === 'user');   // son propre message : toujours visible
      return div;
    }

    // Erreur réseau : bulle avec bouton « Réessayer » (renvoie le même message).
    function addRetryBubble(message) {
      if (NEW_UI) { setAnswerRetryV2(message); return; }
      const inner = document.getElementById('sa-thread-inner');
      const div = document.createElement('div');
      div.className = 'sa-msg agent is-fallback';
      const b = document.createElement('div');
      b.className = 'sa-msg-bubble';
      b.textContent = 'Connexion impossible. ';
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'sa-retry'; btn.textContent = 'Réessayer';
      btn.addEventListener('click', () => { div.remove(); sendMessage(message); });
      b.appendChild(btn); div.appendChild(b); inner.appendChild(div);
      scrollDown(true);
    }

    function showTyping() {
      if (NEW_UI) { showThinkingV2(); return; }
      const inner = document.getElementById('sa-thread-inner');
      const div = document.createElement('div');
      div.className = 'sa-msg agent'; div.id = 'sa-typing-row';
      div.innerHTML = `<div class="sa-msg-bubble"><div class="sa-typing"><span></span><span></span><span></span></div></div>`;
      inner.appendChild(div);
      scrollDown();
    }
    function hideTyping() {
      if (NEW_UI) { hideThinkingV2(); return; }
      document.getElementById('sa-typing-row')?.remove();
    }

    function scrollDown(force) {
      if (NEW_UI) { const a = document.getElementById('sav2-answer'); if (a) a.scrollTop = 0; return; }
      const t = document.getElementById('sa-thread');
      if (!t) return;
      // SA-8.4 — ne recolle en bas que si le visiteur y était déjà (à 140 px
      // près) : remonté relire un message, il n'est plus interrompu.
      if (!force && (t.scrollHeight - t.scrollTop - t.clientHeight) >= 140) return;
      requestAnimationFrame(() => { t.scrollTop = t.scrollHeight; });
    }

    /* ── SA-10.1 — affichage progressif pendant le streaming SSE ──
       streamStart/Update/Final s'abstraient de l'UI (v2 réponse unique OU
       thread legacy). Le texte canonique du `done` remplace l'aperçu. */
    let _streamBubble = null;   // legacy : bulle agent en cours de remplissage
    function setAnswerStreamingV2(text) {
      const a = document.getElementById('sav2-answer');
      const t = document.getElementById('sav2-answer-text');
      if (!t) return;
      if (a) a.classList.remove('is-thinking');
      t.classList.remove('is-fallback');
      t.innerHTML = mdToHtml(text);     // rendu léger au fil de l'eau (pas d'animation = pas de flicker)
      t.dataset.text = text;
      if (a) a.scrollTop = 0;
    }
    function streamStart() {
      hideTyping();
      if (NEW_UI) { setAnswerStreamingV2(''); return; }
      const inner = document.getElementById('sa-thread-inner');
      _streamBubble = document.createElement('div');
      _streamBubble.className = 'sa-msg agent';
      _streamBubble.innerHTML = '<div class="sa-msg-bubble"></div>';
      inner.appendChild(_streamBubble);
      scrollDown();
    }
    function streamUpdate(acc) {
      if (NEW_UI) { setAnswerStreamingV2(acc); return; }
      if (_streamBubble) { _streamBubble.querySelector('.sa-msg-bubble').innerHTML = mdToHtml(acc); scrollDown(); }
    }
    function streamFinal(reply, gapped) {
      if (NEW_UI) { setAnswerV2(reply, gapped); _streamBubble = null; return; }
      if (_streamBubble) {
        const b = _streamBubble.querySelector('.sa-msg-bubble');
        b.innerHTML = mdToHtml(reply);
        _streamBubble.classList.toggle('is-fallback', !!gapped);
        b.title = t('listen');
        b.addEventListener('click', () => speakTap(reply));
        _streamBubble = null;
      } else {
        addBubble('agent', reply, gapped);
      }
    }

    async function submit() {
      if (_busy) return;
      const input = document.getElementById('sa-input');
      const message = (input.value || '').trim();
      if (!message) return;

      // Une dictée encore active re-remplirait le champ après l'envoi
      // (résultat final tardif) : on la coupe net, sans résultat.
      if (_listening) {
        try { _rec && _rec.abort(); } catch (_) {}
        _listening = false;
        document.getElementById('sa-mic')?.classList.remove('is-listening');
      }

      input.value = ''; input.style.height = 'auto';
      addBubble('user', message);
      await sendMessage(message);
    }

    // Envoi proprement dit — séparé de submit() pour le bouton « Réessayer ».
    // SA-10.1 — STREAMING SSE : le texte s'écrit au fil de l'eau et la voix
    // Siwis lit dès la 1ʳᵉ phrase (1er son après ~1 phrase, plus toute la
    // réponse). Le `done` porte le texte canonique (anti-radotage). Repli JSON
    // si le flux n'est pas disponible — le visiteur n'est jamais sans réponse.
    async function sendMessage(message) {
      if (_busy) return;
      if (IS_PREVIEW) { previewReply(message); return; }   // démo : réponse simulée, pas d'appel worker
      _busy = true;
      document.getElementById('sa-send').disabled = true;
      showTyping();
      _showingGreeting = false;   // SA-11.2 — l'accueil n'est plus à l'écran : un switch de langue ne l'écrase plus
      // SA-9.2 — la réponse prend quelques secondes : le moteur vocal chauffe
      // pendant ce temps (téléchargement/amorçage hors du chemin).
      if (_voiceOn) _warmPiper();

      const ctrl = new AbortController();
      let timer = setTimeout(() => ctrl.abort(), 45000);
      const bump = () => { clearTimeout(timer); timer = setTimeout(() => ctrl.abort(), 45000); };   // garde d'INACTIVITÉ (un flux vivant n'est pas tué)
      let speech = null, acc = '', gotChunk = false;
      try {
        const res = await fetch(`${API_BASE}/api/smart-agent/p/${_slug}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: _sessionId, stream: true, lang: _lang }),
          signal: ctrl.signal,
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          hideTyping();
          addBubble('agent', data.error || t('err'), true);
          return;
        }
        if (!res.body) {                       // navigateur sans ReadableStream → JSON
          hideTyping();
          if (!await sendMessageJSON(message)) addRetryBubble(message);
          return;
        }

        // Voix : file incrémentale (alimentée au fil des chunks) si activée.
        if (_voiceOn) {
          try {
            if (!_piperMod) _piperMod = await import('/app/lib/piper-tts.js');
            if (_piperMod.isSupported && _piperMod.isSupported() && _piperMod.createSpeechStream) {
              speech = _piperMod.createSpeechStream({ voiceId: _piperMod.voiceForLang(_lang), onState: (st) => setVoiceLoading(st === 'loading') });
            }
          } catch (_) { speech = null; }
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '', gapped = false, finalReply = '';
        for (;;) {
          const { done, value } = await reader.read();
          if (done) break;
          bump();
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const payload = line.slice(5).trim();
            if (!payload) continue;
            let ev; try { ev = JSON.parse(payload); } catch (_) { continue; }
            if (ev.type === 'meta' || ev.type === 'done') {
              if (ev.session_id) {
                _sessionId = ev.session_id;
                // La conversation survit à un rafraîchissement PENDANT la visite
                // (sessionStorage : rien ne persiste après fermeture — RGPD).
                try { sessionStorage.setItem('sa_sess_' + _slug, _sessionId); } catch (_) {}
              }
            }
            if (ev.type === 'chunk') {
              if (!gotChunk) { gotChunk = true; streamStart(); }
              acc += ev.text || '';
              streamUpdate(acc);
              if (speech) speech.push(acc);
            } else if (ev.type === 'done') {
              gapped = !!ev.gapped;
              finalReply = (ev.reply != null) ? ev.reply : acc;
            } else if (ev.type === 'error') {
              throw Object.assign(new Error(ev.error || 'server'), { _server: true });
            }
          }
        }
        const reply = finalReply || acc;
        if (!gotChunk) hideTyping();
        streamFinal(reply, gapped);
        if (speech) speech.end(reply);
        else if (_voiceOn) speak(reply);   // voix ON mais flux voix indispo → lecture classique
      } catch (e) {
        if (speech) { try { speech.cancel(); } catch (_) {} }
        if (gotChunk) {
          addRetryBubble(message);                         // coupure après des chunks → réessai
        } else if (e && e._server) {
          hideTyping();
          addBubble('agent', t('err'), true);              // erreur serveur (message localisé, pas de boucle)
        } else {
          hideTyping();
          if (!await sendMessageJSON(message)) addRetryBubble(message);   // réseau/SSE KO → repli JSON
        }
      } finally {
        clearTimeout(timer);
        hideTyping();
        _busy = false;
        document.getElementById('sa-send').disabled = false;
        document.getElementById('sa-input')?.focus();
      }
    }

    // Repli non-streaming (worker sans SSE ou flux indisponible). Renvoie true
    // si une réponse a été affichée. Réutilise l'ancien chemin JSON.
    async function sendMessageJSON(message) {
      try {
        const res = await fetch(`${API_BASE}/api/smart-agent/p/${_slug}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: _sessionId, lang: _lang }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) { addBubble('agent', data.error || t('err'), true); return true; }
        if (data.session_id) {
          _sessionId = data.session_id;
          try { sessionStorage.setItem('sa_sess_' + _slug, _sessionId); } catch (_) {}
        }
        addBubble('agent', data.reply || '', !!data.gapped);
        speak(data.reply || '');
        return true;
      } catch (_) { return false; }
    }

    function prettyUrl(u) { return String(u || '').replace(/^https?:\/\//i, '').replace(/\/+$/, ''); }
    function fullUrl(u) { u = String(u || '').trim(); return /^https?:\/\//i.test(u) ? u : ('https://' + u); }

    // Personnalisation du fond (page v2) : couleur du bas du dégradé (le haut
    // reste sombre pour la lisibilité du header) + image en filigrane plein
    // cadre derrière le contenu (z-index -1 → au-dessus du dégradé, sous le
    // texte). Valeurs déjà sanitisées côté worker (couleur #rrggbb, URL =
    // origine + clé validée). Voile (text-shadow) ajouté pour garder le texte
    // blanc lisible quelle que soit la couleur choisie.
    function applyTheme(meta) {
      const th = (meta && meta.theme) ? meta.theme : {};
      const bottom = (typeof th.bg_bottom === 'string' && /^#[0-9a-f]{6}$/i.test(th.bg_bottom)) ? th.bg_bottom : '';
      if (bottom) {
        document.body.style.background =
          'radial-gradient(125% 78% at 50% 102%,' + bottom + '88 0%,transparent 58%),' +
          'linear-gradient(180deg,#05060f 0%,#0a0b1e 30%,' + bottom + ' 100%)';
        document.body.style.backgroundAttachment = 'fixed';
      }
      const wmUrl = (typeof th.watermark === 'string') ? th.watermark : '';
      let wm = document.getElementById('sav2-wm');
      if (wmUrl) {
        if (!wm) { wm = document.createElement('div'); wm.id = 'sav2-wm'; document.body.appendChild(wm); }
        const op = (typeof th.watermark_opacity === 'number' && th.watermark_opacity >= 0 && th.watermark_opacity <= 1) ? th.watermark_opacity : 0.15;
        wm.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;background-position:center;background-size:cover;background-repeat:no-repeat;opacity:' + op;
        wm.style.backgroundImage = 'url("' + wmUrl.replace(/["\\]/g, '') + '")';
      } else if (wm) { wm.remove(); }
      if (bottom || wmUrl) {
        const at = document.getElementById('sav2-answer-text');
        if (at) at.style.textShadow = '0 1px 16px rgba(0,0,0,.6)';
      }
    }

            `<button class="sav2-card" type="button" data-i="${i}" aria-label="${escape(c.title || t('suggested'))}"><img class="sav2-card-img" src="${escape(c.image)}" alt="${escape(c.alt || '')}" loading="lazy">${c.title ? `<span class="sav2-card-pill">${escape(c.title)}</span>` : ''}</button>`).join('')}</div>` : ''}
        <main class="sav2-answer" id="sav2-answer">
          <div class="sav2-answer-scroll"><div class="sav2-answer-text" id="sav2-answer-text"></div></div>
          <div class="sav2-thinking" aria-hidden="true"><span></span><span></span><span></span></div>
        </main>
        <div class="sav2-composer">
          <div class="sav2-field">
            <textarea class="sav2-input" id="sa-input" rows="1" maxlength="500" autocapitalize="sentences" autocomplete="off" enterkeyhint="send" placeholder="${escape(t('ask'))}" aria-label="${escape(t('yourQ'))}"></textarea>
            ${HAS_SR ? `<button class="sav2-mic" id="sa-mic" type="button" aria-label="${escape(t('dictate'))}" title="${escape(t('dictate'))}">${SVG_V2.mic}</button>` : ''}
            <button class="sav2-send" id="sa-send" type="button" aria-label="${escape(t('send'))}">${SVG_V2.send}</button>
          </div>
        </div>
        <div class="sav2-rgpd">${escape(t('rgpd'))}</div>`;

      applyTheme(meta);

      const input = document.getElementById('sa-input');
      const send  = document.getElementById('sa-send');
      input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 104) + 'px'; });
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } });
      send.addEventListener('click', submit);
      input.addEventListener('focus', () => setTimeout(scrollDown, 250));
      if (window.visualViewport) window.visualViewport.addEventListener('resize', scrollDown);

      const voiceBtn = document.getElementById('sa-voice');
      if (voiceBtn) voiceBtn.addEventListener('click', toggleVoice);
      const micBtn = document.getElementById('sa-mic');
      if (micBtn) micBtn.addEventListener('click', startDictation);
      // SA-11.2 — changement de langue : libellés + réponses + dictée suivent.
      // SA-11.3 — sélecteur de langue : menu custom (bouton rond + liste sombre).
      const langBtn = document.getElementById('sa-lang');
      const langMenu = document.getElementById('sa-langmenu');
      if (langBtn && langMenu) {
        const closeLangMenu = () => { langMenu.classList.remove('is-open'); langBtn.classList.remove('is-open'); langBtn.setAttribute('aria-expanded', 'false'); };
        langBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const open = !langMenu.classList.contains('is-open');
          langMenu.classList.toggle('is-open', open);
          langBtn.classList.toggle('is-open', open);
          langBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        langMenu.querySelectorAll('.sav2-langopt').forEach(opt => {
          opt.addEventListener('click', (e) => {
            e.stopPropagation();
            const l = opt.dataset.l;
            setLang(l);
            langMenu.querySelectorAll('.sav2-langopt').forEach(o => {
              const on = o.dataset.l === l;
              o.classList.toggle('is-active', on);
              o.setAttribute('aria-checked', on ? 'true' : 'false');
            });
            closeLangMenu();
            applyI18n();
            if (_voiceOn && HAS_WASM) _warmPiper();   // pré-chauffe la voix de la nouvelle langue
          });
        });
        document.addEventListener('click', (e) => { if (!e.target.closest('.sav2-langwrap')) closeLangMenu(); });
      }

      if (cards.length) {
        document.querySelectorAll('.sav2-card').forEach(btn => {
          btn.addEventListener('click', () => { const c = cards[+btn.dataset.i]; if (c && c.question) askCard(c.question); });
        });
      }
      const ansText = document.getElementById('sav2-answer-text');
      if (ansText) ansText.addEventListener('click', () => { const txt = ansText.dataset.text; if (txt) speakTap(txt); });

      if (_voiceOn && HAS_WASM) _warmPiper();
      _showingGreeting = true;
      setAnswerV2(greetingText());   // jamais d'écran vide ; accueil natif ou générique localisé
      input.focus();
    }

    // Réponse unique : on REMPLACE le contenu, on n'empile jamais.
    function setAnswerV2(text, isFallback) {
      const a = document.getElementById('sav2-answer');
      const t = document.getElementById('sav2-answer-text');
      if (!t) return;
      if (a) a.classList.remove('is-thinking');
      t.classList.toggle('is-fallback', !!isFallback);
      t.innerHTML = mdToHtml(text);                             // **gras**, listes… rendus (plus de Markdown brut lu/affiché)
      t.dataset.text = text;                                    // texte BRUT conservé pour la lecture au toucher
      t.style.animation = 'none'; void t.offsetWidth; t.style.animation = '';
      if (a) a.scrollTop = 0;
    }
    // « Réflexion » : la réponse précédente reste estompée + points (overlay).
    function showThinkingV2() { document.getElementById('sav2-answer')?.classList.add('is-thinking'); }
    function hideThinkingV2() { document.getElementById('sav2-answer')?.classList.remove('is-thinking'); }
    function setAnswerRetryV2(message) {
      const a = document.getElementById('sav2-answer');
      const el = document.getElementById('sav2-answer-text');
      if (!el) return;
      if (a) a.classList.remove('is-thinking');
      el.classList.add('is-fallback');
      el.textContent = t('offline');
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'sav2-retry'; btn.textContent = t('retry');
      btn.addEventListener('click', () => sendMessage(message));
      el.appendChild(btn);
    }
    // Carte cliquée : on pose sa question CACHÉE (jamais affichée) dans le flux normal.
    function askCard(q) { if (_busy || !q) return; sendMessage(q); }

    /* Démo (?preview=1) — design v2 sans worker : meta + réponses simulées. */
    function demoImg(col) { return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="90"><rect width="120" height="90" fill="' + col + '"/></svg>'); }
    const DEMO_META = {
      lang: 'fr',
      role: 'Conseiller', opening: 'Bienvenue !\nJe suis votre conseiller,\ncomment puis-je vous aider ?',
      url: 'www.musee-copte.eg', phone: '+20 2 2362 8766',
      cards: [
        { image: demoImg('#a87b3a'), question: 'Parlez-moi de cet objet',          answer: 'Cet encensoir en argent ciselé date du XVIIIᵉ siècle ; la fumée de l\'encens y symbolise les prières qui montent vers le ciel.' },
        { image: demoImg('#5d6b86'), question: 'Qu\'est-ce que cette fontaine ?',    answer: 'Une fontaine d\'ablutions du XIᵉ siècle, en marbre incrusté, qui ornait la cour d\'une maison copte.' },
        { image: demoImg('#9a7a3a'), question: 'Racontez-moi cette icône',          answer: 'Une icône de la Fuite en Égypte : la Sainte Famille accueillie sur la terre d\'Égypte, épisode cher aux coptes.' }
      ]
    };
    const DEMO_DEFAULT = 'Le Musée Copte est ouvert du lundi au samedi de 9h00 à 12h00 et de 14h00 à 18h00. Il est fermé le dimanche. Avez-vous besoin d\'autres informations pour préparer votre visite ?';
    function previewReply(message) {
      _busy = true;
      const send = document.getElementById('sa-send'); if (send) send.disabled = true;
      showTyping();
      if (_voiceOn) _warmPiper();
      const card = (DEMO_META.cards || []).find(c => c.question === message);
      const reply = card ? card.answer : DEMO_DEFAULT;
      setTimeout(() => {
        hideTyping(); addBubble('agent', reply); speak(reply);
        _busy = false; if (send) send.disabled = false;
        document.getElementById('sa-input')?.focus();
      }, 950);
    }

    async function load() {
      _slug = getSlug();
      if (IS_PREVIEW) { renderChatV2(DEMO_META); return; }   // démo : design v2 sans worker/slug
      if (!_slug) { renderError('Lien invalide', 'Ce lien ne correspond à aucun assistant.'); return; }
      try { _sessionId = sessionStorage.getItem('sa_sess_' + _slug) || null; } catch (_) {}
      try {
        const res = await fetch(`${API_BASE}/api/smart-agent/p/${_slug}`);
        if (!res.ok) { renderError('Assistant introuvable', 'Ce lien n\'est plus actif ou n\'existe pas.'); return; }
        const data = await res.json();
        (NEW_UI ? renderChatV2 : renderChat)(data.agent || {});
        if (IS_EMBED) {
          // Pont avec la landing : elle envoie { type:'sa-ask', text } ;
          // on rend la bulle + la réponse comme un submit() normal. Si un
          // envoi arrive pendant qu'on répond déjà, on rend le texte au
          // parent (il le remet dans sa barre) plutôt que de l'avaler.
          window.addEventListener('message', (e) => {
            if (e.origin !== location.origin) return;
            const d = e.data || {};
            if (d.type !== 'sa-ask' || typeof d.text !== 'string') return;
            const text = d.text.trim().slice(0, 500);
            if (!text) return;
            if (_busy) {
              try { parent.postMessage({ type: 'sa-rejected', text }, location.origin); } catch (_) {}
              return;
            }
            addBubble('user', text);
            sendMessage(text);
          });
          try { parent.postMessage({ type: 'sa-ready' }, location.origin); } catch (_) {}
        }
      } catch (_) {
        renderError('Connexion impossible', 'Impossible de charger l\'assistant. Réessayez plus tard.');
      }
    }

    load();
  </script>
</body>
</html>
